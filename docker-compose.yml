services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: memex
      POSTGRES_USER: memex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memex -d memex"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: memex
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./keycloak/memex-realm.json:/opt/keycloak/data/import/memex-realm.json:ro
    ports:
      # KC_BIND is loopback in public mode (Caddy proxies over the internal network)
      # and blank → 0.0.0.0 in local mode so a LAN browser can reach the login page.
      - "${KC_BIND:-0.0.0.0}:${KEYCLOAK_PUBLIC_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    # Prebuilt image from GHCR (install.sh / upgrade.sh `docker compose pull` it).
    # `build: .` stays so source builds (`up -d --build`) still work for dev.
    image: ghcr.io/cdburgess75/memex:${MEMEX_TAG:-latest}
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://memex:${POSTGRES_PASSWORD:-changeme}@postgres:5432/memex
      # KEYCLOAK_URL is the browser-visible URL (used in /api/config for the frontend PKCE flow)
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_PUBLIC_PORT: ${KEYCLOAK_PUBLIC_PORT:-8080}
      # KEYCLOAK_INTERNAL_URL is the server-to-server URL for JWKS verification
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-memex}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-memex-app}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      APP_URL: ${APP_URL:-}
      # Trust the Caddy reverse proxy (one hop) so client IPs / https are correct.
      TRUST_PROXY: ${TRUST_PROXY:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_PATH: /data/documents
      # AES-256-GCM at-rest key for local storage (generated by install.sh).
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      # In-app backups stage here (persistent volume below); the compliance
      # backup-freshness probe reads the same dir.
      MEMEX_BACKUP_DIR: /data/backups
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-300}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-20}
      # In-browser Office editing (Collabora/WOPI). Leave COLLABORA_URL empty to
      # keep files read-only-preview. COLLABORA_URL is the browser-facing editor
      # origin; the internal URLs are how Collabora and the app reach each other.
      # COLLABORA_ENABLED=true turns on in-browser editing via the same-origin
      # proxy (no COLLABORA_URL / port-forward needed). Set COLLABORA_URL instead
      # only to point the browser at a directly-exposed Collabora origin.
      COLLABORA_ENABLED: ${COLLABORA_ENABLED:-}
      COLLABORA_URL: ${COLLABORA_URL:-}
      COLLABORA_INTERNAL_URL: ${COLLABORA_INTERNAL_URL:-http://collabora:9980}
      WOPI_INTERNAL_URL: ${WOPI_INTERNAL_URL:-http://app:3000}
    volumes:
      - /srv/memex-documents:/data/documents
      - backups_data:/data/backups
    ports:
      # APP_BIND is loopback in public mode (Caddy proxies over the internal network)
      # and blank → 0.0.0.0 in local mode for direct LAN access.
      - "${APP_BIND:-0.0.0.0}:${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # In-browser Office editor (WOPI-native, self-hosted — no Microsoft/personal
  # accounts). Optional: the app falls back to read-only preview when COLLABORA_URL
  # is unset, so this service can be omitted on deployments that don't need editing.
  collabora:
    image: collabora/code:latest
    restart: unless-stopped
    environment:
      # WOPI host Collabora accepts callbacks from — the Memex app container.
      # Must match WOPI_INTERNAL_URL's host (dots are regex-escaped by Collabora).
      aliasgroup1: "http://app:3000"
      # The editor speaks plain HTTP; a reverse proxy (Memex same-origin, or Caddy
      # at go-live) fronts it. ssl.termination controls whether Collabora tells the
      # browser to use ws/wss: keep it false when Memex is served over http (dev),
      # set COLLABORA_SSL_TERMINATION=true when Memex is behind HTTPS (go-live).
      extra_params: "--o:ssl.enable=false --o:ssl.termination=${COLLABORA_SSL_TERMINATION:-false}"
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD:-changeme}
    ports:
      # The app reaches Collabora over the internal network (COLLABORA_INTERNAL_URL)
      # and proxies the editor same-origin, so the host port is only for optional
      # direct/debug access — bind it to loopback, never 0.0.0.0.
      - "${COLLABORA_BIND:-127.0.0.1}:${COLLABORA_PORT:-9980}:9980"
    cap_add:
      - MKNOD
    depends_on:
      - app

volumes:
  postgres_data:
  backups_data:
