# Production overlay: adds a Caddy reverse proxy that terminates TLS and proxies
# to the app + Keycloak. Domain-agnostic: Caddy uses On-Demand TLS and asks the
# app (/api/tls/check) which hostname to issue a cert for — so the public domain
# is set per customer in Settings → System → App URL, not in this file.
#
# Bring up with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites before a certificate can issue (per deployment):
#   1. DNS A record: <your-domain> -> <public IP>
#   2. Router port-forward: TCP 80 and 443 -> 192.168.1.32
#   3. Settings → System → App URL = https://<your-domain>, and TRUST_PROXY=1
#      (Caddy is one hop). KEYCLOAK_URL=auto derives the rest.
#   4. Add https://<your-domain>/* to the Keycloak memex-app client's valid
#      redirect URIs and web origins.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - keycloak

volumes:
  caddy_data:
  caddy_config:
