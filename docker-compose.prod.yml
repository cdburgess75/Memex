# Production overlay: adds a Caddy reverse proxy that terminates TLS for
# files.ptechllc.com and proxies to the app + Keycloak.
#
# Bring up with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites before this can obtain a certificate:
#   1. DNS A record: files.ptechllc.com -> <your public IP>
#   2. Router port-forward: TCP 80 and 443 -> 192.168.1.32
#
# After the cert is live, flip the app to the HTTPS origin (see RECOMMENDATIONS.md
# step 1): set APP_URL and KEYCLOAK_URL to https://files.ptechllc.com,
# TRUST_PROXY=true, CORS_ORIGINS=https://files.ptechllc.com, and update the
# Keycloak client redirect URIs.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - keycloak

volumes:
  caddy_data:
  caddy_config:
