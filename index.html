<!DOCTYPE html>
<html lang="en" class="auth-locked">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex — team knowledge base</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Memex signature — light */
  --paper: #FBFBFA;
  --surface: #FFFFFF;
  --surface-2: #F4F4F2;
  --ink: #1B1B19;
  --ink-soft: #5B5A56;
  --ink-faint: #8E8C87;
  --accent: #C2603D;
  --accent-soft: #A94E2F;
  --accent-wash: #F8ECE6;
  --rule: rgba(27,27,25,0.09);
  --rule-soft: rgba(27,27,25,0.05);
  --shadow: 0 1px 2px rgba(20,19,17,0.05), 0 0 0 1px rgba(20,19,17,0.04);
  --ui: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  --display: var(--ui);
  --body: var(--ui);
  --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
}
html.dark {
  /* Memex signature — dark */
  --paper: #16151A;
  --surface: #1D1C22;
  --surface-2: #26242C;
  --ink: #ECEAF0;
  --ink-soft: #A9A6B2;
  --ink-faint: #74717E;
  --accent: #E08A66;
  --accent-soft: #C2603D;
  --accent-wash: #2A1E18;
  --rule: rgba(236,234,240,0.11);
  --rule-soft: rgba(236,234,240,0.06);
  --shadow: 0 6px 24px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--body);
  background-color: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
::selection { background: var(--accent-wash); }

.masthead {
  border-bottom: 1px solid var(--rule);
  padding: 13px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  max-width: 1240px;
  margin: 0 auto;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.brand h1 {
  font-family: var(--ui);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: -0.01em;
  line-height: 1;
}
.masthead-actions { display: flex; gap: 8px; align-items: center; }
.masthead-search {
  flex: 1 1 auto;
  max-width: 520px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 9px;
  height: 36px;
  padding: 0 12px;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: 9px;
  color: var(--ink-faint);
}
.masthead-search:focus-within { border-color: var(--rule); background: var(--surface); }
.masthead-search input { flex: 1; min-width: 0; border: 0; background: transparent; outline: 0; font: 14px var(--ui); color: var(--ink); }
.masthead-upload-wrap { position: relative; }
.masthead-upload {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 34px;
  padding: 0 14px;
  border: 0;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font: 600 13px var(--ui);
  cursor: pointer;
}
.masthead-upload:hover { filter: brightness(1.06); }
.masthead-upload .plus { font-size: 16px; line-height: 1; }
.masthead-upload .chev { font-size: 11px; opacity: 0.85; }
.app-menu-version {
  font-size: 11.5px;
  color: var(--ink-faint);
  padding: 10px 12px 4px;
  border-top: 1px solid var(--rule-soft);
  margin-top: 4px;
}
.auth-locked .masthead,
.auth-locked .shell {
  display: none;
}
.app-menu-wrap { position: relative; }
.app-menu-btn {
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--surface);
  color: var(--ink);
  padding: 8px 12px;
  font: 600 13px var(--body);
  cursor: pointer;
  box-shadow: var(--shadow);
}
.app-menu-btn:hover { border-color: var(--accent); color: var(--accent); }
.app-menu-popover {
  display: none;
  position: absolute;
  z-index: 30;
  top: calc(100% + 8px);
  right: 0;
  width: min(280px, calc(100vw - 32px));
  padding: 8px;
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: 0 14px 34px rgba(0,0,0,0.14);
}
.app-menu-popover.open { display: grid; gap: 4px; }
.app-menu-section {
  margin: 8px 8px 4px;
  color: var(--ink-faint);
  font: 700 11px var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.app-menu-item {
  width: 100%;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--ink);
  padding: 9px 10px;
  text-align: left;
  font: 600 14px var(--body);
  cursor: pointer;
}
.app-menu-item:hover { background: var(--accent-wash); color: var(--accent); }
.security-indicator {
  position: relative;
  border: 1px solid var(--rule);
  border-radius: 999px;
  background: var(--surface);
  color: var(--ink-soft);
  padding: 8px 12px 8px 28px;
  font: 700 13px var(--body);
  cursor: pointer;
  box-shadow: var(--shadow);
  white-space: nowrap;
}
.security-indicator::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 50%;
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: var(--ink-faint);
  transform: translateY(-50%);
}
.security-indicator.ok::before { background: #2E7D32; }
.security-indicator.info::before { background: #0F6CBD; }
.security-indicator.warning::before { background: #B7791F; }
.security-indicator.critical::before { background: #C0392B; box-shadow: 0 0 0 4px rgba(192,57,43,0.12); }
.security-indicator:hover { border-color: var(--accent); color: var(--ink); }
.security-modal-grid { display: grid; gap: 12px; margin-top: 16px; }
.security-status-card { border: 1px solid var(--rule); border-radius: 8px; background: var(--surface); padding: 14px 16px; }
.security-status-card strong { display: block; color: var(--ink); margin-bottom: 4px; }
.security-status-card span { color: var(--ink-soft); font-size: 14px; }
.theme-switcher {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--surface-2);
  box-shadow: var(--shadow);
}
.theme-switcher.top-theme-switcher {
  max-width: min(52vw, 420px);
  overflow-x: auto;
  scrollbar-width: none;
}
.theme-switcher.top-theme-switcher::-webkit-scrollbar { display: none; }
.theme-option {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  border: 0;
  border-radius: 3px;
  background: transparent;
  color: var(--ink-faint);
  padding: 6px 9px;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.15s, background 0.15s, box-shadow 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.theme-option:hover { color: var(--ink); background: var(--surface); }
.theme-option.active {
  color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 1px var(--rule-soft), 0 1px 2px rgba(0,0,0,0.04);
}
.theme-swatch {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--ink) 14%, transparent);
  background: var(--swatch, var(--accent));
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.65);
}
.theme-swatch.office { --swatch: linear-gradient(135deg, #0078D4 0 50%, #FFFFFF 50% 100%); }
.theme-swatch.drive { --swatch: linear-gradient(135deg, #1A73E8 0 44%, #34A853 44% 72%, #FFFFFF 72% 100%); }
.theme-swatch.dropbox { --swatch: linear-gradient(135deg, #0061FF 0 58%, #EEF4FF 58% 100%); }
.theme-swatch.graphite { --swatch: linear-gradient(135deg, #111315 0 52%, #7CC7B7 52% 100%); }
.theme-swatch.dark { --swatch: linear-gradient(135deg, #1A1916 0 55%, #D97757 55% 100%); }
html.office body { background-image: none; }
html.office .masthead { border-bottom-color: var(--rule); }
html.office .brand h1 { font-family: var(--display); font-weight: 600; }
html.office .colophon::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 18px;
  margin-right: 8px;
  vertical-align: -4px;
  border-radius: 5px;
  background: linear-gradient(135deg, #0F6CBD 0 35%, #2AA0FF 35% 52%, #3BCEAC 52% 68%, #F7634D 68% 84%, #F2C94C 84% 100%);
  box-shadow: 0 2px 5px rgba(0,120,212,0.22);
}
html.office .tab.active,
html.office .run-btn,
html.office .provider-btn:hover,
html.office .page-link.active {
  background: var(--accent-wash);
  border-color: rgba(0,120,212,0.28);
}
html.office .run-btn {
  background: #0078D4;
  color: #FFFFFF;
  border-color: #0078D4;
}
html.office .run-btn:hover { background: #005A9E; border-color: #005A9E; }
html.office .theme-option,
html.office .icon-btn,
html.office .user-chip,
html.office .run-btn,
html.office .ghost-btn,
html.office .edit-btn,
html.office .delete-btn,
html.office .provider-btn,
html.office .field-label,
html.office .mode-tab,
html.office .file-action-btn,
html.office .upload-progress {
  font-family: var(--body);
  letter-spacing: 0;
  text-transform: none;
}
html.office .field-label,
html.office .mode-tab,
html.office .upload-progress {
  font-weight: 600;
}
html.office .file-icon.docx, html.office .file-icon.doc { background: #E8F3FF; color: #185ABD; }
html.office .file-icon.xlsx, html.office .file-icon.xls, html.office .file-icon.csv { background: #EAF7EA; color: #107C41; }
html.office .file-icon.pptx, html.office .file-icon.ppt { background: #FFF0EA; color: #C43E1C; }
html.office .file-icon.pdf { background: #FDECEC; color: #D13438; }
html.office-dark body,
html.drive body,
html.dropbox body,
html.graphite body { background-image: none; }
html.office-dark .masthead,
html.drive .masthead,
html.dropbox .masthead,
html.graphite .masthead { border-bottom-color: var(--rule); }
html.office-dark .theme-option,
html.office-dark .icon-btn,
html.office-dark .user-chip,
html.office-dark .run-btn,
html.office-dark .ghost-btn,
html.office-dark .edit-btn,
html.office-dark .delete-btn,
html.office-dark .provider-btn,
html.office-dark .field-label,
html.office-dark .mode-tab,
html.office-dark .file-action-btn,
html.office-dark .upload-progress,
html.drive .theme-option,
html.drive .icon-btn,
html.drive .user-chip,
html.drive .run-btn,
html.drive .ghost-btn,
html.drive .edit-btn,
html.drive .delete-btn,
html.drive .provider-btn,
html.drive .field-label,
html.drive .mode-tab,
html.drive .file-action-btn,
html.drive .upload-progress,
html.dropbox .theme-option,
html.dropbox .icon-btn,
html.dropbox .user-chip,
html.dropbox .run-btn,
html.dropbox .ghost-btn,
html.dropbox .edit-btn,
html.dropbox .delete-btn,
html.dropbox .provider-btn,
html.dropbox .field-label,
html.dropbox .mode-tab,
html.dropbox .file-action-btn,
html.dropbox .upload-progress,
html.graphite .theme-option,
html.graphite .icon-btn,
html.graphite .user-chip,
html.graphite .run-btn,
html.graphite .ghost-btn,
html.graphite .edit-btn,
html.graphite .delete-btn,
html.graphite .provider-btn,
html.graphite .field-label,
html.graphite .mode-tab,
html.graphite .file-action-btn,
html.graphite .upload-progress {
  font-family: var(--body);
  letter-spacing: 0;
  text-transform: none;
}
html.office-dark .run-btn,
html.drive .run-btn,
html.dropbox .run-btn,
html.graphite .run-btn {
  background: var(--accent);
  color: #FFFFFF;
  border-color: var(--accent);
}
html.drive .run-btn,
html.dropbox .run-btn { color: #FFFFFF; }
html.graphite .run-btn { color: #0B1614; }
html.office-dark .run-btn:hover,
html.drive .run-btn:hover,
html.dropbox .run-btn:hover,
html.graphite .run-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); color: #FFFFFF; }
html.office-dark .file-icon.docx, html.office-dark .file-icon.doc { background: #102A44; color: #8EC8FF; }
html.office-dark .file-icon.xlsx, html.office-dark .file-icon.xls, html.office-dark .file-icon.csv { background: #0E3023; color: #7BE0A8; }
html.office-dark .file-icon.pptx, html.office-dark .file-icon.ppt { background: #3A2217; color: #FFAD7A; }
html.office-dark .file-icon.pdf { background: #3A171D; color: #FF9AA7; }
html.drive .file-icon.docx, html.drive .file-icon.doc,
html.dropbox .file-icon.docx, html.dropbox .file-icon.doc { background: #E8F0FE; color: #1A73E8; }
html.drive .file-icon.xlsx, html.drive .file-icon.xls, html.drive .file-icon.csv,
html.dropbox .file-icon.xlsx, html.dropbox .file-icon.xls, html.dropbox .file-icon.csv { background: #E6F4EA; color: #188038; }
html.drive .file-icon.pptx, html.drive .file-icon.ppt,
html.dropbox .file-icon.pptx, html.dropbox .file-icon.ppt { background: #FEF7E0; color: #B06000; }
html.drive .file-icon.pdf,
html.dropbox .file-icon.pdf { background: #FCE8E6; color: #C5221F; }
html.graphite .file-icon.docx, html.graphite .file-icon.doc { background: #18243A; color: #8DBBFF; }
html.graphite .file-icon.xlsx, html.graphite .file-icon.xls, html.graphite .file-icon.csv { background: #18312E; color: #7CC7B7; }
html.graphite .file-icon.pptx, html.graphite .file-icon.ppt { background: #352716; color: #F0B35A; }
html.graphite .file-icon.pdf { background: #351A20; color: #FF9AA7; }
.icon-btn {
  font-family: var(--ui);
  font-size: 13px;
  font-weight: 500;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-soft);
  padding: 7px 13px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--ink-faint); color: var(--ink); background: var(--surface-2); }
.user-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--ui);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
  padding: 5px 9px 5px 6px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 999px;
  max-width: 230px;
  cursor: pointer;
}
.user-chip:hover { background: var(--surface-2); }
.user-chip-avatar {
  flex: 0 0 auto;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font: 600 10.5px var(--ui);
}
.user-chip-email { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-chip .chev { flex: 0 0 auto; font-size: 11px; color: var(--ink-faint); }

.shell {
  display: grid;
  grid-template-columns: 270px 1fr;
  max-width: 1240px;
  margin: 0 auto;
  min-height: calc(100vh - 76px);
}

.index-col {
  border-right: 1px solid var(--ink);
  padding: 26px 22px 40px;
  position: sticky;
  top: 0;
  align-self: start;
  max-height: 100vh;
  overflow-y: auto;
}
.index-head {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 8px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.index-head .count { color: var(--ink-faint); }

/* sidebar search */
.search-wrap { margin-bottom: 10px; }
#page-search {
  font-family: var(--mono);
  font-size: 12px;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 7px 10px;
  color: var(--ink);
  transition: border-color 0.15s;
}
#page-search:focus { outline: none; border-color: var(--accent); }
#page-search::placeholder { color: var(--ink-faint); }
.cat-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 14px;
}
.cat-pill {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  border-radius: 99px;
  padding: 3px 9px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.cat-pill:hover { color: var(--ink); border-color: var(--ink-soft); }
.cat-pill.active { background: var(--accent-wash); color: var(--accent); border-color: var(--accent); }

.cat-group { margin-bottom: 20px; }
.cat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.page-link {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 8px 4px 10px;
  cursor: pointer;
  border-left: 2px solid transparent;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.35;
  transition: all 0.12s;
  margin-left: -10px;
}
.page-link:hover { color: var(--ink); border-left-color: var(--accent-soft); }
.page-link.active { color: var(--ink); border-left-color: var(--accent); font-weight: 500; }
.page-link .dot { color: var(--accent); font-size: 11px; opacity: 0; transition: opacity 0.12s; }
.page-link.fresh .dot { opacity: 1; }
.empty-index { font-size: 14px; color: var(--ink-faint); font-style: italic; }

.work-col { display: flex; flex-direction: column; min-width: 0; }
.tabs {
  display: flex;
  border-bottom: 1px solid var(--ink);
  padding: 0 32px;
  gap: 0;
}
.tab {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 14px 18px 12px;
  cursor: pointer;
  color: var(--ink-faint);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab .ix { color: var(--accent); margin-right: 6px; }

.panel { padding: 34px 44px 60px; max-width: 760px; animation: rise 0.4s ease both; }
@keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* article view */
.article .kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.article .kicker .sep { color: var(--ink-faint); }
.article h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 40px;
  line-height: 1.05;
  letter-spacing: 0;
  margin-bottom: 22px;
}
.prose { font-size: 18px; line-height: 1.68; color: var(--ink); }
.prose h2 {
  font-family: var(--display);
  font-weight: 500;
  font-size: 23px;
  margin: 30px 0 10px;
  letter-spacing: 0;
}
.prose h3 {
  font-family: var(--display);
  font-weight: 500;
  font-size: 19px;
  margin: 22px 0 8px;
  letter-spacing: 0;
}
.prose p { margin-bottom: 16px; }
.prose ul { margin: 0 0 16px 22px; }
.prose ol { margin: 0 0 16px 22px; }
.prose li { margin-bottom: 6px; }
.prose em { font-style: italic; color: var(--ink-soft); }
.prose strong { font-weight: 500; }
.cross-link {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-wash);
  cursor: pointer;
  transition: border-color 0.12s;
}
.cross-link:hover { border-bottom-color: var(--accent); }
.prose a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-wash); transition: border-color 0.12s; }
.prose a:hover { border-bottom-color: var(--accent); }
.prose pre {
  background: var(--surface-2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 0 0 16px;
}
.prose pre code {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.55;
  background: none;
  border: none;
  padding: 0;
  color: var(--ink);
}
.prose code {
  font-family: var(--mono);
  font-size: 14px;
  background: var(--surface-2);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 1px 5px;
  color: var(--ink);
}
.prose table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 20px;
  font-size: 16px;
}
.prose th {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: left;
  background: var(--surface-2);
  border: 1px solid var(--rule);
  padding: 8px 12px;
  color: var(--ink-soft);
}
.prose td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  vertical-align: top;
}
.prose tr:nth-child(even) td { background: var(--surface); }
.prose hr {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 28px 0;
}

/* edit form */
.edit-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  padding: 5px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
.edit-btn:hover { border-color: var(--ink); color: var(--ink); }
.delete-btn {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent-wash);
  padding: 12px 18px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
.delete-btn:hover { border-color: var(--accent); background: var(--accent-wash); }

/* forms */
.field { margin-bottom: 20px; }
.field-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
  display: block;
}
textarea,
input[type=text],
input[type=password],
input[type=email],
input[type=url],
input[type=number],
input[type=search],
select {
  width: 100%;
  font-family: var(--body);
  font-size: 17px;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 12px 14px;
  resize: vertical;
  transition: border-color 0.15s;
}
textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent); }
textarea { min-height: 120px; line-height: 1.55; }
select { cursor: pointer; }

.run-btn {
  font-family: var(--body);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  background: var(--accent);
  color: #FFFFFF;
  border: 1px solid var(--accent);
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 40px;
}
.run-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
.run-btn:disabled { opacity: 0.4; cursor: wait; }
.ghost-btn {
  font-family: var(--body);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--rule);
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 40px;
}
.ghost-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-wash); }
.btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.result {
  margin-top: 26px;
  border-top: 1px solid var(--rule);
  padding-top: 22px;
}
.result-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.response {
  font-size: 17px;
  line-height: 1.62;
  color: var(--ink);
  white-space: pre-wrap;
  min-height: 24px;
}
.response.dim { color: var(--ink-faint); font-style: italic; }
.cursor::after { content: '▍'; color: var(--accent); animation: blink 0.8s steps(1) infinite; }
@keyframes blink { 50% { opacity: 0; } }

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.chip {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.03em;
  background: var(--accent-wash);
  color: var(--accent);
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: opacity 0.12s;
}
html.dark .chip { color: var(--accent-soft); }
.chip:hover { opacity: 0.7; }

.note { font-size: 15px; color: var(--ink-soft); line-height: 1.6; }
.note.placeholder { font-style: italic; color: var(--ink-faint); }

/* log */
.log-list { margin-top: 8px; }
.log-row {
  display: flex;
  gap: 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  padding: 7px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.log-row .t { color: var(--accent-soft); flex-shrink: 0; }
.log-row .who { color: var(--ink-faint); opacity: 0.7; flex-shrink: 0; }

/* modal */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  padding: 20px;
}
.scrim.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 6px;
  max-width: 460px;
  width: 100%;
  padding: 30px 32px;
  box-shadow: var(--shadow), 0 16px 48px rgba(0,0,0,0.18);
}
.modal h2 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 26px;
  margin-bottom: 6px;
}
.modal .sub { font-size: 15px; color: var(--ink-soft); margin-bottom: 22px; line-height: 1.5; }

/* login screen */
.login-modal { text-align: center; max-width: 440px; padding: 24px 34px 34px; }
.login-theme-switcher {
  justify-content: center;
  max-width: 100%;
  overflow-x: auto;
  margin: 0 auto 24px;
  scrollbar-width: none;
}
.login-theme-switcher::-webkit-scrollbar { display: none; }
.login-mark {
  width: 48px;
  height: 48px;
  margin: 0 auto 14px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  color: #FFFFFF;
  display: grid;
  place-items: center;
  font: 700 22px var(--ui);
  box-shadow: 0 12px 28px color-mix(in srgb, var(--accent) 24%, transparent);
}
.login-modal h2 { font-size: 32px; line-height: 1.08; margin-bottom: 8px; }
.login-modal .sub { margin: 0 auto 22px; max-width: 320px; font-size: 15px; }
.login-note {
  margin-top: 16px;
  color: var(--ink-faint);
  font-size: 12px;
  line-height: 1.45;
}
.login-providers { display: flex; flex-direction: column; gap: 10px; }
.login-form { display: flex; flex-direction: column; gap: 10px; }
.login-form input {
  min-height: 48px;
  border-radius: 6px;
  padding: 11px 13px;
  font-size: 15px;
}
.login-divider {
  color: var(--ink-faint);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  margin: 13px 0;
}
.provider-btn {
  font-family: var(--body);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  min-height: 48px;
  padding: 12px 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: var(--shadow);
}
.provider-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-wash); }
html.office .modal {
  border-color: rgba(17,24,39,0.12);
  border-radius: 8px;
  box-shadow: 0 24px 72px rgba(17,24,39,0.22), 0 0 0 1px rgba(0,120,212,0.06);
}
html.office .login-modal h2 {
  font-size: 32px;
  font-weight: 650;
  color: #111827;
}
html.office .login-modal .sub {
  color: #475467;
  line-height: 1.45;
}
html.office .provider-btn {
  color: #242424;
  border-color: #D0D5DD;
  background: #FFFFFF;
  box-shadow: 0 1px 2px rgba(16,24,40,0.05);
}
html.office .provider-btn:hover {
  color: #0F5FB5;
  border-color: #8FC7F4;
  background: #F8FBFF;
}

.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 11px 20px;
  border-radius: 2px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 60;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ingest mode tabs */
.mode-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-tab {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-tab:hover { color: var(--ink); border-color: var(--ink-soft); }
.mode-tab.active { color: var(--accent); border-color: var(--accent); background: var(--accent-wash); }

/* file drop zone */
.file-drop {
  border: 2px dashed var(--rule);
  border-radius: 3px;
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.file-drop:hover, .file-drop.drag-over { border-color: var(--accent); color: var(--accent); background: var(--accent-wash); }
.file-status {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 8px;
  min-height: 18px;
}

/* admin */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 30px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 20px 22px;
}
.stat-card .stat-num {
  font-family: var(--display);
  font-size: 36px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 6px;
  color: var(--ink);
}
.stat-card .stat-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin-bottom: 28px;
}
.admin-table th {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: left;
  border-bottom: 1px solid var(--rule);
  padding: 6px 10px 6px 0;
}
.admin-table td {
  padding: 7px 10px 7px 0;
  border-bottom: 1px solid var(--rule-soft);
  color: var(--ink-soft);
  font-family: var(--mono);
  font-size: 12px;
}
.admin-table td:first-child { color: var(--ink); }

@media (max-width: 820px) {
  .shell { grid-template-columns: 1fr; }
  .index-col { border-right: none; border-bottom: 1px solid var(--ink); }
  .panel { padding: 28px 24px 50px; }
  .masthead, .tabs { padding-left: 20px; padding-right: 20px; }
  .masthead { align-items: flex-start; flex-direction: column; gap: 12px; overflow: hidden; }
  .brand { align-items: flex-start; flex-wrap: wrap; max-width: 100%; gap: 8px 12px; }
  .brand h1 { flex: 0 0 auto; }
  .brand .colophon { flex: 1 1 180px; min-width: 0; line-height: 1.35; white-space: normal; }
  .masthead-actions { width: 100%; max-width: 100%; overflow-x: auto; padding-bottom: 2px; }
  .tabs { max-width: 100%; overflow-x: auto; justify-content: flex-start; }
  .tab { white-space: nowrap; }
  .login-modal { max-width: 100%; padding: 30px 24px 32px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}

/* search results */
.search-result {
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: opacity 0.12s;
}
.search-result:hover { opacity: 0.75; }
.search-result-title {
  font-family: var(--body);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}
.search-result-snippet {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.5;
}
.search-result-snippet mark {
  background: var(--accent-wash);
  color: var(--accent);
  font-style: normal;
}

/* version history */
.version-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.version-meta { display: flex; flex-direction: column; gap: 2px; min-width: 140px; }
.version-date { font-family: var(--mono); font-size: 12px; color: var(--accent-soft); }
.version-who { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
.version-title { flex: 1; font-size: 16px; color: var(--ink); }
.version-actions { display: flex; gap: 6px; }

/* system settings panel */
.settings-grid {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 10px 16px;
  align-items: center;
  margin-bottom: 14px;
}
.settings-grid label { font-size: 13px; color: var(--ink-soft); }
.settings-grid input,
.settings-grid select,
.settings-grid textarea {
  font-family: var(--mono);
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--paper);
  color: var(--ink);
  width: 100%;
  box-sizing: border-box;
}
.settings-grid textarea { resize: vertical; min-height: 60px; }
.settings-notice {
  font-size: 12px;
  color: var(--ink-soft);
  background: color-mix(in srgb, var(--accent) 8%, var(--paper));
  border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--rule));
  border-radius: 4px;
  padding: 8px 12px;
  margin-bottom: 12px;
}
.settings-sub { margin-top: 20px; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: var(--ink); }

/* usage / admin data tables */
.usage-section { margin-bottom: 32px; }
.usage-section h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 8px;
  margin-bottom: 16px;
}
.data-table { width: 100%; border-collapse: collapse; font-size: 15px; margin-bottom: 8px; }
.data-table th {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: left;
  padding: 6px 10px 6px 0;
  border-bottom: 1px solid var(--rule);
}
.data-table td { padding: 8px 10px 8px 0; border-bottom: 1px solid var(--rule-soft); color: var(--ink-soft); }
.data-table td:first-child { color: var(--ink); }
.data-table select { font-family: var(--mono); font-size: 12px; padding: 3px 6px; }
.compliance-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-bottom: 16px; }
.compliance-card {
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--surface);
  padding: 14px;
  box-shadow: var(--shadow);
}
.compliance-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.compliance-card h4 { font-size: 16px; margin: 0; color: var(--ink); }
.compliance-card p { font-size: 13px; color: var(--ink-soft); line-height: 1.45; margin: 0 0 8px; }
.compliance-note { font-size: 12px; color: var(--ink-faint); line-height: 1.45; }
.compliance-toggle { display: inline-flex; align-items: center; gap: 6px; font: 700 12px var(--body); color: var(--ink-soft); white-space: nowrap; }
.compliance-toggle input { width: auto; }
.compliance-controls { display: grid; gap: 8px; margin-top: 10px; }
.compliance-control-row { display: grid; grid-template-columns: auto minmax(88px, 0.8fr) minmax(0, 1.2fr); gap: 10px 12px; align-items: start; padding: 12px 0; border-top: 1px solid var(--rule); min-width: 0; }
.compliance-control-row:first-child { border-top: 0; padding-top: 0; }
.compliance-control-title { color: var(--ink); font-weight: 700; line-height: 1.35; min-width: 0; }
.compliance-control-copy { color: var(--ink-soft); font-size: 13px; line-height: 1.4; min-width: 0; overflow-wrap: anywhere; }
.compliance-control-gap { grid-column: 2 / -1; color: var(--ink-faint); font-size: 13px; line-height: 1.4; min-width: 0; overflow-wrap: anywhere; }
.compliance-control-gap strong { color: var(--ink-soft); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; margin-right: 6px; }
.control-pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 9px; font: 700 12px var(--body); }
.control-ready { background: #EAF7EA; color: #107C41; }
.control-partial { background: #FFF7E6; color: #9A5B00; }
.control-gap { background: #FDECEC; color: #B32636; }
.update-posture { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 18px; }
.update-card { border: 1px solid var(--rule); border-radius: 8px; padding: 14px; background: var(--surface); }
.update-card strong { display: block; color: var(--ink); margin-bottom: 5px; }
.update-card span { display: block; color: var(--ink-soft); font-size: 13px; line-height: 1.45; }

/* Files home */
html.file-home-mode body { background: #F7F7F8; background-image: none; }
html.file-home-mode .masthead { max-width: none; padding-left: 36px; padding-right: 36px; }
html.file-home-mode .shell { max-width: none; width: 100%; grid-template-columns: 1fr; min-height: calc(100vh - 76px); margin: 0; padding: 0; }
html.file-home-mode .index-col { display: none; }
html.file-home-mode .work-col { min-height: calc(100vh - 76px); }
html.file-home-mode .tabs { display: none; }
html.file-home-mode #panel > .panel { max-width: none; min-height: calc(100vh - 76px); padding: 0; border: 0; background: transparent; box-shadow: none; }
html.file-home-mode .masthead-actions { display: flex; }
.file-workspace-content { max-width: 1120px; }
.file-workspace-content .panel { margin: 0; }
.file-home-shell { min-height: calc(100vh - 76px); display: grid; grid-template-columns: 248px minmax(0, 1fr); background: #F7F7F8; color: #242424; }
.file-home-nav { padding: 18px 14px 28px; border-right: 1px solid #E5E5E5; background: #F3F3F4; overflow-y: auto; }
.file-home-shell.dragging { outline: 2px dashed #0F6CBD; outline-offset: -12px; background: #EFF7FF; }
.file-rail-actions { display: grid; gap: 6px; margin-bottom: 18px; }
.file-upload-actions, .file-search-actions { position: relative; display: block; }
.file-create-btn { width: 100%; min-height: 36px; border: 1px solid #DADADA; border-radius: 6px; padding: 7px 10px; color: #323130; background: #FFFFFF; font: 700 14px var(--body); display: flex; align-items: center; gap: 9px; justify-content: flex-start; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
.file-create-btn:hover { background: #F8FBFF; border-color: #B7D4F5; color: #0F5FB5; box-shadow: 0 1px 4px rgba(15,108,189,0.10); }
.file-create-btn .plus { width: 18px; height: 18px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; font-size: 17px; line-height: 1; font-weight: 500; color: #0F6CBD; background: transparent; flex: 0 0 auto; }
.file-create-btn .chev { margin-left: auto; font-size: 12px; line-height: 1; color: #707070; }
.file-create-btn span:not(.plus):not(.chev) { white-space: nowrap; }
.file-upload-menu, .file-search-menu { display: none; position: absolute; z-index: 20; top: calc(100% + 8px); left: 0; min-width: 152px; padding: 6px; border: 1px solid #DADADA; border-radius: 8px; background: #FFFFFF; box-shadow: 0 8px 22px rgba(0,0,0,0.14); }
.file-search-menu { min-width: 174px; }
.file-upload-menu.open, .file-search-menu.open { display: grid; gap: 4px; }

@media (max-width: 1100px) {
  .file-home-shell { grid-template-columns: 220px minmax(0, 1fr); }
  .file-home-main { padding: 28px 24px 40px; }
  .file-home-insights { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
  .file-rec-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
  .file-table th:nth-child(4), .file-table td:nth-child(4) { display: none; }
}
@media (max-width: 820px) {
  html.file-home-mode .masthead { align-items: flex-start; }
  .file-home-shell { display: block; }
  .file-home-nav { position: sticky; top: 0; z-index: 4; display: grid; grid-template-columns: 1fr; gap: 12px; padding: 14px 16px; border-right: 0; border-bottom: 1px solid #E5E5E5; }
  .file-library-nav { margin-top: 0; }
  .file-library-heading { padding: 8px 10px; }
  .file-library-nav-body { gap: 8px; }
  .file-nav-section, .file-quick-list { display: none; }
  .file-nav-main { display: flex; gap: 8px; flex-wrap: wrap; overflow: visible; padding-bottom: 2px; }
  .file-nav-link { flex: 0 0 auto; width: auto; white-space: nowrap; padding: 8px 12px; }
  .file-nav-icon { width: auto; }
  .file-home-main { padding: 22px 16px 34px; }
  .file-home-title-row { align-items: flex-start; flex-direction: column; }
  .file-home-search { width: 100%; }
  .file-home-insights { grid-template-columns: 1fr; }
  .file-rec-grid { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 6px; }
  .file-rec-card { flex: 0 0 min(82vw, 360px); }
  .file-rec-body { grid-template-columns: 1fr 96px; }
  .file-recent-bar { align-items: flex-start; flex-direction: column; }
  .file-recent-left { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 3px; }
  .file-table-wrap { background: transparent; border: 0; border-radius: 0; overflow: visible; }
  .file-table, .file-table tbody, .file-table tr, .file-table td { display: block; width: 100%; }
  .file-table thead { display: none; }
  .file-table tr { background: #FFFFFF; border: 1px solid #E7E7E7; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .file-table td { border: 0; padding: 6px 16px; }

<script>
const WELCOME = {
  id: 'overview',
  title: 'Reading room',
  category: 'meta',
  sources: 0,
  updated_at: 'start here',
  content: `# Reading room\n\nThis is your team's *Memex* — a shared knowledge base that Claude reads, writes, and keeps in order. Sign in with your work account and start building.\n\n## The three motions\n\n- **Ingest** — paste an article, paper, or note. Claude reads it, summarizes it, and weaves new pages into the collection, cross-linking what relates.\n- **Query** — ask anything. Claude answers from what you've gathered, and can file the answer back as its own page so insight accumulates.\n- **Lint** — periodically ask Claude to audit the collection for contradictions, orphans, and gaps worth chasing.\n\n## To begin\n\nMove to the **Ingest** tab and feed it your first source. Watch the index on the left fill in.`
};

const CATS = {
  meta:     { label: 'Reading room', glyph: '◆' },
  concept:  { label: 'Concepts',     glyph: '◇' },
  entity:   { label: 'Entities',     glyph: '○' },
  source:   { label: 'Sources',      glyph: '▤' },
  analysis: { label: 'Analyses',     glyph: '✦' }
};
const CAT_ORDER = ['meta', 'concept', 'entity', 'source', 'analysis'];

let state = { pages: [WELCOME], activePage: 'overview', tab: 'files', log: [] };
let _kc = null; // Keycloak config { url, realm, clientId }
let currentUser = null; // { id, email, role, name }

// ingest mode state
let ingestMode = 'paste';
let extractedFileText = '';

// files tab state
let filesList = []; // cached list of uploaded files
let librariesList = []; // available libraries
let currentLibraryId = localStorage.getItem('memex_library_id') || null; // active library
let trashList = []; // cached list of trashed files
let fileView = 'active'; // 'active' | 'shared' | 'favorites' | 'trash' | 'links'
const RESUMABLE_UPLOAD_THRESHOLD = 16 * 1024 * 1024;
const RESUMABLE_CHUNK_SIZE = 8 * 1024 * 1024;
let selectedFileIds = new Set();
let lastRenderedFileIds = []; // file ids currently shown in the library table (for select-all)
let detailsPaneOpen = false;
let fileLayoutMode = localStorage.getItem('memex_file_layout') || 'list';
let currentFolderPath = '';
let securityStatus = null;
let fileLibraryNavCollapsed = localStorage.getItem('memex_library_nav_collapsed') === 'true';

// sidebar category filter
let activeCatFilter = null;

/* ---------- OIDC / PKCE helpers ---------- */

function _kcAuthUrl() { return `${_kc.url}/realms/${_kc.realm}/protocol/openid-connect`; }

function _generateVerifier() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function _generateChallenge(verifier) {
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function _hasValidToken() {
  const tok = localStorage.getItem('memex_access_token');
  const exp = parseInt(localStorage.getItem('memex_token_exp') || '0', 10);
  return !!tok && Date.now() < exp - 30_000;
}

async function _refreshToken() {
  const refresh = localStorage.getItem('memex_refresh_token');
  if (!refresh || !_kc) return false;
  try {
    const res = await fetch(`${_kcAuthUrl()}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: _kc.clientId, grant_type: 'refresh_token', refresh_token: refresh }),
    });
    if (!res.ok) { _clearTokens(); return false; }
    _storeTokens(await res.json());
    return true;
  } catch { _clearTokens(); return false; }
}

function _storeTokens(t) {
  localStorage.setItem('memex_access_token', t.access_token);
  if (t.refresh_token) localStorage.setItem('memex_refresh_token', t.refresh_token);
  localStorage.setItem('memex_token_exp', String(Date.now() + (t.expires_in || 300) * 1000));
}

function _clearTokens() {
  localStorage.removeItem('memex_access_token');
  localStorage.removeItem('memex_refresh_token');
  localStorage.removeItem('memex_token_exp');
}

async function handleOAuthCallback(code, returnedState) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const savedState = sessionStorage.getItem('oauth_state');
  sessionStorage.removeItem('pkce_verifier');
  sessionStorage.removeItem('oauth_state');
  if (!verifier || returnedState !== savedState) { toast('Sign-in failed: invalid state'); return; }
  try {
    const res = await fetch(`${_kcAuthUrl()}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: _kc.clientId, grant_type: 'authorization_code',
        code, redirect_uri: window.location.origin, code_verifier: verifier,
      }),
    });
    if (!res.ok) { toast('Sign-in failed'); return; }
    _storeTokens(await res.json());
  } catch (e) { toast('Sign-in error: ' + e.message); }
}

/* ---------- bootstrap ---------- */
async function initApp() {
  const savedTheme = localStorage.getItem('memex_theme');
  setTheme(savedTheme || 'light');

  let config;
  try {
    config = await fetch('/api/config', { signal: AbortSignal.timeout(5000) }).then(r => r.json());
  } catch (e) {
    document.getElementById('login-scrim').innerHTML = `<div class="modal login-modal"><div class="login-mark" aria-hidden="true">M</div><h2>Memex is offline</h2><p class="sub" style="color:var(--accent)">Could not reach the server. Check that the app container is running, then refresh this page.</p></div>`;
    setTheme(localStorage.getItem('memex_theme') || 'light');
    return;
  }

  _kc = { url: config.keycloakUrl, realm: config.keycloakRealm, clientId: config.keycloakClientId };

  if (config.version) {
    const versionEl = document.getElementById('app-menu-version');
    if (versionEl) versionEl.textContent = `Memex · ${config.version}`;
  }

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('code')) {
    await handleOAuthCallback(urlParams.get('code'), urlParams.get('state'));
    window.history.replaceState({}, '', window.location.pathname);
  }

  if (_hasValidToken()) {
    await _afterLogin();
  } else if (localStorage.getItem('memex_refresh_token')) {
    if (await _refreshToken()) await _afterLogin();
    else document.getElementById('login-scrim').classList.add('open');
  } else {
    document.getElementById('login-scrim').classList.add('open');
  }

}

async function _afterLogin() {
  document.documentElement.classList.remove('auth-locked');
  document.getElementById('login-scrim').classList.remove('open');
  await loadFromServer();
  currentUser = await apiGet('/auth/me');
  await loadLibraries();
  renderUserChip();
  applyRoleUI();
  loadSecurityStatus();
}

async function loadFromServer() {
  try {
    const pages = await apiGet('/pages');
    state.pages = [WELCOME, ...pages];
    if (!state.activePage) state.activePage = 'overview';
    renderIndex();
    await setTab('files');
  } catch (e) {
    toast('Could not load pages: ' + e.message);
  }
}

function applyRoleUI() {
  const role = currentUser?.role || 'viewer';
  // Admin tab: only admin
  document.querySelectorAll('.tab[data-tab="admin"]').forEach(el => {
    el.style.display = role === 'admin' ? '' : 'none';
  });
  document.querySelectorAll('.admin-menu-item').forEach(el => {
    el.style.display = role === 'admin' ? '' : 'none';
  });
  // Update user chip
  renderUserChip();
}

/* ---------- auth ---------- */
async function signIn(provider) {
  const verifier = _generateVerifier();
  const challenge = await _generateChallenge(verifier);
  const state = _generateVerifier();
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('oauth_state', state);
  const idpHint = { google: 'google', microsoft: 'microsoft' }[provider];
  const params = new URLSearchParams({
    client_id: _kc.clientId, redirect_uri: window.location.origin,
    response_type: 'code', scope: 'openid email profile',
    code_challenge: challenge, code_challenge_method: 'S256', state,
    ...(idpHint ? { kc_idp_hint: idpHint } : {}),
  });
  window.location.href = `${_kcAuthUrl()}/auth?${params}`;
}

async function signInPassword(ev) {
  if (ev) ev.preventDefault();
  const email = (document.getElementById("login-email").value || "").trim();
  const password = document.getElementById("login-password").value || "";
  if (!email || !password) { toast("Enter email and password"); return false; }
  try {
    const res = await fetch(`${_kcAuthUrl()}/token`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: _kc.clientId, grant_type: "password",
        scope: "openid email profile", username: email, password,
      }),
    });
    if (!res.ok) { toast("Sign-in failed — check your email and password"); return false; }
    _storeTokens(await res.json());
    await _afterLogin();
  } catch (e) { toast("Sign-in error: " + e.message); }
  return false;
}

async function signOut() {
  const refresh = localStorage.getItem('memex_refresh_token');
  _clearTokens();
  closeSettings();
  state = { pages: [WELCOME], activePage: 'overview', tab: 'files', log: [] };

      body: new URLSearchParams({ client_id: _kc.clientId, refresh_token: refresh }),
    }).catch(() => {});
  }
}

/* ---------- API helpers ---------- */
async function getToken() {
  if (!_hasValidToken()) {
    const ok = await _refreshToken();
    if (!ok) {
      document.getElementById('login-scrim').classList.add('open');
      throw new Error('Session expired — please sign in again');
    }
  }
  return localStorage.getItem('memex_access_token');
}

async function apiGet(path) {
  const res = await fetch('/api' + path, { headers: { Authorization: `Bearer ${await getToken()}` } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiPost(path, body, signal) {
  const opts = {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${await getToken()}` },
    body: JSON.stringify(body),
  };
  if (signal) opts.signal = signal;
  const res = await fetch('/api' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiPut(path, body) {
  const res = await fetch('/api' + path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${await getToken()}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiDelete(path) {
  const res = await fetch('/api' + path, { method: 'DELETE', headers: { Authorization: `Bearer ${await getToken()}` } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

let _streamController = null;
function stopStream() {
  if (_streamController) { _streamController.abort(); _streamController = null; }
}

let _ingestController = null;
function cancelIngest() {
  if (_ingestController) { _ingestController.abort(); _ingestController = null; }
}

async function streamFromApi(path, body, el) {
  _streamController = new AbortController();
  let res;
  try {
    res = await fetch('/api' + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${await getToken()}` },
      body: JSON.stringify(body),
      signal: _streamController.signal,
    });
  } catch (e) {
    if (e.name === 'AbortError') { el.classList.remove('cursor', 'dim'); return null; }
    throw e;
  }
  if (!res.ok) { el.textContent = 'Error ' + res.status + ': ' + (await res.text()).slice(0, 200); return null; }

  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let text = '', buf = '', saved = null;
  el.classList.remove('dim'); el.classList.add('cursor');

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n');
      buf = parts.pop();
      for (const line of parts) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const d = JSON.parse(data);
          if (d.text)  { text += d.text; el.textContent = text; }
          if (d.saved) { saved = d.saved; }
          if (d.error) { el.textContent = 'Error: ' + d.error; el.classList.remove('cursor'); return null; }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') throw e;
  } finally {
    _streamController = null;
    el.classList.remove('cursor');
  }
  return { text, saved };
}

function setCatFilter(cat) {
  activeCatFilter = activeCatFilter === cat ? null : cat;
  renderIndex(document.getElementById('page-search')?.value || '');

function renderIndex(filter = '') {
  const filterLower = filter.toLowerCase();
  const visiblePages = state.pages.filter(p => p.id !== 'overview');
  document.getElementById('page-count').textContent = visiblePages.length;

  // Render category filter pills (only categories that have pages)
  const usedCats = [...new Set(visiblePages.map(p => p.category))];
  const filterEl = document.getElementById('cat-filter');
  if (filterEl && usedCats.length > 1) {
    filterEl.innerHTML = CAT_ORDER
      .filter(c => usedCats.includes(c))
      .map(c => `<button class="cat-pill ${activeCatFilter === c ? 'active' : ''}" onclick="setCatFilter('${c}')">${CATS[c]?.glyph || ''} ${CATS[c]?.label || c}</button>`)
      .join('');
  } else if (filterEl) {
    filterEl.innerHTML = '';
  }

  // Filter pages by title text + active category
  const filtered = state.pages.filter(p => {
    if (p.id === 'overview') return activeCatFilter === null;
    if (activeCatFilter && p.category !== activeCatFilter) return false;
    if (!filter) return true;
    return p.title.toLowerCase().includes(filterLower);
  });

  const groups = {};
  filtered.forEach(p => { (groups[p.category] = groups[p.category] || []).push(p); });
  let html = '';
  CAT_ORDER.forEach(cat => {
    if (!groups[cat]) return;
    const showLabel = !activeCatFilter;
    if (showLabel) html += `<div class="cat-group"><div class="cat-label">${CATS[cat]?.label || cat}</div>`;
    else html += `<div class="cat-group">`;
    groups[cat].forEach(p => {
      const active = p.id === state.activePage && state.tab === 'read';
      html += `<div class="page-link ${active ? 'active' : ''} ${p.fresh ? 'fresh' : ''}" onclick="openPage('${p.id}')">
        <span class="dot">●</span><span>${esc(p.title)}</span></div>`;
    });
    html += `</div>`;
  });
  document.getElementById('index-body').innerHTML = html || `<div class="empty-index">${filter ? 'No pages match.' : activeCatFilter ? 'No pages in this category.' : 'Nothing filed yet.'}</div>`;
}

/* ---------- markdown ---------- */
function esc(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

function emptyState(title, text, action = '') {
  return `<div class="file-empty-home"><div class="file-empty-title">${esc(title)}</div><div class="file-empty-text">${esc(text)}</div>${action ? `<div class="file-empty-actions">${action}</div>` : ''}</div>`;
}

function mdToHtml(md) {
  // 1. Extract fenced code blocks before escaping
  const codeBlocks = [];
  const withPlaceholders = (md || '').replace(/```([^\n]*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang.trim(), code });
    return `\x00${idx}\x00`;
  });

  // 2. HTML-escape remaining text
  let s = esc(withPlaceholders);

  // 3. Remove # Title line
  s = s.replace(/^# .+$/gm, '');

  // 4. Process line by line
  const lines = s.split('\n');
  let out = '';
  let inUl = false, inOl = false, inTable = false, tableHasHead = false;

  function closeOpenLists() {
    if (inUl) { out += '</ul>'; inUl = false; }
    if (inOl) { out += '</ol>'; inOl = false; }
  }
  function closeTable() {
    if (inTable) { out += '</tbody></table>'; inTable = false; tableHasHead = false; }
  }

  for (let raw of lines) {
    // Check for code block placeholder
    const placeholderMatch = raw.match(/^\x00(\d+)\x00$/);
    if (placeholderMatch) {
      closeOpenLists();
      closeTable();
      const { lang, code } = codeBlocks[parseInt(placeholderMatch[1])];
      const langAttr = lang ? ` class="language-${esc(lang)}"` : '';
      out += `<pre><code${langAttr}>${esc(code)}</code></pre>`;
      continue;
    }

    // Apply inline transforms
    let line = raw;
    // inline code (single backtick) — must be done before other transforms
    line = line.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    line = line.replace(/\*(.+?)\*/g, '<em>$1</em>');
    line = line.replace(/\[\[(.+?)\]\]/g, (_, t) => `<a class="cross-link" data-page="${t.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="gotoTitle(this.dataset.page)">${esc(t)}</a>`);
    line = line.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Block-level detection on raw line
    if (/^### /.test(raw)) {
      closeOpenLists(); closeTable();
      out += '<h3>' + line.replace(/^### /, '') + '</h3>';
    } else if (/^## /.test(raw)) {
      closeOpenLists(); closeTable();
      out += '<h2>' + line.replace(/^## /, '') + '</h2>';
    } else if (/^---+$/.test(raw.trim())) {
      closeOpenLists(); closeTable();
      out += '<hr>';
    } else if (/^\|/.test(raw) && raw.trim().endsWith('|')) {
      // Table row
      closeOpenLists();
      const cells = raw.split('|').slice(1, -1).map(c => c.trim());
      // Check if this is a separator row (e.g. | --- | --- |)
      const isSep = cells.every(c => /^[-: ]+$/.test(c));
      if (isSep) {
        // separator — switch from thead to tbody
        if (!tableHasHead) { out += '</thead><tbody>'; tableHasHead = true; }
      } else if (!inTable) {
        // First row: open table, start thead
        closeTable();
        inTable = true;
        tableHasHead = false;
        out += '<table><thead><tr>';
        cells.forEach(c => { out += `<th>${applyInline(c)}</th>`; });
        out += '</tr>';
      } else if (tableHasHead) {
        // Body row
        out += '<tr>';
        cells.forEach(c => { out += `<td>${applyInline(c)}</td>`; });
        out += '</tr>';
      }
    } else if (/^\d+\. /.test(raw)) {
      closeTable();
      if (inUl) { out += '</ul>'; inUl = false; }
      if (!inOl) { out += '<ol>'; inOl = true; }
      out += '<li>' + line.replace(/^\d+\. /, '') + '</li>';
    } else if (/^- /.test(raw)) {
      closeTable();
      if (inOl) { out += '</ol>'; inOl = false; }
      if (!inUl) { out += '<ul>'; inUl = true; }
      out += '<li>' + line.replace(/^- /, '') + '</li>';
    } else if (raw.trim() === '') {
      closeOpenLists();
      closeTable();
    } else {
      closeOpenLists();
      closeTable();
      out += '<p>' + line + '</p>';
    }
  }

  closeOpenLists();
  closeTable();
  return out;
}

// Helper: apply inline transforms to a string (for use inside table cells etc.)
function applyInline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/\[\[(.+?)\]\]/g, (_, t) => `<a class="cross-link" data-page="${t.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="gotoTitle(this.dataset.page)">${esc(t)}</a>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function gotoTitle(title) {
  const p = state.pages.find(pg => pg.title.toLowerCase() === title.toLowerCase());
  if (p) openPage(p.id); else toast('No page yet: ' + title);
}

/* ---------- tabs / routing ---------- */
async function setTab(tab) {
  if (tab === 'read') tab = 'files';
  state.tab = tab;
  document.documentElement.classList.add('file-home-mode');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'files') { await renderFiles(); return; }
  if (tab === 'ingest') { renderIngest(); return; }
  if (tab === 'query') { renderQuery(); return; }
  if (tab === 'lint') { renderLint(); return; }
  if (tab === 'admin') { await renderAdmin(); return; }
}

function openPage(id) {
  const page = state.pages.find(p => p.id === id);
  if (!page) {
    state.tab = 'read';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'read'));
    document.getElementById('panel').innerHTML = `<div class="panel article" style="padding-top:48px">
      <h1 style="font-family:var(--display);font-weight:600;font-size:32px;margin-bottom:12px">Page not found</h1>
      <p class="note" style="margin-bottom:24px">This page doesn't exist or may have been deleted.</p>
      <button class="ghost-btn" onclick="setTab('files')">Go to Files</button>
    </div>`;
    renderIndex();
    return;
  }
  state.activePage = page.id;
  state.tab = 'read';
  page.fresh = false;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'read'));
  const updated = page.updated_at
    ? (page.updated_at === 'start here' ? 'start here' : new Date(page.updated_at).toLocaleDateString([], { month: 'short', day: 'numeric' }))
    : '';

  const canEdit = currentUser?.role === 'admin' || currentUser?.role === 'contributor';
  const editButton = page.id !== 'overview' && canEdit
    ? `<button class="edit-btn" onclick="editPage('${page.id}')">Edit</button>`
    : '';
  const historyButton = page.id !== 'overview' && canEdit
    ? `<button class="edit-btn" style="margin-left:6px" onclick="showHistory('${page.id}')">History</button>`
    : '';

  document.getElementById('panel').innerHTML = `<article class="panel article">
    <div class="kicker">
      <span>${CATS[page.category]?.glyph || '◇'} ${page.category}</span>
      <span class="sep">${page.sources || 0} source${page.sources === 1 ? '' : 's'}</span>
      <span class="sep">${esc(updated)}</span>
      ${editButton}${historyButton}
    </div>
    <h1>${esc(page.title)}</h1>
    <div class="prose">${mdToHtml(page.content)}</div>
  </article>`;
  renderIndex();
  if (document.documentElement.classList.contains('file-home-mode')) wrapPanelInFileHome('read');
}

/* ---------- page editing ---------- */
function editPage(id) {
  const page = state.pages.find(p => p.id === id);
  if (!page) return;

  const catOptions = ['concept', 'entity', 'source', 'analysis'].map(c =>
    `<option value="${c}" ${page.category === c ? 'selected' : ''}>${CATS[c]?.label || c}</option>`
  ).join('');

  document.getElementById('panel').innerHTML = `<div class="panel">
    <div class="field">
      <label class="field-label">Title</label>
      <input type="text" id="edit-title" value="${esc(page.title)}">
    </div>
    <div class="field">
      <label class="field-label">Category</label>
      <select id="edit-category">${catOptions}</select>
    </div>
    <div class="field">
      <label class="field-label">Content</label>
      <textarea id="edit-content" style="font-family:var(--mono);font-size:13px;min-height:360px">${esc(page.content)}</textarea>
    </div>
    <div class="btn-row">
      <button class="run-btn" onclick="savePage('${id}')">Save</button>
      <button class="ghost-btn" onclick="openPage('${id}')">Cancel</button>
      ${currentUser?.role === 'admin' ? `<button class="delete-btn" onclick="deletePage('${id}')">Delete</button>` : ''}
    </div>
  </div>`;
  if (document.documentElement.classList.contains('file-home-mode')) wrapPanelInFileHome('read');
}

async function savePage(id) {
  if (currentUser?.role === 'viewer') { toast('Viewers cannot edit pages'); return; }
  const page = state.pages.find(p => p.id === id);
  if (!page) return;
  const title = document.getElementById('edit-title').value.trim();
  const category = document.getElementById('edit-category').value;
  const content = document.getElementById('edit-content').value;
  if (!title) { toast('Title is required'); return; }
  try {
    const updated = await apiPut('/pages/' + id, { ...page, title, category, content });
    const idx = state.pages.findIndex(p => p.id === id);
    if (idx >= 0) state.pages[idx] = updated;
    renderIndex();
    openPage(id);
    toast('Saved');
  } catch (e) { toast('Save failed: ' + e.message); }
}

async function deletePage(id) {
  if (currentUser?.role !== 'admin') { toast('Only admins can delete pages'); return; }
  if (!confirm('Delete this page? This cannot be undone.')) return;
  try {
    await apiDelete('/pages/' + id);
    state.pages = state.pages.filter(p => p.id !== id);
    renderIndex();
    const next = state.pages.find(p => p.id !== 'overview') || state.pages[0];
    openPage(next.id);
    toast('Page deleted');
  } catch (e) { toast('Delete failed: ' + e.message); }
}

/* ---------- version history ---------- */
async function showHistory(id) {
  const page = state.pages.find(p => p.id === id);
  document.getElementById('panel').innerHTML = `<div class="panel">
    <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:24px">
      <h2 style="font-family:var(--display);font-size:26px;font-weight:600">History</h2>
      <span style="font-family:var(--body);font-size:17px;color:var(--ink-soft)">${esc(page?.title || '')}</span>
      <button class="ghost-btn" style="margin-left:auto;padding:6px 12px" onclick="openPage('${id}')">Back</button>
    </div>
    <div id="version-list"><div class="note placeholder">Loading…</div></div>
  </div>`;
  if (document.documentElement.classList.contains('file-home-mode')) wrapPanelInFileHome('read');

  try {
    const versions = await apiGet('/pages/' + id + '/versions');
    const el = document.getElementById('version-list');
    if (!versions.length) { el.innerHTML = '<p class="note placeholder">No saved versions yet.</p>'; return; }
    el.innerHTML = versions.map(v => {
      const d = new Date(v.saved_at).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div class="version-row">
        <div class="version-meta">
          <span class="version-date">${d}</span>
          <span class="version-who">${esc(v.saved_by_email || 'unknown')}</span>
        </div>
        <div class="version-title">${esc(v.title)}</div>
        <div class="version-actions">
          <button class="ghost-btn" style="padding:5px 12px" onclick="previewVersion('${id}','${v.id}')">Preview</button>
          <button class="ghost-btn" style="padding:5px 12px" onclick="restoreVersion('${id}','${v.id}')">Restore</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) { document.getElementById('version-list').innerHTML = '<p class="note" style="color:var(--accent)">Could not load history: ' + esc(e.message) + '</p>'; }
}

async function previewVersion(pageId, versionId) {
  try {
    const versions = await apiGet('/pages/' + pageId + '/versions');
    const v = versions.find(x => x.id === versionId);
    if (!v) return;
    document.getElementById('version-preview-scrim').classList.add('open');
    document.getElementById('version-preview-title').textContent = v.title;
    document.getElementById('version-preview-body').innerHTML = mdToHtml(v.content);
    document.getElementById('version-preview-restore').onclick = () => restoreVersion(pageId, versionId);
  } catch (e) { toast('Could not load version: ' + e.message); }
}

async function restoreVersion(pageId, versionId) {
  if (!confirm('Restore this version? The current content will be saved as a version first.')) return;
  try {
    const updated = await apiPost('/pages/' + pageId + '/restore/' + versionId, {});
    const idx = state.pages.findIndex(p => p.id === pageId);
    if (idx >= 0) state.pages[idx] = updated;
    document.getElementById('version-preview-scrim')?.classList.remove('open');
    renderIndex();
    openPage(pageId);
    toast('Version restored');
  } catch (e) { toast('Restore failed: ' + e.message); }
}

function setIngestMode(mode) {

function handleFileDrop(event) {

}

function handleFileInputChange(event) {
  const file = event.target.files?.[0];
  if (file) handleFileSelect(file, false);
}

async function handleFileSelect(file, intoPasteArea) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['txt', 'md', 'pdf'].includes(ext)) {
    toast('Only .txt, .md, and .pdf files supported');
    return;
  }

  if (ext === 'pdf') {
    try {
      const formData = new FormData();
      formData.append('file', file);
      const token = await getToken();
      const res = await fetch('/api/ai/extract', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData,
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      extractedFileText = data.text || '';
      const statusEl = document.getElementById('file-status');
      if (statusEl) statusEl.textContent = `Extracted ${extractedFileText.length.toLocaleString()} characters from ${file.name}`;
    } catch (e) {
      toast('PDF extraction failed: ' + e.message);
    }
  } else {
    // txt or md
    const text = await file.text();
    extractedFileText = text;
    if (intoPasteArea) {
      const srcEl = document.getElementById('src');
      if (srcEl) srcEl.value = text;
    } else {
      const statusEl = document.getElementById('file-status');
      if (statusEl) statusEl.textContent = `Loaded ${text.length.toLocaleString()} characters from ${file.name}`;
    }
  }
}

async function doIngest() {
  if (currentUser?.role === 'viewer') { toast('Viewers cannot ingest content'); return; }
  const focus = document.getElementById('focus').value.trim();
  const btn = document.getElementById('ingest-go');
  const cancelBtn = document.getElementById('ingest-cancel');

  let body;
  if (ingestMode === 'url') {
    const urlValue = (document.getElementById('src-url')?.value || '').trim();
    if (!urlValue) { toast('Enter a URL first'); return; }
    body = { url: urlValue, focus };
  } else if (ingestMode === 'file') {
    if (!extractedFileText) { toast('Select a file first'); return; }
    body = { source: extractedFileText, focus };
  } else {
    const src = (document.getElementById('src')?.value || '').trim();
    if (!src) { toast('Paste a source first'); return; }
    body = { source: src, focus };
  }

  const statusMsg = ingestMode === 'url' ? 'Fetching the URL and reading…'
    : ingestMode === 'file' ? 'Extracting and reading the file…'
    : 'Reading the source…';

  btn.disabled = true; btn.textContent = 'Reading…';
  if (cancelBtn) cancelBtn.style.display = '';
  document.getElementById('ingest-result').style.display = 'block';
  const sum = document.getElementById('ingest-summary');
  sum.className = 'response dim'; sum.textContent = statusMsg;
  document.getElementById('ingest-chips').innerHTML = '';

  _ingestController = new AbortController();
  try {
    const result = await apiPost('/ai/ingest', body, _ingestController.signal);
    sum.className = 'response'; sum.textContent = result.summary;

    for (const p of (result.pages || [])) {
      const idx = state.pages.findIndex(e => e.id === p.id);
      if (idx >= 0) state.pages[idx] = { ...p, fresh: true };
      else state.pages.push({ ...p, fresh: true });
    }

    document.getElementById('ingest-chips').innerHTML = (result.pages || [])
      .map(p => `<span class="chip" data-pid="${p.id}" onclick="openPage(this.dataset.pid)">${esc(p.title)}</span>`).join('');
    renderIndex();
    if (ingestMode === 'paste') {
      const srcEl = document.getElementById('src');
      if (srcEl) srcEl.value = '';
    }
    extractedFileText = '';
    renderLog();
  } catch (e) {
    if (e.name === 'AbortError') {
      sum.className = 'response'; sum.textContent = 'Cancelled.';
    } else {
      sum.className = 'response'; sum.textContent = 'Could not process this source. ' + (e.message || '');
    }
  } finally {
    btn.disabled = false; btn.textContent = 'Read & file';
    if (cancelBtn) cancelBtn.style.display = 'none';
    _ingestController = null;
  }
}

function fmtBytes(bytes) {
  const b = bytes || 0;
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
}

async function saveAISettings() {

  const key = document.getElementById('cfg-ai-key').value;
  try {

    if (key.trim()) body.anthropic_api_key = key;

async function saveStorageSettings() {
  const provider = document.getElementById('cfg-storage-provider').value;
  const body = { storage_provider: provider };
  if (provider === 'local') {
    body.storage_local_path = document.getElementById('cfg-local-path').value;
  } else if (provider === 's3') {
    body.storage_s3_bucket = document.getElementById('cfg-s3-bucket').value;
    body.storage_s3_region = document.getElementById('cfg-s3-region').value;
    body.storage_s3_endpoint = document.getElementById('cfg-s3-endpoint').value;
    body.storage_s3_force_path_style = document.getElementById('cfg-s3-path-style').value;
    const ak = document.getElementById('cfg-s3-access-key').value;
    const sk = document.getElementById('cfg-s3-secret').value;
    if (ak.trim()) body.storage_s3_access_key_id = ak;
    if (sk.trim()) body.storage_s3_secret_access_key = sk;
  } else if (provider === 'supabase') {
    body.supabase_url = document.getElementById('cfg-supa-url').value;
    const supaKey = document.getElementById('cfg-supa-key').value;
    if (supaKey.trim()) body.supabase_service_role_key = supaKey;
  }
  try {
    await apiPut('/admin/settings', body);
    toast('Storage settings saved — server will use new provider on next request');
    document.getElementById('cfg-s3-access-key').value = '';
    document.getElementById('cfg-s3-secret').value = '';
    document.getElementById('cfg-supa-key').value = '';
  } catch (e) { toast('Save failed: ' + e.message); }
}

function generateEncKey() {
  const bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);
  const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  const el = document.getElementById('cfg-enc-key');
  el.value = hex;
  el.type = 'text';
  setTimeout(() => { el.type = 'password'; }, 8000);
  toast('Key generated — copy it somewhere safe, then click Save. It will be hidden in 8 seconds.');
}

async function saveEncryptionSettings() {

/* ---------- query ---------- */
async function doQuery(fileIt) {
  const q = document.getElementById('q').value.trim();
  if (!q) { toast('Type a question first'); return; }
  document.getElementById('query-result').style.display = 'block';
  const ans = document.getElementById('query-answer');
  ans.className = 'response dim'; ans.textContent = 'Searching…';

  const goBtn = document.getElementById('query-go');
  const saveBtn = document.getElementById('query-save');
  const stopBtn = document.getElementById('query-stop');
  goBtn.disabled = saveBtn.disabled = true;
  if (stopBtn) stopBtn.style.display = '';

  const result = await streamFromApi('/ai/query', { question: q, fileIt }, ans);

  goBtn.disabled = saveBtn.disabled = false;
  if (stopBtn) stopBtn.style.display = 'none';

  if (result?.saved) {
    const saved = result.saved;
    state.pages.push({ ...saved, fresh: true });
    renderIndex();
    toast('Filed as: ' + saved.title);
  }
}
