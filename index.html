/* ---------- markdown ---------- */
function esc(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

function emptyState(title, text, action = '') {
  return `<div class="file-empty-home"><div class="file-empty-title">${esc(title)}</div><div class="file-empty-text">${esc(text)}</div>${action ? `<div class="file-empty-actions">${action}</div>` : ''}</div>`;
}

function mdToHtml(md) {
  // 1. Extract fenced code blocks before escaping
  const codeBlocks = [];
  const withPlaceholders = (md || '').replace(/```([^\n]*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push({ lang: lang.trim(), code });
    return `\x00${idx}\x00`;
  });

  // 2. HTML-escape remaining text
  let s = esc(withPlaceholders);

  // 3. Remove # Title line
  s = s.replace(/^# .+$/gm, '');

  // 4. Process line by line
  const lines = s.split('\n');
  let out = '';
  let inUl = false, inOl = false, inTable = false, tableHasHead = false;

  function closeOpenLists() {
    if (inUl) { out += '</ul>'; inUl = false; }
    if (inOl) { out += '</ol>'; inOl = false; }
  }
  function closeTable() {
    if (inTable) { out += '</tbody></table>'; inTable = false; tableHasHead = false; }
  }

  for (let raw of lines) {
    // Check for code block placeholder
    const placeholderMatch = raw.match(/^\x00(\d+)\x00$/);
    if (placeholderMatch) {
      closeOpenLists();
      closeTable();
      const { lang, code } = codeBlocks[parseInt(placeholderMatch[1])];
      const langAttr = lang ? ` class="language-${esc(lang)}"` : '';
      out += `<pre><code${langAttr}>${esc(code)}</code></pre>`;
      continue;
    }

    // Apply inline transforms
    let line = raw;
    // inline code (single backtick) — must be done before other transforms
    line = line.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    line = line.replace(/\*(.+?)\*/g, '<em>$1</em>');
    line = line.replace(/\[\[(.+?)\]\]/g, (_, t) => `<a class="cross-link" data-page="${t.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="gotoTitle(this.dataset.page)">${esc(t)}</a>`);
    line = line.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Block-level detection on raw line
    if (/^### /.test(raw)) {
      closeOpenLists(); closeTable();
      out += '<h3>' + line.replace(/^### /, '') + '</h3>';
    } else if (/^## /.test(raw)) {
      closeOpenLists(); closeTable();
      out += '<h2>' + line.replace(/^## /, '') + '</h2>';
    } else if (/^---+$/.test(raw.trim())) {
      closeOpenLists(); closeTable();
      out += '<hr>';
    } else if (/^\|/.test(raw) && raw.trim().endsWith('|')) {
      // Table row
      closeOpenLists();
      const cells = raw.split('|').slice(1, -1).map(c => c.trim());
      // Check if this is a separator row (e.g. | --- | --- |)
      const isSep = cells.every(c => /^[-: ]+$/.test(c));
      if (isSep) {
        // separator — switch from thead to tbody
        if (!tableHasHead) { out += '</thead><tbody>'; tableHasHead = true; }
      } else if (!inTable) {
        // First row: open table, start thead
        closeTable();
        inTable = true;
        tableHasHead = false;
        out += '<table><thead><tr>';
        cells.forEach(c => { out += `<th>${applyInline(c)}</th>`; });
        out += '</tr>';
      } else if (tableHasHead) {
        // Body row
        out += '<tr>';
        cells.forEach(c => { out += `<td>${applyInline(c)}</td>`; });
        out += '</tr>';
      }
    } else if (/^\d+\. /.test(raw)) {
      closeTable();
      if (inUl) { out += '</ul>'; inUl = false; }
      if (!inOl) { out += '<ol>'; inOl = true; }
      out += '<li>' + line.replace(/^\d+\. /, '') + '</li>';
    } else if (/^- /.test(raw)) {
      closeTable();
      if (inOl) { out += '</ol>'; inOl = false; }
      if (!inUl) { out += '<ul>'; inUl = true; }
      out += '<li>' + line.replace(/^- /, '') + '</li>';
    } else if (raw.trim() === '') {
      closeOpenLists();
      closeTable();
    } else {
      closeOpenLists();
      closeTable();
      out += '<p>' + line + '</p>';
    }
  }

  closeOpenLists();
  closeTable();
  return out;
}

// Helper: apply inline transforms to a string (for use inside table cells etc.)
function applyInline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/\[\[(.+?)\]\]/g, (_, t) => `<a class="cross-link" data-page="${t.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}" onclick="gotoTitle(this.dataset.page)">${esc(t)}</a>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function gotoTitle(title) {
  const p = state.pages.find(pg => pg.title.toLowerCase() === title.toLowerCase());
  if (p) openPage(p.id); else toast('No page yet: ' + title);
}

/* ---------- tabs / routing ---------- */
async function setTab(tab) {
  if (tab === 'read') tab = 'files';
  state.tab = tab;
  document.documentElement.classList.add('file-home-mode');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (tab === 'files') await renderFiles();
  else if (tab === 'ingest') renderIngest();
  else if (tab === 'query') renderQuery();
  else if (tab === 'lint') renderLint();
  else if (tab === 'admin') await renderAdmin();
  navPush();
}

function openPage(id) {
  const page = state.pages.find(p => p.id === id);
  if (!page) {
    state.tab = 'read';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'read'));
    document.getElementById('panel').innerHTML = `<div class="panel article" style="padding-top:48px">
      <h1 style="font-family:var(--display);font-weight:600;font-size:32px;margin-bottom:12px">Page not found</h1>
      <p class="note" style="margin-bottom:24px">This page doesn't exist or may have been deleted.</p>
      <button class="ghost-btn" onclick="setTab('files')">Go to Files</button>
    </div>`;
    renderIndex();
    return;
  }
  state.activePage = page.id;
  state.tab = 'read';
  page.fresh = false;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'read'));
  navPush();
  const updated = page.updated_at
    ? (page.updated_at === 'start here' ? 'start here' : new Date(page.updated_at).toLocaleDateString([], { month: 'short', day: 'numeric' }))
    : '';

  const canEdit = currentUser?.role === 'admin' || currentUser?.role === 'contributor';
  const editButton = page.id !== 'overview' && canEdit
    ? `<button class="edit-btn" onclick="editPage('${page.id}')">Edit</button>`
    : '';
  const historyButton = page.id !== 'overview' && canEdit
    ? `<button class="edit-btn" style="margin-left:6px" onclick="showHistory('${page.id}')">History</button>`
    : '';

  document.getElementById('panel').innerHTML = `<article class="panel article">
    <div class="kicker">
      <span>${CATS[page.category]?.glyph || '◇'} ${page.category}</span>
      <span class="sep">${page.sources || 0} source${page.sources === 1 ? '' : 's'}</span>
      <span class="sep">${esc(updated)}</span>
      ${editButton}${historyButton}
    </div>
    <h1>${esc(page.title)}</h1>
    <div class="prose">${mdToHtml(page.content)}</div>
  </article>`;
  renderIndex();
  if (document.documentElement.classList.contains('file-home-mode')) wrapPanelInFileHome('read');
}

/* ---------- page editing ---------- */
function editPage(id) {
  const page = state.pages.find(p => p.id === id);
  if (!page) return;

  const catOptions = ['concept', 'entity', 'source', 'analysis'].map(c =>
    `<option value="${c}" ${page.category === c ? 'selected' : ''}>${CATS[c]?.label || c}</option>`
  ).join('');

  document.getElementById('panel').innerHTML = `<div class="panel">
    <div class="field">
      <label class="field-label">Title</label>
      <input type="text" id="edit-title" value="${esc(page.title)}">
    </div>
    <div class="field">
      <label class="field-label">Category</label>
      <select id="edit-category">${catOptions}</select>
    </div>
    <div class="field">
      <label class="field-label">Content</label>
      <textarea id="edit-content" style="font-family:var(--mono);font-size:13px;min-height:360px">${esc(page.content)}</textarea>
    </div>
    <div class="btn-row">
      <button class="run-btn" onclick="savePage('${id}')">Save</button>
      <button class="ghost-btn" onclick="openPage('${id}')">Cancel</button>
      ${currentUser?.role === 'admin' ? `<button class="delete-btn" onclick="deletePage('${id}')">Delete</button>` : ''}
    </div>
  </div>`;
  if (document.documentElement.classList.contains('file-home-mode')) wrapPanelInFileHome('read');
}

async function savePage(id) {
  if (currentUser?.role === 'viewer') { toast('Viewers cannot edit pages'); return; }
  const page = state.pages.find(p => p.id === id);
  if (!page) return;
  const title = document.getElementById('edit-title').value.trim();
  const category = document.getElementById('edit-category').value;
  const content = document.getElementById('edit-content').value;
  if (!title) { toast('Title is required'); return; }
  try {
    const updated = await apiPut('/pages/' + id, { ...page, title, category, content });
    const idx = state.pages.findIndex(p => p.id === id);
    if (idx >= 0) state.pages[idx] = updated;
    renderIndex();
    openPage(id);
    toast('Saved');
  } catch (e) { toast('Save failed: ' + e.message); }
}

async function deletePage(id) {
  if (currentUser?.role !== 'admin') { toast('Only admins can delete pages'); return; }
  if (!confirm('Delete this page? This cannot be undone.')) return;
  try {
    await apiDelete('/pages/' + id);
    state.pages = state.pages.filter(p => p.id !== id);
    renderIndex();
    const next = state.pages.find(p => p.id !== 'overview') || state.pages[0];
    openPage(next.id);
    toast('Page deleted');
  } catch (e) { toast('Delete failed: ' + e.message); }
}

/* ---------- version history ---------- */
async function showHistory(id) {
  const page = state.pages.find(p => p.id === id);
  document.getElementById('panel').innerHTML = `<div class="panel">
    <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:24px">
      <h2 style="font-family:var(--display);font-size:26px;font-weight:600">History</h2>
      <span style="font-family:var(--body);font-size:17px;color:var(--ink-soft)">${esc(page?.title || '')}</span>
      <button class="ghost-btn" style="margin-left:auto;padding:6px 12px" onclick="openPage('${id}')">Back</button>
    </div>
    <div id="version-list"><div class="note placeholder">Loading…</div></div>
  </div>`;
  if (document.documentElement.classList.contains('file-home-mode')) wrapPanelInFileHome('read');

  try {
    const versions = await apiGet('/pages/' + id + '/versions');
    const el = document.getElementById('version-list');
    if (!versions.length) { el.innerHTML = '<p class="note placeholder">No saved versions yet.</p>'; return; }
    el.innerHTML = versions.map(v => {
      const d = new Date(v.saved_at).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div class="version-row">
        <div class="version-meta">
          <span class="version-date">${d}</span>
          <span class="version-who">${esc(v.saved_by_email || 'unknown')}</span>
        </div>
        <div class="version-title">${esc(v.title)}</div>
        <div class="version-actions">
          <button class="ghost-btn" style="padding:5px 12px" onclick="previewVersion('${id}','${v.id}')">Preview</button>
          <button class="ghost-btn" style="padding:5px 12px" onclick="restoreVersion('${id}','${v.id}')">Restore</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) { document.getElementById('version-list').innerHTML = '<p class="note" style="color:var(--accent)">Could not load history: ' + esc(e.message) + '</p>'; }
}

async function previewVersion(pageId, versionId) {
  try {
    const versions = await apiGet('/pages/' + pageId + '/versions');
    const v = versions.find(x => x.id === versionId);
    if (!v) return;
    document.getElementById('version-preview-scrim').classList.add('open');
    document.getElementById('version-preview-title').textContent = v.title;
    document.getElementById('version-preview-body').innerHTML = mdToHtml(v.content);
    document.getElementById('version-preview-restore').onclick = () => restoreVersion(pageId, versionId);
  } catch (e) { toast('Could not load version: ' + e.message); }
}

async function restoreVersion(pageId, versionId) {
  if (!confirm('Restore this version? The current content will be saved as a version first.')) return;
  try {
    const updated = await apiPost('/pages/' + pageId + '/restore/' + versionId, {});
    const idx = state.pages.findIndex(p => p.id === pageId);
    if (idx >= 0) state.pages[idx] = updated;
    document.getElementById('version-preview-scrim')?.classList.remove('open');
    renderIndex();
    openPage(pageId);
    toast('Version restored');
  } catch (e) { toast('Restore failed: ' + e.message); }
}

           ondragover="event.preventDefault();this.classList.add('drag-over')"

function handleFileDrop(event) {
  event.preventDefault();
  document.getElementById('file-drop-zone').classList.remove('drag-over');
  const file = event.dataTransfer?.files?.[0];
  if (file) handleFileSelect(file, false);
}

function handleFileInputChange(event) {
  const file = event.target.files?.[0];
  if (file) handleFileSelect(file, false);
}

async function handleFileSelect(file, intoPasteArea) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['txt', 'md', 'pdf'].includes(ext)) {
    toast('Only .txt, .md, and .pdf files supported');
    return;
  }

  if (ext === 'pdf') {
    try {
      const formData = new FormData();
      formData.append('file', file);
      const token = await getToken();
      const res = await fetch('/api/ai/extract', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData,
      });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      extractedFileText = data.text || '';
      const statusEl = document.getElementById('file-status');
      if (statusEl) statusEl.textContent = `Extracted ${extractedFileText.length.toLocaleString()} characters from ${file.name}`;
    } catch (e) {
      toast('PDF extraction failed: ' + e.message);
    }
  } else {
    // txt or md
    const text = await file.text();
    extractedFileText = text;
    if (intoPasteArea) {
      const srcEl = document.getElementById('src');
      if (srcEl) srcEl.value = text;
    } else {
      const statusEl = document.getElementById('file-status');
      if (statusEl) statusEl.textContent = `Loaded ${text.length.toLocaleString()} characters from ${file.name}`;
    }
  }
}

async function doIngest() {
  if (currentUser?.role === 'viewer') { toast('Viewers cannot ingest content'); return; }
  const focus = document.getElementById('focus').value.trim();
  const btn = document.getElementById('ingest-go');
  const cancelBtn = document.getElementById('ingest-cancel');

  let body;
  if (ingestMode === 'url') {
    const urlValue = (document.getElementById('src-url')?.value || '').trim();
    if (!urlValue) { toast('Enter a URL first'); return; }
    body = { url: urlValue, focus };
  } else if (ingestMode === 'file') {
    if (!extractedFileText) { toast('Select a file first'); return; }
    body = { source: extractedFileText, focus };
  } else {
    const src = (document.getElementById('src')?.value || '').trim();
    if (!src) { toast('Paste a source first'); return; }
    body = { source: src, focus };
  }

  const statusMsg = ingestMode === 'url' ? 'Fetching the URL and reading…'
    : ingestMode === 'file' ? 'Extracting and reading the file…'
    : 'Reading the source…';

  btn.disabled = true; btn.textContent = 'Reading…';
  if (cancelBtn) cancelBtn.style.display = '';
  document.getElementById('ingest-result').style.display = 'block';
  const sum = document.getElementById('ingest-summary');
  sum.className = 'response dim'; sum.textContent = statusMsg;
  document.getElementById('ingest-chips').innerHTML = '';

  _ingestController = new AbortController();
  try {
    const result = await apiPost('/ai/ingest', body, _ingestController.signal);
    sum.className = 'response'; sum.textContent = result.summary;

    for (const p of (result.pages || [])) {
      const idx = state.pages.findIndex(e => e.id === p.id);
      if (idx >= 0) state.pages[idx] = { ...p, fresh: true };
      else state.pages.push({ ...p, fresh: true });
    }

    document.getElementById('ingest-chips').innerHTML = (result.pages || [])
      .map(p => `<span class="chip" data-pid="${p.id}" onclick="openPage(this.dataset.pid)">${esc(p.title)}</span>`).join('');
    renderIndex();
    if (ingestMode === 'paste') {
      const srcEl = document.getElementById('src');
      if (srcEl) srcEl.value = '';
    }
    extractedFileText = '';
    renderLog();
  } catch (e) {
    if (e.name === 'AbortError') {
      sum.className = 'response'; sum.textContent = 'Cancelled.';
    } else {
      sum.className = 'response'; sum.textContent = 'Could not process this source. ' + (e.message || '');
    }
  } finally {
    btn.disabled = false; btn.textContent = 'Read & file';
    if (cancelBtn) cancelBtn.style.display = 'none';
    _ingestController = null;
  }
}

// AI research scope: which libraries the AI draws from. null = all libraries.
let aiResearchLibs = null;
function aiLibraryScopeHtml() {
  if (!librariesList || librariesList.length <= 1) return ''; // only meaningful with multiple libraries
  return `<div class="field"><label class="field-label">Research in</label><div class="ai-lib-chips" id="ai-lib-chips">${aiLibraryChipsInner()}</div></div>`;
}
function aiLibraryChipsInner() {
  const all = `<button type="button" class="ai-lib-chip${!aiResearchLibs ? ' active' : ''}" onclick="toggleAiLib(null)">All libraries</button>`;
  const perLib = (librariesList || []).map(l => {
    const on = aiResearchLibs && aiResearchLibs.includes(String(l.id));
    return `<button type="button" class="ai-lib-chip${on ? ' active' : ''}" data-lib="${esc(String(l.id))}" onclick="toggleAiLib(this.dataset.lib)">${esc(l.name)}</button>`;
  }).join('');
  return all + perLib;
}
function toggleAiLib(id) {
  if (id === null || id === 'null') { aiResearchLibs = null; }
  else {
    const s = new Set(aiResearchLibs || []);
    s.has(id) ? s.delete(id) : s.add(id);
    aiResearchLibs = s.size ? [...s] : null;
  }
  const el = document.getElementById('ai-lib-chips');
  if (el) el.innerHTML = aiLibraryChipsInner();
}

function fmtBytes(bytes) {
  const b = bytes || 0;
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(1) + ' MB';
}

function generateEncKey() {
  const bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);
  const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  const el = document.getElementById('cfg-enc-key');
  el.value = hex;
  el.type = 'text';
  setTimeout(() => { el.type = 'password'; }, 8000);
  toast('Key generated — copy it somewhere safe, then click Save. It will be hidden in 8 seconds.');
}

async function doQuery(fileIt) {
  const q = document.getElementById('q').value.trim();
  if (!q) { toast('Type a question first'); return; }
  document.getElementById('query-result').style.display = 'block';
  const ans = document.getElementById('query-answer');
  ans.className = 'response dim'; ans.textContent = 'Searching…';

  const goBtn = document.getElementById('query-go');
  const saveBtn = document.getElementById('query-save');
  const stopBtn = document.getElementById('query-stop');
  goBtn.disabled = saveBtn.disabled = true;
  if (stopBtn) stopBtn.style.display = '';

  const result = await streamFromApi('/ai/query', { question: q, fileIt, libraryIds: aiResearchLibs }, ans);

  goBtn.disabled = saveBtn.disabled = false;
  if (stopBtn) stopBtn.style.display = 'none';

  if (result?.saved) {
    const saved = result.saved;
    state.pages.push({ ...saved, fresh: true });
    renderIndex();
    toast('Filed as: ' + saved.title);
  }
}

async function detectAiModels(i) {
  const card = document.querySelector(`.ai-endpoint-card[data-idx="${i}"]`);
  if (!card) return;
  const base = card.querySelector('.ep-base').value.trim();
  const key = card.querySelector('.ep-key').value.trim();
  if (!base) { toast('Enter the Base URL first'); return; }
  toast('Detecting models…');
  try {
    const r = await apiPost('/ai/detect-models', { base_url: base, api_key: key });
    const models = Array.isArray(r.models) ? r.models : [];
    if (!models.length) { toast('No models found at that endpoint'); return; }
    card.querySelector('.ep-models').value = models.join(', ');
    toast(`Found ${models.length} model${models.length === 1 ? '' : 's'} — review, then Save`);
  } catch (e) { toast('Detect failed: ' + (e.message || 'endpoint unreachable')); }

let activityOffset = 0;
let activityFilterTimer = null;
function activityFilterChanged() {
  clearTimeout(activityFilterTimer);
  activityFilterTimer = setTimeout(() => loadActivity(true), 300);
}
function activityQuery(extra = {}) {
  const p = new URLSearchParams();
  const actor = document.getElementById('act-actor')?.value.trim();
  const event = document.getElementById('act-event')?.value;
  const from = document.getElementById('act-from')?.value;
  const to = document.getElementById('act-to')?.value;
  if (actor) p.set('actor', actor);
  if (event) p.set('event', event);
  if (from) p.set('from', from);
  if (to) p.set('to', to);
  for (const [k, v] of Object.entries(extra)) p.set(k, v);
  return p.toString();
}
const ACTIVITY_LABELS = {
  uploaded: 'Uploaded', edited: 'Edited', renamed: 'Renamed', trashed: 'Moved to trash',
  restored: 'Restored', purged: 'Deleted permanently', updated: 'Updated',
  share_created: 'Created share link', share_downloaded: 'Downloaded via link', share_revoked: 'Revoked share link',
  access_granted: 'Granted access', access_revoked: 'Revoked access',
  version_saved: 'Saved version', version_restored: 'Restored version',
};
function activityLabel(t) { return ACTIVITY_LABELS[t] || (t || '').replace(/_/g, ' '); }
function activityWhen(ts) {
  const d = new Date(ts);
  return isNaN(d) ? '' : d.toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
async function loadActivity(reset) {
  const list = document.getElementById('activity-list');
  if (!list) return;
  if (reset) activityOffset = 0;
  try {
    const r = await apiGet('/admin/activity?' + activityQuery({ limit: 50, offset: activityOffset }));
    // Populate the event-type dropdown once (preserving the current selection).
    const sel = document.getElementById('act-event');
    if (sel && sel.options.length <= 1 && Array.isArray(r.eventTypes)) {
      const cur = sel.value;
      sel.innerHTML = '<option value="">All events</option>' +
        r.eventTypes.map(t => `<option value="${esc(t)}">${esc(activityLabel(t))}</option>`).join('');
      sel.value = cur;
    }
    if (!r.events.length && activityOffset === 0) {
      list.innerHTML = emptyState('No activity', 'No events match these filters yet.');
      return;
    }
    const rows = r.events.map(e => `<div class="activity-row">
        <span class="activity-ev activity-ev-${esc(e.event_type)}">${esc(activityLabel(e.event_type))}</span>
        <span class="activity-doc">${e.document_name ? esc(e.document_name) : '<em>(deleted file)</em>'}</span>
        <span class="activity-actor">${esc(e.actor_email || 'unknown')}</span>
        <span class="activity-when" title="${esc(e.detail || '')}">${esc(activityWhen(e.created_at))}</span>
      </div>`).join('');
    const shown = activityOffset + r.events.length;
    const more = shown < r.total
      ? `<button class="ghost-btn activity-more" type="button" onclick="loadMoreActivity()">Load more (${shown} of ${r.total})</button>`
      : `<p class="settings-notice activity-count" style="text-align:center">${r.total} event${r.total === 1 ? '' : 's'}</p>`;
    // First page replaces; subsequent pages append after the prior rows (the old
    // "Load more" button was already removed by loadMoreActivity).
    if (activityOffset === 0) list.innerHTML = rows + more;
    else list.insertAdjacentHTML('beforeend', rows + more);
  } catch (e) {
    list.innerHTML = emptyState('Could not load activity', esc(e.message));
  }
}
function loadMoreActivity() {
  document.querySelector('.activity-more')?.remove();
  activityOffset += 50;
  loadActivity(false);
}

// Accept any image, any size: downscale to a small square JPEG client-side so the
// upload is always tiny (no size limit for the user to worry about).
function onAvatarPicked(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const SIZE = 320;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(SIZE / img.width, SIZE / img.height); // cover-crop, centered
      const w = img.width * scale, h = img.height * scale;
      ctx.drawImage(img, (SIZE - w) / 2, (SIZE - h) / 2, w, h);
      settingsAvatarDraft = canvas.toDataURL('image/jpeg', 0.85);
      switchSettingsTab('profile');
    };
    img.onerror = () => toast("Couldn't read that image — try a JPG or PNG");
    img.src = reader.result;
  };
  reader.onerror = () => toast("Couldn't read that file");
  reader.readAsDataURL(file);
}
function clearAvatarDraft() { settingsAvatarDraft = ''; switchSettingsTab('profile'); }
async function saveProfile() {
  const body = { display_name: document.getElementById('profile-name').value.trim() };
  if (settingsAvatarDraft !== null) body.avatar = settingsAvatarDraft;
  try {
    settingsProfile = await apiPut('/auth/profile', body);
    settingsAvatarDraft = null;
    currentUser.name = settingsProfile.display_name || currentUser.name;
    currentUser.avatar = settingsProfile.avatar || null;
    renderUserChip();
    switchSettingsTab('profile');
    toast('Profile saved');
  } catch (e) { toast('Save failed: ' + e.message); }
}

function exportSettingsXml() {
  const s = settingsSys || {};
  const x = v => String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const rows = Object.keys(s).map(k => `  <setting key="${x(k)}">${x(s[k])}</setting>`).join('\n');
  const xml = `<?xml version="1.0" encoding="UTF-8"?>\n<memexSettings exportedAt="${new Date().toISOString()}">\n${rows}\n</memexSettings>\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml], { type: 'application/xml' }));
  a.download = 'memex-settings.xml';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Settings exported (secrets are masked)');
}

async function seafileStart() {

let seafilePollTimer = null;
async function seafilePoll() {

  let st;

  }

/* ---------- files ---------- */
function fileExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
function fileKind(ext) {
  if (['docx','doc'].includes(ext)) return 'Word';
  if (['xlsx','xls','csv'].includes(ext)) return 'Excel';
  if (['pptx','ppt'].includes(ext)) return 'PowerPoint';
  if (ext === 'pdf') return 'PDF';
  return ext ? ext.toUpperCase() : 'File';
}
function fileOwner(f) {
  const email = f.uploaded_by_email || currentUser?.email || 'Unknown';
  // Show your own files under your current display name (not the email), so the
  // owner label + avatar initials reflect a profile rename. uploaded_by_name is
  // used for other people's files if the backend supplies it; else the email.
  if (currentUser && email.toLowerCase() === String(currentUser.email || '').toLowerCase()) return currentUser.name || email;
  return f.uploaded_by_name || email;
}
function fileDate(value) { return value ? new Date(value).toLocaleDateString([], { month:'short', day:'numeric', year:'numeric' }) : ''; }
function fileSizeLabel(size) { return size > 1024*1024 ? (size/1024/1024).toFixed(1)+' MB' : Math.max(1, Math.round((size || 0)/1024))+' KB'; }
function fileIconHtml(ext) { return `<div class="file-icon ${ext}">${esc(fileKind(ext).slice(0,3))}</div>`; }
function normalizeFilePath(path) {
  return String(path || '').replace(/\\/g, '/').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
}
function fileFullPath(f) { return normalizeFilePath(f.name || ''); }
function fileDisplayName(f) {
  const full = fileFullPath(f);
  return full.split('/').filter(Boolean).pop() || f.name || 'Untitled';
}
// Hidden ".keep" marker that makes an otherwise-empty folder exist.
function isFolderMarker(f) { return fileDisplayName(f) === '.keep'; }
function fileFolderPath(f) {
  const parts = fileFullPath(f).split('/').filter(Boolean);
  parts.pop();
  return parts.join('/');
}
function folderLabel(path) {
  const parts = normalizeFilePath(path).split('/').filter(Boolean);
  return parts.length ? parts[parts.length - 1] : 'All files';
}
function fileMatchesCurrentFolder(f) {
  if (!currentFolderPath) return !fileFolderPath(f);
  return fileFolderPath(f) === currentFolderPath;
}
function childFoldersForPath(files, parentPath = currentFolderPath) {
  const parent = normalizeFilePath(parentPath);
  const folders = new Map();
  files.forEach(f => {
    const folder = fileFolderPath(f);
    if (!folder) return;
    if (parent && folder !== parent && !folder.startsWith(parent + '/')) return;
    const rest = parent ? folder.slice(parent.length).replace(/^\/+/, '') : folder;
    const child = rest.split('/').filter(Boolean)[0];
    if (!child) return;
    const childPath = parent ? `${parent}/${child}` : child;
    const entry = folders.get(childPath) || { path: childPath, name: child, count: 0 };
    entry.count += isFolderMarker(f) ? 0 : 1; // markers make the folder exist but aren't items
    folders.set(childPath, entry);
  });
  return Array.from(folders.values()).sort((a, b) => a.name.localeCompare(b.name));
}
function allFoldersForFiles(files) {
  const folders = new Map();
  files.forEach(f => {
    const parts = fileFolderPath(f).split('/').filter(Boolean);
    let path = '';
    parts.forEach(part => {
      path = path ? `${path}/${part}` : part;
      const entry = folders.get(path) || { path, name: part, count: 0 };
      entry.count += isFolderMarker(f) ? 0 : 1;
      folders.set(path, entry);
    });
  });
  return Array.from(folders.values()).sort((a, b) => a.path.localeCompare(b.path));
}

function startRailResize(event) {
  event.preventDefault();
  const shell = document.getElementById('file-home-shell');
  if (!shell) return;
  const resizer = shell.querySelector('.rail-resizer');
  resizer?.classList.add('active');
  document.body.style.userSelect = 'none';
  const move = ev => {
    const w = Math.max(190, Math.min(460, ev.clientX - shell.getBoundingClientRect().left));
    railWidth = Math.round(w);
    shell.style.setProperty('--memex-rail-w', railWidth + 'px');
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
    resizer?.classList.remove('active');
    document.body.style.userSelect = '';
    if (railWidth) localStorage.setItem('memex_rail_w', String(railWidth));
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
}

// Close every popover/dropdown menu at once. Used by the outside-click handler,

function anyMenuOpen() {

    '#search-control-menu.open, #file-create-menu.open, #file-upload-menu.open,' +

  );
}
// Static scrims declared in the page markup toggle their `.open` class; dynamic
// scrims are inserted on demand and should be removed outright. login-scrim is
// the auth gate (never Escape-dismissable); the editor owns its own keys.
const STATIC_SCRIMS = new Set(['settings-scrim', 'version-preview-scrim']);
function closeTopModal() {
  const scrims = [...document.querySelectorAll('.scrim.open')]
    .filter(s => s.id !== 'login-scrim' && s.id !== 'editor-scrim');
  if (!scrims.length) return false;
  const top = scrims[scrims.length - 1];
  if (STATIC_SCRIMS.has(top.id)) top.classList.remove('open');
  else top.remove();
  return true;
}
document.addEventListener('click', closeAllMenus);
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  // Close the shallowest layer first: open menus, then the topmost modal.
  if (anyMenuOpen()) { closeAllMenus(); return; }
  closeTopModal();
});

  const searched = filterFilesForHome(fileFilter, source, false).filter(f => !q || f.name.toLowerCase().includes(q) || fileOwner(f).toLowerCase().includes(q));
  const rows = (q ? searched : searched.filter(fileMatchesCurrentFolder)).filter(f => !isFolderMarker(f));
  const folders = q ? [] : childFoldersForPath(source);
  lastRenderedFolderPaths = folders.map(f => f.path);
  selectedFolderPaths = new Set([...selectedFolderPaths].filter(p => lastRenderedFolderPaths.includes(p)));
  const tableRows = [...folders.map(folderLibraryRow), ...sortFiles(rows).map(fileLibraryRow)].join('');
  lastRenderedFileIds = rows.map(f => String(f.id));
  const selectables = [...lastRenderedFileIds, ...lastRenderedFolderPaths.map(p => 'f:' + p)];
  const isSel = key => key.startsWith('f:') ? selectedFolderPaths.has(key.slice(2)) : selectedFileIds.has(key);
  const allSelected = selectables.length > 0 && selectables.every(isSel);
  const someSelected = !allSelected && selectables.some(isSel);
  const selectAllClass = allSelected ? ' selected' : someSelected ? ' partial' : '';
  const breadcrumb = document.getElementById('file-library-breadcrumb');
  if (breadcrumb) breadcrumb.innerHTML = fileBreadcrumbHtml();
  const inner = (!folders.length && !rows.length)
    ? (q
        ? emptyState('No matching documents', 'Try a broader search or clear the current filter.')
        : emptyState(currentFolderPath ? 'This folder is empty' : 'No documents in this view', 'Upload files or switch views to see shared and recent documents.'))
    : `<div class="file-library-table-wrap"><table class="file-library-table">${fileTableHeadHtml(selectAllClass)}<tbody>${tableRows}</tbody></table></div>`;
  el.innerHTML = (fileLayoutMode === 'commander'
    ? `<div class="file-commander-shell">${commanderFolderPane(source)}<div class="file-commander-main">${inner}</div></div>`
    : inner);
  updateFileLibraryChrome();
}

// ---- drag & drop into folders ----
function dragPayloadFor(kind, key) {
  const inSel = kind === 'file' ? selectedFileIds.has(key) : selectedFolderPaths.has(key);
  if (inSel && (selectedFileIds.size + selectedFolderPaths.size) > 1) {
    return { files: [...selectedFileIds], folders: [...selectedFolderPaths] };
  }
  return kind === 'file' ? { files: [key], folders: [] } : { files: [], folders: [key] };
}
// Pointer-based drag — native HTML5 <tr> dragging is unreliable across browsers,
// so we track the gesture ourselves (works everywhere, no dataTransfer needed).
let pdrag = null;
let suppressRowClick = false;
const FOLDER_TARGET_SEL = '.file-commander-folder[data-folder], .file-folder-row[data-folder]';
function pointerDragStart(event, kind, key) {
  if (event.button !== 0 || event.target.closest('button')) return; // let checkbox / ⋮ buttons work
  pdrag = { kind, key, x: event.clientX, y: event.clientY, moved: false, ghost: null, target: null };
  document.addEventListener('mousemove', pointerDragMove);
  document.addEventListener('mouseup', pointerDragEnd);
}
function pointerDragMove(event) {
  if (!pdrag) return;
  if (!pdrag.moved) {
    if (Math.hypot(event.clientX - pdrag.x, event.clientY - pdrag.y) < 6) return;
    pdrag.moved = true;
    pdrag.payload = dragPayloadFor(pdrag.kind, pdrag.key);
    const n = pdrag.payload.files.length + pdrag.payload.folders.length;
    const g = document.createElement('div'); g.className = 'drag-ghost'; g.textContent = `Move ${n} item${n > 1 ? 's' : ''}`;
    document.body.appendChild(g); pdrag.ghost = g;
    document.body.classList.add('dragging-items');
  }
  pdrag.ghost.style.left = (event.clientX + 14) + 'px';
  pdrag.ghost.style.top = (event.clientY + 14) + 'px';
  const el = document.elementFromPoint(event.clientX, event.clientY);
  const tgt = el && el.closest(FOLDER_TARGET_SEL);
  if (pdrag.target && pdrag.target !== tgt) pdrag.target.classList.remove('drop-target');
  pdrag.target = tgt || null;
  if (tgt) tgt.classList.add('drop-target');
}
async function pointerDragEnd() {
  document.removeEventListener('mousemove', pointerDragMove);
  document.removeEventListener('mouseup', pointerDragEnd);
  const d = pdrag; pdrag = null;
  document.body.classList.remove('dragging-items');
  d?.ghost?.remove();
  d?.target?.classList.remove('drop-target');
  if (d?.moved) {
    suppressRowClick = true; setTimeout(() => { suppressRowClick = false; }, 0);
    if (d.target) await moveItemsIntoFolder(d.payload, d.target.dataset.folder || '');
  }
}
function maybeOpenFolder(path) { if (!suppressRowClick) openFolder(path); }
async function moveItemsIntoFolder(payload, targetPath) {
  const { files = [], folders = [] } = payload || {};
  if (!files.length && !folders.length) return;
  let moved = 0;
  try {
    for (const id of files) {
      const f = filesList.find(x => String(x.id) === String(id));
      if (!f) continue;
      const newName = targetPath ? `${targetPath}/${fileDisplayName(f)}` : fileDisplayName(f);
      if (newName === f.name) continue;
      await apiPut('/files/' + id + '/rename', { name: newName });
      moved++;
    }
    for (const p of folders) {
      if (p === targetPath || targetPath === p.split('/').slice(0, -1).join('/') || targetPath.startsWith(p + '/')) continue;
      await apiPost('/files/folder/reparent', { path: p, target: targetPath });
      moved++;
    }
    clearFileSelection(false);
    await loadFiles();
    if (moved) toast(`Moved ${moved} item${moved === 1 ? '' : 's'} into ${targetPath.split('/').pop() || 'All files'}`);
  } catch (e) { toast('Move failed: ' + e.message); }
}
// Folder picker — the reliable, click-based way to move items into a folder.
function openFolderPicker(title, excludePaths, onPick) {
  const exclude = new Set(excludePaths || []);
  const folders = allFoldersForFiles(filesList).filter(f => !exclude.has(f.path) && ![...exclude].some(x => f.path === x || f.path.startsWith(x + '/')));
  const scrim = document.createElement('div');
  scrim.className = 'scrim open'; scrim.id = 'folder-picker-scrim';
  scrim.onclick = e => { if (e.target.id === 'folder-picker-scrim') scrim.remove(); };
  const items = [`<button class="library-menu-item" data-path="">⌂ All files (root)</button>`,
    ...folders.map(f => `<button class="library-menu-item" data-path="${esc(f.path)}">${esc(f.path)}</button>`)].join('');
  scrim.innerHTML = `<div class="modal"><h2>${esc(title)}</h2><p class="sub">Choose a destination folder.</p><div class="library-pick-list">${items}</div><div style="display:flex;gap:8px;justify-content:space-between;margin-top:16px"><button class="ghost-btn" id="fp-new">+ New folder…</button><button class="ghost-btn" id="fp-cancel">Cancel</button></div></div>`;
  document.body.appendChild(scrim);
  scrim.querySelector('#fp-cancel').onclick = () => scrim.remove();
  scrim.querySelector('#fp-new').onclick = () => { const n = (prompt('New folder name:') || '').trim(); if (n) { scrim.remove(); onPick(n); } };
  scrim.querySelectorAll('button[data-path]').forEach(b => b.onclick = () => { scrim.remove(); onPick(b.dataset.path); });
}
function moveSelectedToFolder() {
  const payload = { files: [...selectedFileIds], folders: [...selectedFolderPaths] };
  if (!payload.files.length && !payload.folders.length) return;
  openFolderPicker('Move to folder', payload.folders, dest => moveItemsIntoFolder(payload, dest));
}
function moveFileToFolder(fileId) {
  openFolderPicker('Move to folder', [], dest => moveItemsIntoFolder({ files: [String(fileId)], folders: [] }, dest));
}

async function deleteSelectedItems() {
  const files = selectedFiles();
  const folders = selectedFolders();
  const total = files.length + folders.length;
  if (!total) return;
  const label = total === 1 ? `"${(files[0]?.name) || folders[0].split('/').pop()}"` : `${total} items`;
  if (!confirm(`Move ${label} to Trash? You can restore ${total === 1 ? 'it' : 'them'} later.`)) return;
  for (const f of files) {
    await apiDelete('/files/' + f.id);
    filesList = filesList.filter(x => String(x.id) !== String(f.id));
  }
  for (const p of folders) {
    try { await apiPost('/files/folder/delete', { path: p }); } catch (e) { toast('Folder delete failed: ' + e.message); }
  }
  clearFileSelection(false);
  await loadFiles();
  toast(`${label} moved to Trash`);
}

async function filesFromFileHomeDrop(dataTransfer) {
  const entries = Array.from(dataTransfer.items || [])
    .map(item => item.webkitGetAsEntry && item.webkitGetAsEntry())
    .filter(Boolean);
  if (!entries.length) return Array.from(dataTransfer.files || []).map(file => ({ file, path: file.name }));

  const out = [];
  async function walk(entry, prefix = '') {
    if (entry.isFile) {
      const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
      out.push({ file, path: prefix + file.name });
      return;
    }
    if (entry.isDirectory) {
      const reader = entry.createReader();
      let batch;
      do {
        batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
        for (const child of batch) await walk(child, prefix + entry.name + '/');
      } while (batch.length);
    }
  }
  for (const entry of entries) await walk(entry);
  return out;
}

async function uploadFiles(items) {
  if (!items.length) return;
  const statusEl = document.getElementById('upload-status');

  let uploaded = 0;
  for (const item of items) {
    const file = item.file || item;
    const displayName = item.path || file.webkitRelativePath || file.name;
    setUploadStatus(statusEl, `Uploading ${uploaded + 1} of ${items.length}: ${displayName}`, 0, file.size);
    try {
      const { doc, canIngest } = file.size >= RESUMABLE_UPLOAD_THRESHOLD
        ? await uploadFileResumable(file, displayName, statusEl, uploaded + 1, items.length)
        : await uploadFileStream(file, displayName);
      filesList.unshift(doc);
      document.getElementById('file-library-view') ? renderDocumentLibraryList() : renderFileList();
      uploaded += 1;
      toast(canIngest ? `${displayName} uploaded — click "Index" to add it` : `${displayName} uploaded`);
    } catch (e) {
      toast(`Upload error for ${displayName}: ${e.message}`);
    }
  }
  if (statusEl) statusEl.textContent = uploaded ? `Uploaded ${uploaded} item${uploaded === 1 ? '' : 's'}.` : '';
}

function setUploadStatus(statusEl, label, doneBytes = 0, totalBytes = 0) {
  if (!statusEl) return;
  const pct = totalBytes ? Math.min(100, Math.round((doneBytes / totalBytes) * 100)) : 0;
  statusEl.innerHTML = `<div class="upload-line"><div class="upload-meta"><span>${esc(label)}</span><span>${pct}%</span></div><div class="upload-bar"><div class="upload-fill" style="--pct:${pct}%"></div></div></div>`;
}

async function uploadFileStream(file, displayName) {
  const token = await getToken();
  const res = await fetch('/api/files/upload-stream?displayName=' + encodeURIComponent(displayName) + (currentLibraryId ? '&libraryId=' + encodeURIComponent(currentLibraryId) : ''), {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': file.type || 'application/octet-stream'
    },
    body: file,
  });
  if (!res.ok) throw new Error(await uploadErrorMessage(res));
  return res.json();
}

function uploadResumeKey(file, displayName) {
  return `memex_upload_session:${displayName}:${file.size}:${file.lastModified || 0}`;
}

async function uploadErrorMessage(res) {
  try {
    const body = await res.json();
    return body.error || JSON.stringify(body);
  } catch {
    return await res.text();
  }
}

async function getOrCreateUploadSession(file, displayName) {
  const key = uploadResumeKey(file, displayName);
  const savedId = localStorage.getItem(key);
  if (savedId) {
    try {
      const existing = await apiGet('/files/uploads/' + savedId);
      if (existing.session?.status === 'active') return { key, session: existing.session, resumed: true };
    } catch {
      localStorage.removeItem(key);
    }
  }
  const created = await apiPost('/files/uploads', {
    displayName,
    size: file.size,
    mimeType: file.type || 'application/octet-stream',
    chunkSize: RESUMABLE_CHUNK_SIZE
  });
  localStorage.setItem(key, created.session.id);
  return { key, session: created.session, resumed: false };
}

async function uploadFileResumable(file, displayName, statusEl, ordinal, totalItems) {
  let { key, session, resumed } = await getOrCreateUploadSession(file, displayName);
  const received = new Set((session.receivedChunks || []).map(Number));
  const totalChunks = session.totalChunks || Math.ceil(file.size / RESUMABLE_CHUNK_SIZE);
  let doneBytes = received.size * (session.chunkSize || RESUMABLE_CHUNK_SIZE);
  if (received.has(totalChunks - 1)) doneBytes = file.size - (totalChunks - received.size) * (session.chunkSize || RESUMABLE_CHUNK_SIZE);
  setUploadStatus(statusEl, `${resumed ? 'Resuming' : 'Uploading'} ${ordinal} of ${totalItems}: ${displayName}`, Math.max(0, Math.min(file.size, doneBytes)), file.size);

  for (let index = 0; index < totalChunks; index += 1) {
    if (received.has(index)) continue;
    const chunkSize = session.chunkSize || RESUMABLE_CHUNK_SIZE;
    const start = index * chunkSize;
    const end = Math.min(file.size, start + chunkSize);
    const token = await getToken();
    const res = await fetch(`/api/files/uploads/${session.id}/chunks/${index}`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/octet-stream'
      },
      body: file.slice(start, end)
    });
    if (!res.ok) throw new Error(await uploadErrorMessage(res));
    const body = await res.json();
    session = body.session || session;
    received.add(index);
    setUploadStatus(statusEl, `Uploading ${ordinal} of ${totalItems}: ${displayName}`, Math.min(file.size, end), file.size);
  }

  const completed = await apiPost('/files/uploads/' + session.id + '/complete', { libraryId: currentLibraryId });
  localStorage.removeItem(key);
  setUploadStatus(statusEl, `Uploaded ${displayName}`, file.size, file.size);
  return completed;
}

async function ingestFile(fileId, name) {
  toast(`Reading ${name}…`);
  const panel = document.getElementById('panel');

  try {
    const token = await getToken();
    const res = await fetch('/api/files/' + fileId + '/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({}),
    });
    const data = await res.json();
    if (!res.ok) { toast('Ingest failed: ' + (data.error || 'unknown error')); return; }

    // Merge new pages into state
    for (const p of (data.pages || [])) {
      const idx = state.pages.findIndex(e => e.id === p.id);
      if (idx >= 0) state.pages[idx] = { ...p, fresh: true };

// Lazy-load a self-hosted vendor script once (no external CDN / account).
function loadVendorScript(src, globalName) {
  return new Promise((resolve, reject) => {
    if (window[globalName]) return resolve();
    let s = document.querySelector(`script[data-vendor="${src}"]`);
    if (s) { s.addEventListener('load', () => resolve()); s.addEventListener('error', () => reject(new Error('load failed'))); return; }
    s = document.createElement('script'); s.src = src; s.dataset.vendor = src;
    s.onload = () => resolve(); s.onerror = () => reject(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}

/* ========== member video/audio calls (native WebRTC mesh) ========== */
let callWs = null, callSelf = null, callOnline = [];
let callRoom = null, pendingCallRoom = null, incomingCall = null;
let localStream = null, callMuted = false, callCamOff = false, screenStream = null;
const callPeers = new Map(); // userId -> { pc, name, dc, incoming }
let callIce = [{ urls: 'stun:stun.l.google.com:19302' }];
let screenconnectUrl = '';

function wsUrl(token) { return `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws?token=${encodeURIComponent(token)}`; }
function wsSend(o) { if (callWs && callWs.readyState === WebSocket.OPEN) callWs.send(JSON.stringify(o)); }
async function connectSignaling() {
  try {
    const token = await getToken();
    if (!token) return;
    callWs = new WebSocket(wsUrl(token));
    callWs.onmessage = e => { let m; try { m = JSON.parse(e.data); } catch { return; } onSignal(m); };
    callWs.onclose = () => { callWs = null; if (currentUser) setTimeout(connectSignaling, 5000); };
    callWs.onerror = () => {};
  } catch { /* ignore */ }
  try { const d = await apiGet('/webrtc/ice'); if (d.iceServers?.length) callIce = d.iceServers; screenconnectUrl = d.screenconnectUrl || ''; } catch { /* default STUN */ }
}
function updatePresenceDot() {
  const dot = document.getElementById('meet-presence-dot');
  if (dot) dot.style.display = callOnline.length ? '' : 'none';
}
function onSignal(m) {
  switch (m.type) {
    case 'welcome': callSelf = m.self; break;
    case 'presence':
      callOnline = (m.users || []).filter(u => u.userId !== callSelf?.userId);
      updatePresenceDot(); if (meetPanelOpen()) renderMeetPanel(); break;
    case 'call':
      if (callRoom) { wsSend({ type: 'call-reject', to: m.from.userId, room: m.room }); break; }
      incomingCall = { from: m.from, room: m.room }; renderIncomingCall(); break;
    case 'call-reject': toast(`${esc(m.from.name)} declined`); if (callRoom && !callPeers.size) endCall(); break;
    case 'call-cancel':
      if (incomingCall && incomingCall.from.userId === m.from.userId) { incomingCall = null; renderIncomingCall(); } break;
    case 'room-peers': (m.peers || []).forEach(p => connectToPeer(p, true)); break; // I offer to existing peers
    case 'peer-joined': break; // they will offer to me
    case 'peer-left': removePeer(m.peer.userId); break;
    case 'signal': handleSignal(m.from, m.data); break;
  }
}
async function ensureMedia() {
  if (localStream) return localStream;
  if (!navigator.mediaDevices?.getUserMedia) { toast('Camera/mic need HTTPS — not available on this origin'); throw new Error('insecure context'); }
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  return localStream;
}
function newPc(peer, initiator) {
  const pc = new RTCPeerConnection({ iceServers: callIce });
  const entry = { pc, name: peer.name, userId: peer.userId };
  callPeers.set(peer.userId, entry);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  if (initiator) setupDataChannel(entry, pc.createDataChannel('file'));
  else pc.ondatachannel = ev => setupDataChannel(entry, ev.channel);
  pc.onicecandidate = e => { if (e.candidate) wsSend({ type: 'signal', to: peer.userId, room: callRoom, data: { candidate: e.candidate } }); };
  pc.ontrack = e => attachRemote(peer, e.streams[0]);
  pc.onconnectionstatechange = () => { if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) removePeer(peer.userId); };
  return pc;
}
// ---- file transfer over the peer data channel ----
function setupDataChannel(entry, ch) {
  ch.binaryType = 'arraybuffer';
  entry.dc = ch;
  ch.onmessage = ev => {
    if (typeof ev.data === 'string') {
      let m; try { m = JSON.parse(ev.data); } catch { return; }
      if (m.t === 'meta') entry.incoming = { meta: m, chunks: [] };
      else if (m.t === 'done' && entry.incoming) finishIncoming(entry);
    } else if (entry.incoming) {
      entry.incoming.chunks.push(ev.data);
    }
  };
}
function finishIncoming(entry) {
  const { meta, chunks } = entry.incoming; entry.incoming = null;
  const blob = new Blob(chunks, { type: meta.mime || 'application/octet-stream' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = meta.name || 'file';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  toast(`Received "${meta.name}" from ${esc(entry.name)}`);
}
async function sendFileToCall(file) {
  const open = [...callPeers.values()].filter(e => e.dc && e.dc.readyState === 'open');
  if (!open.length) { toast('No connected members yet'); return; }
  const CHUNK = 16 * 1024;
  const buf = await file.arrayBuffer();

    e.dc.send(JSON.stringify({ t: 'meta', name: file.name, size: file.size, mime: file.type }));
    for (let o = 0; o < buf.byteLength; o += CHUNK) {
      while (e.dc.bufferedAmount > 8 * 1024 * 1024) await new Promise(r => setTimeout(r, 20)); // backpressure
      e.dc.send(buf.slice(o, o + CHUNK));
    }
    e.dc.send(JSON.stringify({ t: 'done' }));
  }
  toast(`Sent "${file.name}" to ${open.length} member${open.length > 1 ? 's' : ''}`);
}
function pickCallFile() { const inp = document.getElementById('call-file-input'); if (inp) { inp.value = ''; inp.click(); } }
// Remote control is out of the browser's reach — hand off to ScreenConnect.
function launchRemote() {
  if (!screenconnectUrl) { toast('Set a ScreenConnect URL in Settings → System → Integrations'); return; }
  const url = /^https?:\/\//i.test(screenconnectUrl) ? screenconnectUrl : 'https://' + screenconnectUrl;
  window.open(url, '_blank', 'noopener');
  toast('Opening ScreenConnect for remote control…');
}
// ---- screen share (one-way, view-only) ----
async function shareScreen() {
  if (screenStream) return stopScreen();
  if (!navigator.mediaDevices?.getDisplayMedia) { toast('Screen share needs HTTPS'); return; }
  try { screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true }); } catch { return; }
  const track = screenStream.getVideoTracks()[0];
  for (const [, e] of callPeers) { const s = e.pc.getSenders().find(x => x.track && x.track.kind === 'video'); if (s) s.replaceTrack(track); }
  track.onended = stopScreen;
  renderCallDock();
}
function stopScreen() {
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  const cam = localStream?.getVideoTracks()[0];
  for (const [, e] of callPeers) { const s = e.pc.getSenders().find(x => x.track && x.track.kind === 'video'); if (s && cam) s.replaceTrack(cam); }
  renderCallDock();
}
async function connectToPeer(peer, initiator) {
  try {
    await ensureMedia();
    if (callPeers.has(peer.userId)) return;
    const pc = newPc(peer, initiator);
    if (initiator) {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      wsSend({ type: 'signal', to: peer.userId, room: callRoom, data: { sdp: pc.localDescription } });
    }
    renderCallGrid();
  } catch { /* media error already toasted */ }
}
async function handleSignal(from, data) {
  try {
    await ensureMedia();
    let entry = callPeers.get(from.userId);
    if (!entry) { newPc(from, false); entry = callPeers.get(from.userId); renderCallGrid(); }
    const pc = entry.pc;
    if (data.sdp) {
      await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
      if (data.sdp.type === 'offer') {
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        wsSend({ type: 'signal', to: from.userId, room: callRoom, data: { sdp: pc.localDescription } });
      }
    } else if (data.candidate) {
      try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch { /* race */ }
    }
  } catch { /* ignore */ }
}
function attachRemote(peer, stream) {
  const entry = callPeers.get(peer.userId); if (!entry) return;
  entry.stream = stream; renderCallGrid();
}
function removePeer(userId) {
  const e = callPeers.get(userId);
  if (e) { try { e.pc.close(); } catch {} callPeers.delete(userId); }
  if (callRoom) renderCallGrid();
}
// ---- start / join / end ----
async function startRoom(roomId) {
  try { await ensureMedia(); } catch { return; }
  callRoom = roomId;
  wsSend({ type: 'join', room: roomId });
  closeMeetPanel();
  renderCallDock();
}
async function callMember(userId, name) {
  const room = 'dm-' + Math.random().toString(36).slice(2, 10);
  pendingCallRoom = room;
  try { await ensureMedia(); } catch { return; }
  callRoom = room;
  wsSend({ type: 'join', room });
  wsSend({ type: 'call', to: userId, room });
  closeMeetPanel();
  renderCallDock();
  toast('Calling ' + name + '…');
}
function acceptIncoming() {
  if (!incomingCall) return;
  const c = incomingCall; incomingCall = null; renderIncomingCall();
  wsSend({ type: 'call-accept', to: c.from.userId, room: c.room });
  startRoom(c.room);
}
function declineIncoming() {
  if (!incomingCall) return;
  wsSend({ type: 'call-reject', to: incomingCall.from.userId, room: incomingCall.room });
  incomingCall = null; renderIncomingCall();
}
function endCall() {
  if (callRoom) wsSend({ type: 'leave', room: callRoom });
  for (const [id] of callPeers) removePeer(id);
  callPeers.clear();
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  callRoom = null; pendingCallRoom = null; callMuted = false; callCamOff = false;
  renderCallDock();
}
function toggleMute() { callMuted = !callMuted; if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !callMuted); renderCallDock(); }
function toggleCam() { callCamOff = !callCamOff; if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = !callCamOff); renderCallDock(); }
// ---- UI ----
function meetPanelOpen() { return document.getElementById('meet-panel')?.classList.contains('open'); }
function toggleMeetPanel(e) { e?.stopPropagation(); const p = document.getElementById('meet-panel'); if (!p) return; const willOpen = !p.classList.contains('open'); closeAllMenus(); if (willOpen) { renderMeetPanel(); p.classList.add('open'); } }
function closeMeetPanel() { document.getElementById('meet-panel')?.classList.remove('open'); }
function renderMeetPanel() {
  const p = document.getElementById('meet-panel'); if (!p) return;
  const people = callOnline.length
    ? callOnline.map(u => `<button class="meet-person" onclick="callMember('${esc(u.userId)}', '${esc(u.name)}')"><span class="meet-person-dot"></span><span class="meet-person-name">${esc(u.name)}</span><span class="meet-call-ico">📞</span></button>`).join('')
    : '<div class="meet-empty">No one else is online right now.</div>';
  p.innerHTML = `<div class="meet-title">People online</div><div class="meet-people">${people}</div>
    <div class="meet-rule"></div>
    <div class="meet-title">Start a meeting</div>
    <div class="meet-room"><input id="meet-room-input" type="text" placeholder="Room name (e.g. standup)" onkeydown="if(event.key==='Enter')joinRoomFromInput()"><button class="run-btn" onclick="joinRoomFromInput()">Join</button></div>
    ${callRoom ? '<div class="meet-incall">You\'re in a call.</div>' : ''}`;
}
function joinRoomFromInput() {
  const v = (document.getElementById('meet-room-input')?.value || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-');
  if (!v) return; startRoom('room-' + v);
}
document.addEventListener('click', e => { const p = document.getElementById('meet-panel'); if (p?.classList.contains('open') && !e.target.closest('#meet-panel') && !e.target.closest('#meet-btn')) p.classList.remove('open'); });
function renderIncomingCall() {
  let el = document.getElementById('call-incoming');
  if (!incomingCall) { el?.remove(); return; }
  if (!el) { document.body.insertAdjacentHTML('beforeend', '<div class="call-incoming" id="call-incoming"></div>'); el = document.getElementById('call-incoming'); }
  el.innerHTML = `<div class="call-incoming-name">${esc(incomingCall.from.name)}</div><div class="call-incoming-sub">is calling…</div><div class="call-incoming-actions"><button class="call-accept" onclick="acceptIncoming()">Accept</button><button class="call-decline" onclick="declineIncoming()">Decline</button></div>`;
}
function renderCallDock() {
  let dock = document.getElementById('call-dock');
  if (!callRoom) { dock?.remove(); return; }
  if (!dock) { document.body.insertAdjacentHTML('beforeend', '<div class="call-dock" id="call-dock"></div>'); dock = document.getElementById('call-dock'); }
  dock.innerHTML = `<div class="call-grid" id="call-grid"></div>
    <div class="call-controls">
      <button class="call-ctrl${callMuted ? ' off' : ''}" onclick="toggleMute()" title="${callMuted ? 'Unmute' : 'Mute'}">${callMuted ? '🔇' : '🎙'}</button>
      <button class="call-ctrl${callCamOff ? ' off' : ''}" onclick="toggleCam()" title="${callCamOff ? 'Camera on' : 'Camera off'}">${callCamOff ? '📷̶' : '📹'}</button>
      <button class="call-ctrl${screenStream ? ' on' : ''}" onclick="shareScreen()" title="${screenStream ? 'Stop sharing' : 'Share screen'}">🖥</button>
      <button class="call-ctrl" onclick="pickCallFile()" title="Send file">📎</button>
      ${screenconnectUrl ? `<button class="call-ctrl" onclick="launchRemote()" title="Remote control (ScreenConnect)">🖱</button>` : ''}
      <button class="call-ctrl hang" onclick="endCall()" title="Leave">✕</button>
    </div>
    <input type="file" id="call-file-input" style="display:none" onchange="if(this.files[0])sendFileToCall(this.files[0])">`;
  renderCallGrid();
}
function renderCallGrid() {
  const grid = document.getElementById('call-grid'); if (!grid) return;
  const tiles = [];
  if (localStream) tiles.push({ id: 'self', name: 'You', stream: localStream, muted: true });
  for (const [id, e] of callPeers) tiles.push({ id, name: e.name, stream: e.stream, muted: false });
  grid.style.gridTemplateColumns = `repeat(${Math.min(tiles.length, 2) || 1}, 1fr)`;
  grid.innerHTML = tiles.map(t => `<div class="call-tile"><video id="vid-${esc(t.id)}" autoplay playsinline ${t.muted ? 'muted' : ''}></video><span class="call-tile-name">${esc(t.name)}</span>${t.stream ? '' : '<span class="call-tile-wait">connecting…</span>'}</div>`).join('');
  for (const t of tiles) { const v = document.getElementById('vid-' + t.id); if (v && t.stream && v.srcObject !== t.stream) v.srcObject = t.stream; }
}

/* ---------- boot ---------- */
document.getElementById('tabs').addEventListener('click', e => { const t = e.target.closest('.tab'); if (t) setTab(t.dataset.tab); });
document.getElementById('settings-scrim').addEventListener('click', e => { if (e.target.id === 'settings-scrim') closeSettings(); });
document.getElementById('page-search').addEventListener('keydown', e => {
  if (e.key === 'Enter') doContentSearch(e.target.value.trim());
});
document.getElementById('version-preview-scrim').addEventListener('click', e => {
  if (e.target.id === 'version-preview-scrim') document.getElementById('version-preview-scrim').classList.remove('open');
});
renderIndex();
initApp();
</script>
</body>
