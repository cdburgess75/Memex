/* ---------- export / import ---------- */
function download(name, text, type) {
  const blob = new Blob([text], { type: type || 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}
function exportMarkdown() {
  const md = state.pages
    .filter(p => p.id !== 'overview')
    .map(p => `# ${p.title}\n> category: ${p.category} · sources: ${p.sources || 0}\n\n${p.content.replace(/^# .+\n?/, '')}`)
    .join('\n\n\n---\n\n\n');
  download('memex-export.md', md, 'text/markdown');
  toast('Markdown exported');
}
function exportJSON() {
  const exportable = state.pages.filter(p => p.id !== 'overview');
  download('memex-backup.json', JSON.stringify({ pages: exportable }, null, 2), 'application/json');
  toast('Backup saved');
}
function importJSON(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async () => {
    try {
      const data = JSON.parse(r.result);
      if (!data.pages) throw new Error('not a backup');
      for (const p of data.pages) {
        await apiPut('/pages/' + p.id, p);
        const idx = state.pages.findIndex(e => e.id === p.id);
        if (idx >= 0) state.pages[idx] = p; else state.pages.push(p);
      }
      renderIndex();
      toast(`Restored ${data.pages.length} pages`);
    } catch (e) { toast('Import failed: ' + e.message); }
  };
  r.readAsText(file);
  ev.target.value = '';
}

/* ---------- files ---------- */
function fileExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
function fileKind(ext) {
  if (['docx','doc'].includes(ext)) return 'Word';
  if (['xlsx','xls','csv'].includes(ext)) return 'Excel';
  if (['pptx','ppt'].includes(ext)) return 'PowerPoint';
  if (ext === 'pdf') return 'PDF';
  return ext ? ext.toUpperCase() : 'File';
}
function fileOwner(f) { return f.uploaded_by_email || currentUser?.email || 'Unknown'; }
function fileDate(value) { return value ? new Date(value).toLocaleDateString([], { month:'short', day:'numeric', year:'numeric' }) : ''; }
function fileSizeLabel(size) { return size > 1024*1024 ? (size/1024/1024).toFixed(1)+' MB' : Math.max(1, Math.round((size || 0)/1024))+' KB'; }
function fileIconHtml(ext) { return `<div class="file-icon ${ext}">${esc(fileKind(ext).slice(0,3))}</div>`; }
function normalizeFilePath(path) {
  return String(path || '').replace(/\\/g, '/').replace(/^\/+|\/+$/g, '').replace(/\/+/g, '/');
}
function fileFullPath(f) { return normalizeFilePath(f.name || ''); }
function fileDisplayName(f) {
  const full = fileFullPath(f);
  return full.split('/').filter(Boolean).pop() || f.name || 'Untitled';
}
function fileFolderPath(f) {
  const parts = fileFullPath(f).split('/').filter(Boolean);
  parts.pop();
  return parts.join('/');
}
function folderLabel(path) {
  const parts = normalizeFilePath(path).split('/').filter(Boolean);
  return parts.length ? parts[parts.length - 1] : 'All files';
}
function fileMatchesCurrentFolder(f) {
  if (!currentFolderPath) return !fileFolderPath(f);
  return fileFolderPath(f) === currentFolderPath;
}
function childFoldersForPath(files, parentPath = currentFolderPath) {
  const parent = normalizeFilePath(parentPath);
  const folders = new Map();
  files.forEach(f => {
    const folder = fileFolderPath(f);
    if (!folder) return;
    if (parent && folder !== parent && !folder.startsWith(parent + '/')) return;
    const rest = parent ? folder.slice(parent.length).replace(/^\/+/, '') : folder;
    const child = rest.split('/').filter(Boolean)[0];
    if (!child) return;
    const childPath = parent ? `${parent}/${child}` : child;
    const entry = folders.get(childPath) || { path: childPath, name: child, count: 0 };
    entry.count += 1;
    folders.set(childPath, entry);
  });
  return Array.from(folders.values()).sort((a, b) => a.name.localeCompare(b.name));
}
function allFoldersForFiles(files) {
  const folders = new Map();
  files.forEach(f => {
    const parts = fileFolderPath(f).split('/').filter(Boolean);
    let path = '';
    parts.forEach(part => {
      path = path ? `${path}/${part}` : part;
      const entry = folders.get(path) || { path, name: part, count: 0 };
      entry.count += 1;
      folders.set(path, entry);
    });
  });
  return Array.from(folders.values()).sort((a, b) => a.path.localeCompare(b.path));
}
function isSharedFile(f) { return (f.uploaded_by_email || '').toLowerCase() !== (currentUser?.email || '').toLowerCase(); }
function highlightSearchHeadline(headline) {
  if (!headline) return '';
  return esc(headline).replace(/&lt;&lt;/g, '<mark>').replace(/&gt;&gt;/g, '</mark>');
}
function fileActionButtons(f) {
  const ext = fileExt(f.name);
  const isOffice = ['docx','doc','xlsx','xls','pptx','ppt'].includes(ext);
  return `${isOffice ? `<button class="file-action-btn primary" data-fid="${f.id}" onclick="openInOffice(this.dataset.fid)">Open</button>` : `<button class="file-action-btn primary" data-fid="${f.id}" onclick="downloadFile(this.dataset.fid)">Open</button>`}
    <button class="file-action-btn" data-fid="${f.id}" onclick="openAskFile(this.dataset.fid)">Ask</button>
    <button class="file-action-btn" data-fid="${f.id}" onclick="openShareFile(this.dataset.fid)">Share</button>
    <button class="file-action-btn" data-fid="${f.id}" onclick="openFileDetails(this.dataset.fid)">More</button>`;
}
function fileRecommendationCard(f, idx) {
  const ext = fileExt(f.name);
  const owner = fileOwner(f);
  const activity = isSharedFile(f) ? `<strong>${esc(owner)}</strong> shared this with you` : idx === 0 ? `<strong>${esc(owner)}</strong> edited this recently` : 'This file was edited recently';
  return `<article class="file-rec-card"><div class="file-rec-head">${fileIconHtml(ext)}<div class="file-rec-title" title="${esc(f.name)}">${esc(fileDisplayName(f))}</div></div><div class="file-rec-body"><div class="file-rec-activity">${activity}<span class="file-rec-date">${fileDate(f.created_at)}</span></div><div class="file-preview ${ext}" aria-hidden="true"></div></div><button class="file-rec-open" data-fid="${f.id}" onclick="openRecommendedFile(this.dataset.fid)">Open</button></article>`;
}
function renderHomeInsights(list = filesList) {
  const el = document.getElementById('file-home-insights');
  if (!el) return;
  const shared = list.filter(isSharedFile);
  const office = list.filter(f => ['docx','doc','xlsx','xls','pptx','ppt'].includes(fileExt(f.name)));
  const latest = list[0];
  el.innerHTML = `<div class="file-home-card"><div class="file-home-card-label">Documents</div><div class="file-home-card-value">${list.length}</div><div class="file-home-card-note">Total files in the workspace</div></div>
    <div class="file-home-card"><div class="file-home-card-label">Shared</div><div class="file-home-card-value">${shared.length}</div><div class="file-home-card-note">Items from other people</div></div>
    <div class="file-home-card"><div class="file-home-card-label">Office files</div><div class="file-home-card-value">${office.length}</div><div class="file-home-card-note">Openable in Office tools</div></div>
    <div class="file-home-card"><div class="file-home-card-label">Latest</div><div class="file-home-card-value">${latest ? esc(fileDate(latest.created_at)) : 'None'}</div><div class="file-home-card-note">${latest ? esc(fileDisplayName(latest)) : 'Upload files to get started'}</div></div>`;
}
function fileRecentRow(f) {
  const ext = fileExt(f.name);
  const owner = fileOwner(f);

    librariesList = await apiGet('/libraries');
    if (!Array.isArray(librariesList) || !librariesList.length) librariesList = [{ id: null, name: 'Ptech Workspace' }];
  } catch {

async function createLibraryFlow(name) {
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  try {
    const lib = await apiPost('/libraries', { name: trimmed });
    await loadLibraries();
    if (lib?.id) currentLibraryId = lib.id;
    if (currentLibraryId) localStorage.setItem('memex_library_id', currentLibraryId);
    setFileView('active');
    toast(`Library "${trimmed}" created`);
  } catch (e) {
    toast('Could not create library: ' + e.message);
  }
}

async function openLibraryMembers() {
  closeLibraryMenu();
  const libId = currentLibraryId;
  if (!libId) { toast('This library has no server id yet.'); return; }
  const libName = currentLibraryName();
  const scrim = document.createElement('div');
  scrim.className = 'scrim open';
  scrim.innerHTML = `<div class="modal" style="max-width:460px"><h2>Members · ${esc(libName)}</h2><p class="sub">No members means everyone can see this library. Add people to restrict it to them (and admins).</p><div id="lib-members-list" style="margin-top:14px">Loading…</div><div style="display:flex;gap:8px;margin-top:14px"><input id="lib-member-email" type="email" placeholder="name@company.com" style="flex:1" autocomplete="off"><button class="run-btn" id="lib-member-add">Add</button></div><div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="ghost-btn" id="lib-members-close">Done</button></div></div>`;
  document.body.appendChild(scrim);
  const close = () => scrim.remove();
  scrim.querySelector('#lib-members-close').onclick = close;
  scrim.addEventListener('click', e => { if (e.target === scrim) close(); });
  const emailInput = scrim.querySelector('#lib-member-email');
  const render = async () => {
    const listEl = scrim.querySelector('#lib-members-list');
    try {
      const members = await apiGet(`/libraries/${libId}/members`);
      if (!members.length) { listEl.innerHTML = `<div class="sub" style="padding:6px 0">Open to everyone — no members yet.</div>`; return; }
      listEl.innerHTML = members.map(m => `<div class="lib-member-row"><span>${esc(m.subject_email)}</span><button class="file-library-icon-btn" title="Remove" data-mid="${esc(String(m.id))}">✕</button></div>`).join('');
      listEl.querySelectorAll('button[data-mid]').forEach(b => b.onclick = async () => {
        try { await apiDelete(`/libraries/${libId}/members/${b.dataset.mid}`); await loadLibraries(); render(); }
        catch (e) { toast('Remove failed: ' + e.message); }
      });
    } catch (e) { listEl.innerHTML = `<div class="sub" style="color:var(--accent)">Could not load members: ${esc(e.message)}</div>`; }
  };
  const add = async () => {
    const email = emailInput.value.trim();
    if (!email) return;
    try { await apiPost(`/libraries/${libId}/members`, { email }); emailInput.value = ''; await loadLibraries(); render(); }
    catch (e) { toast('Add failed: ' + e.message); }
  };
  scrim.querySelector('#lib-member-add').onclick = add;
  emailInput.onkeydown = e => { if (e.key === 'Enter') add(); if (e.key === 'Escape') close(); };
  render();
  emailInput.focus();
}

    renderDocumentLibraryList();
  } catch (e) {
    const el = document.getElementById('file-list');
    if (el) el.innerHTML = `<p class="note" style="color:var(--accent)">Could not load documents: ${esc(e.message)}</p>`;
  }
}

async function loadTrash() {
  const el = document.getElementById('file-list');
  if (el) el.innerHTML = emptyState('Loading trash', 'Checking recently deleted files.');
  try { trashList = await apiGet('/files/trash'); renderTrashList(); }
  catch (e) { if (el) el.innerHTML = emptyState('Could not load trash', e.message || 'Try refreshing the page.'); }
}

function renderTrashList() {
  const el = document.getElementById('file-list');
  const rec = document.getElementById('file-recommendations');
  if (rec) rec.innerHTML = emptyState('Recycle bin', 'Deleted files appear here before permanent removal.');
  if (!el) return;
  if (!trashList.length) { el.innerHTML = emptyState('Trash is empty', 'Deleted files will appear here when there is something to restore or permanently remove.'); return; }
  const isAdmin = currentUser?.role === 'admin';
  el.innerHTML = `<table class="file-table"><thead><tr><th>Name</th><th>Deleted</th><th>Owner</th><th>Activity</th><th></th></tr></thead><tbody>${trashList.map(f => { const ext = fileExt(f.name); const when = fileDate(f.deleted_at); const dName = f.name.replace(/"/g, '&quot;'); const actor = f.deleted_by_email ? ` by ${esc(f.deleted_by_email)}` : ''; return `<tr><td><div class="file-row-name">${fileIconHtml(ext)}<div><div class="file-row-title">${esc(f.name)}</div><div class="file-row-sub">${fileSizeLabel(f.size || 0)}</div></div></div></td><td>${when}</td><td>${esc(fileOwner(f))}</td><td>Deleted${actor} ${when}</td><td><div class="file-row-actions">${isAdmin ? `<button class="file-action-btn" data-fid="${f.id}" onclick="openFileHistory(this.dataset.fid)">History</button>` : ''}<button class="file-action-btn primary" data-fid="${f.id}" data-name="${dName}" onclick="restoreFile(this.dataset.fid, this.dataset.name)">Restore</button>${isAdmin ? `<button class="file-action-btn danger" data-fid="${f.id}" data-name="${dName}" onclick="purgeFile(this.dataset.fid, this.dataset.name)">Delete forever</button>` : ''}</div></td></tr>`; }).join('')}</tbody></table>`;
}

async function restoreFile(fileId, name) {
  try { await apiPost('/files/' + fileId + '/restore', {}); trashList = trashList.filter(f => f.id !== fileId); renderTrashList(); toast(`${name} restored`); }
  catch (e) { toast('Restore failed: ' + e.message); }
}

async function purgeFile(fileId, name) {
  if (!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
  try { await apiDelete('/files/' + fileId + '/purge'); trashList = trashList.filter(f => f.id !== fileId); renderTrashList(); toast(`${name} permanently deleted`); }
  catch (e) { toast('Delete failed: ' + e.message); }
}

async function loadFiles() {
  try { filesList = await apiGet(filesEndpoint()); document.getElementById('file-library-view') ? renderDocumentLibraryList() : renderFileList(); }
  catch (e) { const el = document.getElementById('file-list'); if (el) el.innerHTML = emptyState('Could not load files', e.message || 'Try refreshing the page.'); }
}

function renderDocumentLibraryList() {
  const el = document.getElementById('file-list');
  const quick = document.getElementById('file-quick-list');
  selectedFileIds = new Set([...selectedFileIds].filter(id => filesList.some(f => String(f.id) === id)));
  if (quick) quick.innerHTML = quickAccessHtml(filesList);
  if (!el) return;
  const q = (document.getElementById('file-home-search')?.value || '').trim().toLowerCase();
  const source = fileView === 'shared' ? filesList.filter(isSharedFile) : fileView === 'favorites' ? filesList.slice(0, 12) : filesList;
  const searched = filterFilesForHome(fileFilter, source, false).filter(f => !q || f.name.toLowerCase().includes(q) || fileOwner(f).toLowerCase().includes(q));
  const rows = q ? searched : searched.filter(fileMatchesCurrentFolder);
  const folders = q ? [] : childFoldersForPath(source);
  const tableRows = [...folders.map(folderLibraryRow), ...rows.map(fileLibraryRow)].join('');
  lastRenderedFileIds = rows.map(f => String(f.id));
  const allSelected = lastRenderedFileIds.length > 0 && lastRenderedFileIds.every(id => selectedFileIds.has(id));
  const someSelected = !allSelected && lastRenderedFileIds.some(id => selectedFileIds.has(id));
  const selectAllClass = allSelected ? ' selected' : someSelected ? ' partial' : '';
  const breadcrumb = document.getElementById('file-library-breadcrumb');
  if (breadcrumb) breadcrumb.innerHTML = fileBreadcrumbHtml();
  if (!folders.length && !rows.length) {
    el.innerHTML = q
      ? emptyState('No matching documents', 'Try a broader search or clear the current filter.')
      : emptyState(currentFolderPath ? 'This folder is empty' : 'No documents in this view', 'Upload files or switch views to see shared and recent documents.');
    updateFileLibraryChrome();
    return;
  }
  const table = `<div class="file-library-table-wrap"><table class="file-library-table"><thead><tr><th style="width:44px"><button class="file-library-select file-select-all${selectAllClass}" title="Select all" aria-label="Select all" onclick="toggleSelectAllFiles()"></button></th><th>Name</th><th style="width:160px">Modified</th><th style="width:210px">Owner</th><th style="width:150px;text-align:right">Actions</th></tr></thead><tbody>${tableRows}</tbody></table></div>`;
  el.innerHTML = fileLayoutMode === 'commander'
    ? `<div class="file-commander-shell">${commanderFolderPane(source)}<div class="file-commander-main">${table}</div></div>`
    : table;
  updateFileLibraryChrome();
}

function selectedFiles() {
  return filesList.filter(f => selectedFileIds.has(String(f.id)));
}

function selectSingleFile(fileId) {
  selectedFileIds = new Set([String(fileId)]);
}

function openAskFile(fileId) {
  selectSingleFile(fileId);
  openAskSelected();
}

function openShareFile(fileId) {
  selectSingleFile(fileId);
  openShareSelected();
}

async function openFileDetails(fileId) {
  if (!document.getElementById('file-library-view')) {
    await renderDocumentLibrary('active');
  }
  selectSingleFile(fileId);
  detailsPaneOpen = true;
  renderDocumentLibraryList();
}

function updateFileLibraryChrome() {
  const commandbar = document.getElementById('file-library-commandbar');
  if (commandbar) commandbar.innerHTML = fileLibraryCommandBarHtml();
  renderFileDetailsPane();
}

function toggleFileSelection(fileId, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const id = String(fileId);
  if (selectedFileIds.has(id)) selectedFileIds.delete(id);
  else selectedFileIds.add(id);
  renderDocumentLibraryList();
}

function toggleSelectAllFiles() {
  const allSelected = lastRenderedFileIds.length > 0 && lastRenderedFileIds.every(id => selectedFileIds.has(id));
  if (allSelected) lastRenderedFileIds.forEach(id => selectedFileIds.delete(id));
  else lastRenderedFileIds.forEach(id => selectedFileIds.add(id));
  renderDocumentLibraryList();
}

function handleLibraryRowClick(event, fileId) {
  if (event.target.closest('button')) return;
  toggleFileSelection(fileId, event);
}

function clearFileSelection(render = true) {
  selectedFileIds = new Set();
  if (render && document.getElementById('file-library-view')) renderDocumentLibraryList();
}

function firstSelectedFile() {
  return selectedFiles()[0] || null;
}

function openSelectedFile() {
  const f = firstSelectedFile();
  if (!f) return;
  openRecommendedFile(f.id);
}

async function downloadSelectedFiles() {
  const selected = selectedFiles();
  if (!selected.length) return;
  for (const f of selected) await downloadFile(f.id);
}

async function deleteSelectedFiles() {
  const selected = selectedFiles();
  if (!selected.length) return;
  const label = selected.length === 1 ? `"${selected[0].name}"` : `${selected.length} documents`;
  if (!confirm(`Move ${label} to Trash? You can restore ${selected.length === 1 ? 'it' : 'them'} later.`)) return;
  for (const f of selected) {
    await apiDelete('/files/' + f.id);
    filesList = filesList.filter(x => String(x.id) !== String(f.id));
  }
  clearFileSelection(false);
  renderDocumentLibraryList();
  toast(`${label} moved to Trash`);
}

function toggleDetailsPane() {
  detailsPaneOpen = !detailsPaneOpen;
  renderFileDetailsPane();
}

function renderFileDetailsPane() {
  const layout = document.getElementById('file-library-layout');
  const pane = document.getElementById('file-details-pane');
  if (!layout || !pane) return;
  const f = firstSelectedFile();
  const open = detailsPaneOpen && !!f;
  layout.classList.toggle('details-open', open);
  pane.style.display = open ? '' : 'none';
  if (!open) return;
  const ext = fileExt(f.name);
  const isOffice = ['docx','doc','xlsx','xls','pptx','ppt'].includes(ext);
  const canIngest = ['docx','doc','xlsx','xls','pdf','txt','md','csv'].includes(ext);
  const canEdit = currentUser?.role === 'admin' || currentUser?.role === 'contributor';
  const isAdmin = currentUser?.role === 'admin';
  const dName = f.name.replace(/"/g, '&quot;');
  pane.innerHTML = `<div class="file-details-head"><div><div class="file-details-title">${esc(fileDisplayName(f))}</div><div class="file-details-kind">${esc(fileKind(ext))} · ${fileSizeLabel(f.size || 0)}</div></div><button class="file-library-close" title="Close details" onclick="toggleDetailsPane()">×</button></div>
    <section class="file-details-section"><div class="file-details-section-title">File</div><div class="file-details-meta"><div class="file-details-row"><strong>Owner</strong><span>${esc(fileOwner(f))}</span></div><div class="file-details-row"><strong>Modified</strong><span>${fileDate(f.created_at)}</span></div><div class="file-details-row"><strong>Location</strong><span>${esc(fileFolderPath(f) || (isSharedFile(f) ? 'Shared with me' : 'My files'))}</span></div></div></section>
    <section class="file-details-section"><div class="file-details-section-title">Open & share</div><div class="file-details-actions"><button class="file-library-tool" onclick="openSelectedFile()">Open</button><button class="file-library-tool" onclick="downloadSelectedFiles()">Download</button><button class="file-library-tool" onclick="openShareSelected()">Share link</button></div></section>
    <section class="file-details-section"><div class="file-details-section-title">AI</div><div class="file-details-actions"><button class="file-library-tool" onclick="openAskSelected()">Ask about this file</button>${canIngest && canEdit ? `<button class="file-library-tool" data-fid="${f.id}" data-name="${dName}" onclick="ingestFile(this.dataset.fid, this.dataset.name)">Index with AI</button>` : ''}</div><div class="file-details-hint">Use AI on selected files only when you need grounded answers or searchable document text.</div></section>
    ${isOffice || f.google_drive_id || isAdmin ? `<section class="file-details-section"><div class="file-details-section-title">Editing & history</div><div class="file-details-actions">${isOffice ? `<button class="file-library-tool" data-fid="${f.id}" onclick="openInGoogle(this.dataset.fid)">Open in Google Docs</button>` : ''}${f.google_drive_id && canEdit ? `<button class="file-library-tool" data-fid="${f.id}" onclick="exportFromGoogle(this.dataset.fid)">Export Google edits</button>` : ''}${isAdmin ? `<button class="file-library-tool" onclick="openFileHistory('${f.id}')">Version history</button>` : ''}</div></section>` : ''}
    ${canEdit ? `<section class="file-details-section"><div class="file-details-section-title">Danger zone</div><div class="file-details-actions"><button class="file-library-tool danger" data-fid="${f.id}" data-name="${dName}" onclick="deleteFile(this.dataset.fid, this.dataset.name)">Move to Trash</button></div></section>` : ''}`;
}

function closeAskSelected() {
  document.getElementById('file-ask-scrim')?.remove();
}

function closeCollectionAsk() {
  document.getElementById('file-collection-ask-scrim')?.remove();
}

function openCollectionAsk() {
  closeCollectionAsk();
  document.body.insertAdjacentHTML('beforeend', `<div class="scrim open" id="file-collection-ask-scrim" onclick="if(event.target.id==='file-collection-ask-scrim')closeCollectionAsk()"><div class="modal file-ask-modal"><h2>Ask the collection</h2><p class="sub">Search across indexed documents and pages from Home or Files.</p><textarea class="file-ask-input" id="file-collection-question" placeholder="Ask anything grounded in what you've gathered"></textarea><div class="btn-row" style="margin-top:12px"><button class="run-btn" id="file-collection-ask-go" onclick="submitCollectionAsk(false)">Ask</button><button class="ghost-btn" id="file-collection-ask-save" onclick="submitCollectionAsk(true)">Ask & file answer</button><button class="ghost-btn" id="file-collection-ask-stop" onclick="stopStream()" style="display:none">Stop</button><button class="ghost-btn" onclick="closeCollectionAsk()">Close</button></div><div class="file-ask-answer dim" id="file-collection-answer">Answer will stream here.</div></div></div>`);
  setTimeout(() => document.getElementById('file-collection-question')?.focus(), 0);
}

async function submitCollectionAsk(fileIt) {
  const question = document.getElementById('file-collection-question')?.value.trim();
  const answer = document.getElementById('file-collection-answer');
  if (!question || !answer) {
    toast('Type a question first');
    return;
  }
  const goBtn = document.getElementById('file-collection-ask-go');
  const saveBtn = document.getElementById('file-collection-ask-save');
  const stopBtn = document.getElementById('file-collection-ask-stop');
  answer.className = 'file-ask-answer dim';
  answer.textContent = 'Searching the collection...';
  if (goBtn) goBtn.disabled = true;
  if (saveBtn) saveBtn.disabled = true;
  if (stopBtn) stopBtn.style.display = '';
  const result = await streamFromApi('/ai/query', { question, fileIt }, answer);
  if (goBtn) goBtn.disabled = false;
  if (saveBtn) saveBtn.disabled = false;
  if (stopBtn) stopBtn.style.display = 'none';
  if (result?.saved) {
    state.pages.push({ ...result.saved, fresh: true });
    renderIndex();
    toast('Filed as: ' + result.saved.title);
  }
}

function openAskSelected() {
  const selected = selectedFiles();
  if (!selected.length) return;
  closeAskSelected();
  const docs = selected.map(f => `<span class="file-ask-chip" title="${esc(f.name)}">${esc(f.name)}</span>`).join('');
  document.body.insertAdjacentHTML('beforeend', `<div class="scrim open" id="file-ask-scrim" onclick="if(event.target.id==='file-ask-scrim')closeAskSelected()"><div class="modal file-ask-modal"><h2>Ask selected documents</h2><p class="sub">Claude will answer only from the files you selected.</p><div class="file-ask-docs">${docs}</div><textarea class="file-ask-input" id="file-ask-question" placeholder="Ask a question about these documents"></textarea><div class="btn-row" style="margin-top:12px"><button class="run-btn" onclick="submitAskSelected()">Ask Claude</button><button class="ghost-btn" onclick="stopStream()">Stop</button><button class="ghost-btn" onclick="closeAskSelected()">Close</button></div><div class="file-ask-answer dim" id="file-ask-answer">Answer will stream here.</div></div></div>`);
  setTimeout(() => document.getElementById('file-ask-question')?.focus(), 0);
}

async function submitAskSelected() {
  const question = document.getElementById('file-ask-question')?.value.trim();
  const answer = document.getElementById('file-ask-answer');
  const selected = selectedFiles();
  if (!question || !answer || !selected.length) return;
  answer.className = 'file-ask-answer dim';
  answer.textContent = 'Reading selected documents...';
  await streamFromApi('/files/ask', { ids: selected.map(f => f.id), question }, answer);
}

function closeShareSelected() {
  document.getElementById('file-share-scrim')?.remove();
}

async function openShareSelected() {
  const f = firstSelectedFile();
  if (!f) return;
  closeShareSelected();
  document.body.insertAdjacentHTML('beforeend', `<div class="scrim open" id="file-share-scrim" onclick="if(event.target.id==='file-share-scrim')closeShareSelected()"><div class="modal file-share-modal"><h2>Share file</h2><p class="sub">${esc(f.name)}</p><section><h3>Workspace access</h3><div class="file-access-form"><input id="file-access-email" type="email" placeholder="person@example.com" autocomplete="off"><select id="file-access-permission"><option value="read">Can view</option><option value="write">Can edit</option><option value="admin">Can manage</option></select><button class="run-btn" onclick="grantFileAccess()">Grant</button></div><div class="file-share-list" id="file-access-list">${emptyState('Loading access', 'Checking who can open this file.')}</div></section><section class="file-share-section"><h3>Public link</h3><div class="file-share-grid"><label for="share-expiry">Expires</label><select id="share-expiry"><option value="7">7 days</option><option value="30">30 days</option><option value="90">90 days</option><option value="0">Never</option></select><label for="share-password">Password</label><input id="share-password" type="password" placeholder="Optional"></div><div class="btn-row"><button class="run-btn" onclick="createShareLink()">Create link</button><button class="ghost-btn" onclick="closeShareSelected()">Close</button></div><div class="file-share-result" id="file-share-result"><input class="file-share-url" id="file-share-url" readonly><button class="file-library-tool" onclick="copyShareUrl()">Copy link</button></div><h3 style="margin-top:22px">Existing links</h3><div class="file-share-list" id="file-share-list">${emptyState('Loading links', 'Checking existing share links for this file.')}</div></section></div></div>`);
  await loadFileAccess(f.id);
  await loadShareLinks(f.id);
}

function shareDate(value) {
  return value ? new Date(value).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : 'Never';
}

async function loadShareLinks(fileId = firstSelectedFile()?.id) {
  const list = document.getElementById('file-share-list');
  if (!fileId || !list) return;
  try {
    const data = await apiGet('/files/' + fileId + '/shares');
    const shares = data.shares || [];
    if (!shares.length) {
      list.innerHTML = emptyState('No share links yet', 'Create a link when you are ready to share this file outside the workspace.');
      return;
    }
    list.innerHTML = shares.map(s => `<div class="file-share-item ${s.revoked_at ? 'file-share-revoked' : ''}"><div><strong>${s.revoked_at ? 'Revoked' : 'Active'} link</strong><div class="file-share-meta">Expires: ${shareDate(s.expires_at)} · Opens: ${s.access_count || 0}${s.has_password ? ' · Password protected' : ''}</div></div>${s.revoked_at ? '' : `<button class="file-library-tool" data-share="${s.id}" onclick="revokeShareLink(this.dataset.share)">Revoke</button>`}</div>`).join('');
  } catch (e) {
    list.innerHTML = emptyState('Could not load shares', e.message || 'Try opening the share dialog again.');
  }
}

function permissionLabel(permission) {
  return permission === 'admin' ? 'Can manage' : permission === 'write' ? 'Can edit' : 'Can view';
}

async function loadFileAccess(fileId = firstSelectedFile()?.id) {
  const list = document.getElementById('file-access-list');
  if (!fileId || !list) return;
  try {
    const data = await apiGet('/files/' + fileId + '/access');
    const grants = data.grants || [];
    if (!grants.length) {
      list.innerHTML = emptyState('No additional workspace access', 'The owner and admins can manage this file.');
      return;
    }
    list.innerHTML = grants.map(g => `<div class="file-share-item"><div><strong>${esc(g.subject_email || g.subject_id || 'Unknown user')}</strong><div class="file-share-meta">${permissionLabel(g.permission)} · Granted ${shareDate(g.created_at)}</div></div><button class="file-library-tool" data-grant="${g.id}" onclick="revokeFileAccess(this.dataset.grant)">Revoke</button></div>`).join('');
  } catch (e) {
    list.innerHTML = emptyState('Could not load access', e.message || 'Try opening the share dialog again.');
  }
}

async function grantFileAccess() {
  const f = firstSelectedFile();
  if (!f) return;
  const email = document.getElementById('file-access-email')?.value.trim();
  const permission = document.getElementById('file-access-permission')?.value || 'read';
  if (!email) return toast('Enter an email address');
  try {
    await apiPut('/files/' + f.id + '/access', { email, permission });
    const input = document.getElementById('file-access-email');
    if (input) input.value = '';
    toast('Access granted');
    await loadFileAccess(f.id);
  } catch (e) {
    toast('Grant failed: ' + e.message);
  }
}

async function revokeFileAccess(grantId) {
  const f = firstSelectedFile();
  if (!f || !grantId) return;
  try {
    await apiDelete('/files/' + f.id + '/access/' + grantId);
    toast('Access revoked');
    await loadFileAccess(f.id);
  } catch (e) {
    toast('Revoke failed: ' + e.message);
  }
}

async function createShareLink() {
  const f = firstSelectedFile();
  if (!f) return;
  const days = document.getElementById('share-expiry')?.value || '7';
  const password = document.getElementById('share-password')?.value || '';
  try {
    const data = await apiPost('/files/' + f.id + '/shares', {
      expiresInDays: days,
      neverExpires: days === '0',
      password
    });
    const url = data.share?.url;
    const result = document.getElementById('file-share-result');
    const input = document.getElementById('file-share-url');
    if (url && result && input) {
      input.value = url;
      result.classList.add('open');
      await copyText(url).catch(() => {});
      toast('Share link created');
    }
    await loadShareLinks(f.id);
  } catch (e) {
    toast('Share failed: ' + e.message);
  }
}

async function revokeShareLink(shareId) {
  const f = firstSelectedFile();
  if (!f || !shareId) return;
  try {
    await apiDelete('/files/' + f.id + '/shares/' + shareId);
    toast('Share link revoked');
    await loadShareLinks(f.id);
  } catch (e) {
    toast('Revoke failed: ' + e.message);
  }
}

function shareLinkStatus(share) {
  if (share.revoked_at) return { label: 'Revoked', className: 'revoked' };
  if (share.document_deleted) return { label: 'File deleted', className: 'expired' };
  if (share.expires_at && new Date(share.expires_at).getTime() <= Date.now()) return { label: 'Expired', className: 'expired' };
  return { label: 'Active', className: 'active' };
}

function shareLinkCard(share) {
  const status = shareLinkStatus(share);
  const fileName = share.document_name || 'Unknown file';
  const canRevoke = status.label === 'Active';
  return `<div class="file-link-card ${status.className !== 'active' ? 'file-share-revoked' : ''}">
    <div>
      <div class="file-link-title" title="${esc(fileName)}">${esc(fileName)}</div>
      <div class="file-link-meta">
        Created ${shareDate(share.created_at)} by ${esc(share.created_by_email || 'unknown')}<br>
        Expires: ${shareDate(share.expires_at)} · Opens: ${share.access_count || 0}${share.last_accessed_at ? ` · Last opened: ${shareDate(share.last_accessed_at)}` : ''}${share.has_password ? ' · Password protected' : ''}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
      <span class="file-link-status ${status.className}">${status.label}</span>
      ${canRevoke ? `<button class="file-library-tool" data-doc="${share.document_id}" data-share="${share.id}" onclick="revokeShareFromLinks(this.dataset.doc, this.dataset.share)">Revoke</button>` : ''}
    </div>
  </div>`;
}

async function renderShareLinks() {
  document.getElementById('panel').innerHTML = fileHomeShell(`<div class="file-home-title-row"><h2 class="file-home-title">Share links</h2><button class="file-library-tool" onclick="renderShareLinks()">Refresh</button></div><div class="file-links-list" id="file-links-list">${emptyState('Loading share links', 'Collecting active, expired, and revoked links.')}</div>`, 'files', 'links');
  const list = document.getElementById('file-links-list');
  if (!list) return;
  try {
    const data = await apiGet('/files/shares');
    const shares = data.shares || [];
    if (!shares.length) {
      list.innerHTML = emptyState('No share links yet', 'Select a file, choose Share, and create your first link.');
      return;
    }
    list.innerHTML = shares.map(shareLinkCard).join('');
  } catch (e) {
    list.innerHTML = emptyState('Could not load share links', e.message || 'Try refreshing this view.');
  }
}

async function revokeShareFromLinks(documentId, shareId) {
  if (!documentId || !shareId) return;
  try {
    await apiDelete('/files/' + documentId + '/shares/' + shareId);
    toast('Share link revoked');
    await renderShareLinks();
  } catch (e) {
    toast('Revoke failed: ' + e.message);
  }
}

async function copyText(text) {
  if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

async function copyShareUrl() {
  const url = document.getElementById('file-share-url')?.value;
  if (!url) return;
  await copyText(url);
  toast('Link copied');
}

async function renderFileList() {
  const el = document.getElementById('file-list');
  const rec = document.getElementById('file-recommendations');
  const quick = document.getElementById('file-quick-list');
  if (quick) quick.innerHTML = quickAccessHtml(filesList);
  renderHomeInsights(filesList);
  if (!el) return;
  const q = (document.getElementById('file-home-search')?.value || '').trim();
  let searchableFiles = filesList;
  if (q) {
    const seq = ++fileSearchSeq;
    el.innerHTML = emptyState('Searching document text', 'Looking through filenames, owners, and indexed content.');
    try {
      searchableFiles = await apiGet('/files/search?q=' + encodeURIComponent(q));
      if (seq !== fileSearchSeq) return;
    } catch (e) {
      if (seq !== fileSearchSeq) return;
      searchableFiles = filesList;
      toast('Search failed: ' + e.message);
    }
  } else {
    fileSearchSeq += 1;
  }
  const source = fileView === 'shared' ? searchableFiles.filter(isSharedFile) : searchableFiles;
  const rows = filterFilesForHome(fileFilter, searchableFiles, !q).filter(f => fileView === 'shared' ? isSharedFile(f) : true);
  if (!rows.length) {
    el.innerHTML = q
      ? emptyState('No files match this search', 'Try a shorter search, another file type, or clear the search field.')
      : emptyState('No files in this view', 'Upload files or switch to Shared, Links, or Trash.');
    return;
  }
  el.innerHTML = `<table class="file-library-table"><thead><tr><th>Name</th><th style="width:160px">Modified</th><th style="width:210px">Owner</th><th style="width:230px;text-align:right">Actions</th></tr></thead><tbody>${rows.slice(0, 12).map(fileHomeRow).join('')}</tbody></table>`;
}

function handleFilePickerChange(event) {
  uploadFiles(Array.from(event.target.files).map(file => ({ file, path: file.webkitRelativePath || file.name })));
  event.target.value = '';
}

function handleFileHomeDropOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'copy';
  event.currentTarget.classList.add('dragging');
}

function handleFileHomeDropLeave(event) {
  if (!event.currentTarget.contains(event.relatedTarget)) event.currentTarget.classList.remove('dragging');
}

async function handleFileHomeDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('dragging');
  const items = await filesFromFileHomeDrop(event.dataTransfer);
  uploadFiles(items);
}

async function filesFromFileHomeDrop(dataTransfer) {
  const entries = Array.from(dataTransfer.items || [])
    .map(item => item.webkitGetAsEntry && item.webkitGetAsEntry())
    .filter(Boolean);
  if (!entries.length) return Array.from(dataTransfer.files || []).map(file => ({ file, path: file.name }));

  const out = [];
  async function walk(entry, prefix = '') {
    if (entry.isFile) {
      const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
      out.push({ file, path: prefix + file.name });
      return;
    }
    if (entry.isDirectory) {
      const reader = entry.createReader();
      let batch;
      do {
        batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
        for (const child of batch) await walk(child, prefix + entry.name + '/');
      } while (batch.length);
    }
  }
  for (const entry of entries) await walk(entry);
  return out;
}

async function uploadFiles(items) {
  if (!items.length) return;
  const statusEl = document.getElementById('upload-status');

  let uploaded = 0;
  for (const item of items) {
    const file = item.file || item;
    const displayName = item.path || file.webkitRelativePath || file.name;
    setUploadStatus(statusEl, `Uploading ${uploaded + 1} of ${items.length}: ${displayName}`, 0, file.size);
    try {
      const { doc, canIngest } = file.size >= RESUMABLE_UPLOAD_THRESHOLD
        ? await uploadFileResumable(file, displayName, statusEl, uploaded + 1, items.length)
        : await uploadFileStream(file, displayName);
      filesList.unshift(doc);
      document.getElementById('file-library-view') ? renderDocumentLibraryList() : renderFileList();
      uploaded += 1;
      toast(canIngest ? `${displayName} uploaded — click "Index" to add it` : `${displayName} uploaded`);
    } catch (e) {
      toast(`Upload error for ${displayName}: ${e.message}`);
    }
  }
  if (statusEl) statusEl.textContent = uploaded ? `Uploaded ${uploaded} item${uploaded === 1 ? '' : 's'}.` : '';
}

function setUploadStatus(statusEl, label, doneBytes = 0, totalBytes = 0) {
  if (!statusEl) return;
  const pct = totalBytes ? Math.min(100, Math.round((doneBytes / totalBytes) * 100)) : 0;
  statusEl.innerHTML = `<div class="upload-line"><div class="upload-meta"><span>${esc(label)}</span><span>${pct}%</span></div><div class="upload-bar"><div class="upload-fill" style="--pct:${pct}%"></div></div></div>`;
}

async function uploadFileStream(file, displayName) {
  const token = await getToken();
  const res = await fetch('/api/files/upload-stream?displayName=' + encodeURIComponent(displayName) + (currentLibraryId ? '&libraryId=' + encodeURIComponent(currentLibraryId) : ''), {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': file.type || 'application/octet-stream'
    },
    body: file,
  });
  if (!res.ok) throw new Error(await uploadErrorMessage(res));
  return res.json();
}

function uploadResumeKey(file, displayName) {
  return `memex_upload_session:${displayName}:${file.size}:${file.lastModified || 0}`;
}

async function uploadErrorMessage(res) {
  try {
    const body = await res.json();
    return body.error || JSON.stringify(body);
  } catch {
    return await res.text();
  }
}

async function getOrCreateUploadSession(file, displayName) {
  const key = uploadResumeKey(file, displayName);
  const savedId = localStorage.getItem(key);
  if (savedId) {
    try {
      const existing = await apiGet('/files/uploads/' + savedId);
      if (existing.session?.status === 'active') return { key, session: existing.session, resumed: true };
    } catch {
      localStorage.removeItem(key);
    }
  }
  const created = await apiPost('/files/uploads', {
    displayName,
    size: file.size,
    mimeType: file.type || 'application/octet-stream',
    chunkSize: RESUMABLE_CHUNK_SIZE
  });
  localStorage.setItem(key, created.session.id);
  return { key, session: created.session, resumed: false };
}

async function uploadFileResumable(file, displayName, statusEl, ordinal, totalItems) {
  let { key, session, resumed } = await getOrCreateUploadSession(file, displayName);
  const received = new Set((session.receivedChunks || []).map(Number));
  const totalChunks = session.totalChunks || Math.ceil(file.size / RESUMABLE_CHUNK_SIZE);
  let doneBytes = received.size * (session.chunkSize || RESUMABLE_CHUNK_SIZE);
  if (received.has(totalChunks - 1)) doneBytes = file.size - (totalChunks - received.size) * (session.chunkSize || RESUMABLE_CHUNK_SIZE);
  setUploadStatus(statusEl, `${resumed ? 'Resuming' : 'Uploading'} ${ordinal} of ${totalItems}: ${displayName}`, Math.max(0, Math.min(file.size, doneBytes)), file.size);

  for (let index = 0; index < totalChunks; index += 1) {
    if (received.has(index)) continue;
    const chunkSize = session.chunkSize || RESUMABLE_CHUNK_SIZE;
    const start = index * chunkSize;
    const end = Math.min(file.size, start + chunkSize);
    const token = await getToken();
    const res = await fetch(`/api/files/uploads/${session.id}/chunks/${index}`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/octet-stream'
      },
      body: file.slice(start, end)
    });
    if (!res.ok) throw new Error(await uploadErrorMessage(res));
    const body = await res.json();
    session = body.session || session;
    received.add(index);
    setUploadStatus(statusEl, `Uploading ${ordinal} of ${totalItems}: ${displayName}`, Math.min(file.size, end), file.size);
  }

  const completed = await apiPost('/files/uploads/' + session.id + '/complete', { libraryId: currentLibraryId });
  localStorage.removeItem(key);
  setUploadStatus(statusEl, `Uploaded ${displayName}`, file.size, file.size);
  return completed;
}

function closeFileHistory() {
  document.getElementById('file-history-scrim')?.remove();
}

function historyDate(value) {
  return value ? new Date(value).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : '';
}

async function openFileHistory(fileId) {
  if (currentUser?.role !== 'admin') return;
  closeFileHistory();
  document.body.insertAdjacentHTML('beforeend', `<div class="file-history-scrim" id="file-history-scrim" onclick="if(event.target.id==='file-history-scrim')closeFileHistory()"><div class="file-history-modal"><div class="file-history-head"><div><h2 class="file-history-title">File history</h2><div class="file-history-sub">Loading...</div></div><button class="file-action-btn" onclick="closeFileHistory()">Close</button></div><div class="file-history-body"><div class="file-empty-home">Loading history...</div></div></div></div>`);
  try {
    const data = await apiGet('/files/' + fileId + '/history');
    const doc = data.doc || {};
    const retention = data.retention_days || 30;
    const events = data.events || [];
    const versions = data.versions || [];
    const status = doc.deleted_at
      ? `In trash · deleted ${historyDate(doc.deleted_at)}${doc.deleted_by_email ? ' by ' + esc(doc.deleted_by_email) : ''}`
      : 'Active file';
    const retentionText = doc.deleted_at ? `Retention window: ${retention} days before admin purge review.` : `Trash retention window: ${retention} days.`;
    const versionHtml = versions.length
      ? versions.map(v => `<div class="file-history-item"><div><strong>Version ${esc(String(v.version_number))}</strong><div class="file-history-meta">${esc(v.source || 'saved')} · ${historyDate(v.saved_at)}${v.saved_by_email ? ' · ' + esc(v.saved_by_email) : ''} · ${fileSizeLabel(v.size || 0)}</div></div><button class="file-action-btn" data-fid="${doc.id}" data-vid="${v.id}" onclick="restoreFileVersion(this.dataset.fid,this.dataset.vid)">Restore</button></div>`).join('')
      : '<div class="file-empty-home">No previous versions yet.</div>';
    const eventHtml = events.length
      ? events.map(ev => `<div class="file-history-item"><div><strong>${esc((ev.event_type || '').replaceAll('_', ' '))}</strong><div class="file-history-meta">${historyDate(ev.created_at)}${ev.actor_email ? ' · ' + esc(ev.actor_email) : ''}${ev.detail ? ' · ' + esc(ev.detail) : ''}</div></div></div>`).join('')
      : '<div class="file-empty-home">No audit events yet.</div>';

    const modal = document.querySelector('#file-history-scrim .file-history-modal');
    modal.querySelector('.file-history-title').textContent = doc.name || 'File history';
    modal.querySelector('.file-history-sub').innerHTML = `${status}<br>${retentionText}`;
    modal.querySelector('.file-history-body').innerHTML = `<section class="file-history-section"><h3>Previous versions</h3><div class="file-history-list">${versionHtml}</div></section><section class="file-history-section"><h3>Admin audit timeline</h3><div class="file-history-list">${eventHtml}</div></section>`;
  } catch (e) {
    const body = document.querySelector('#file-history-scrim .file-history-body');
    if (body) body.innerHTML = `<p class="note" style="color:var(--accent)">Could not load history: ${esc(e.message)}</p>`;
  }
}

async function restoreFileVersion(fileId, versionId) {
  if (!confirm('Restore this previous file version? The current file will be saved as a new version first.')) return;
  try {
    const data = await apiPost('/files/' + fileId + '/restore-version/' + versionId, {});
    filesList = filesList.filter(f => String(f.id) !== String(fileId));
    if (data.doc && !data.doc.deleted_at) filesList.unshift(data.doc);
    trashList = trashList.filter(f => String(f.id) !== String(fileId));
    closeFileHistory();
    if (fileView === 'trash') renderTrashList(); else renderFileList();
    toast('Previous version restored');
  } catch (e) {
    toast('Version restore failed: ' + e.message);
  }
}

async function openInOffice(fileId) {
  try {
    const data = await apiGet('/files/' + fileId + '/office');
    // Prefer edit URL (WOPI), fall back to view URL
    const url = data.editUrl || data.viewUrl;
    if (!url) { toast('Could not generate Office URL'); return; }
    window.open(url, '_blank', 'noopener');
    if (!data.editUrl) toast('Opening in read-only mode. Set APP_URL on the server to enable editing.');
  } catch (e) { toast('Error: ' + e.message); }
}

async function openInGoogle(fileId) {
  toast('Uploading to Google Drive…');
  try {
    const token = await getToken();
    const res = await fetch('/api/files/' + fileId + '/google', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Google Drive error'); return; }
    // Refresh file list to show google_drive_id
    await loadFiles();
    window.open(data.editUrl, '_blank', 'noopener');
    toast('Opened in Google Docs. Use "Export from Google" to save changes back.');
  } catch (e) { toast('Error: ' + e.message); }
}

async function exportFromGoogle(fileId) {
  if (!confirm('Export from Google Drive and overwrite the stored file?')) return;
  toast('Exporting…');
  try {
    const token = await getToken();
    const res = await fetch('/api/files/' + fileId + '/google/export', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Export failed'); return; }
    await loadFiles();
    toast('Exported and saved successfully');
  } catch (e) { toast('Error: ' + e.message); }
}

async function ingestFile(fileId, name) {
  toast(`Reading ${name}…`);
  const panel = document.getElementById('panel');

  try {
    const token = await getToken();
    const res = await fetch('/api/files/' + fileId + '/ingest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({}),
    });
    const data = await res.json();
    if (!res.ok) { toast('Ingest failed: ' + (data.error || 'unknown error')); return; }

    // Merge new pages into state
    for (const p of (data.pages || [])) {
      const idx = state.pages.findIndex(e => e.id === p.id);
      if (idx >= 0) state.pages[idx] = { ...p, fresh: true };
      else state.pages.push({ ...p, fresh: true });
    }
    renderIndex();
    toast(`${name} ingested — ${data.pages?.length || 0} pages updated`);

    // Show the summary and page chips
    if (panel) {
      const existing = panel.querySelector('.file-ingest-result');
      const resultEl = existing || document.createElement('div');
      resultEl.className = 'file-ingest-result';
      resultEl.style.cssText = 'margin-top:16px;padding:16px 18px;background:var(--surface);border:1px solid var(--rule);border-radius:3px;';
      resultEl.innerHTML = `<div class="result-label">Ingested: ${esc(name)}</div>
        <div class="response" style="margin-bottom:12px">${esc(data.summary || '')}</div>
        <div class="chips">${(data.pages||[]).map(p => `<span class="chip" onclick="openPage('${p.id}')">${esc(p.title)}</span>`).join('')}</div>`;
      if (!existing) panel.appendChild(resultEl);
    }
  } catch (e) { toast('Ingest error: ' + e.message); }
}

async function downloadFile(fileId) {
  try {
    const data = await apiGet('/files/' + fileId + '/url');
    const a = document.createElement('a');
    a.href = data.url; a.download = data.name; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } catch (e) { toast('Download error: ' + e.message); }
}

async function deleteFile(fileId, name) {
  if (!confirm(`Move "${name}" to Trash? You can restore it later.`)) return;
  try {
    await apiDelete('/files/' + fileId);
    filesList = filesList.filter(f => f.id !== fileId);
    document.getElementById('file-library-view') ? renderDocumentLibraryList() : renderFileList();
    toast(`${name} moved to Trash`);
  } catch (e) { toast('Delete failed: ' + e.message); }
}

/* ---------- boot ---------- */
document.getElementById('tabs').addEventListener('click', e => { const t = e.target.closest('.tab'); if (t) setTab(t.dataset.tab); });
document.getElementById('settings-scrim').addEventListener('click', e => { if (e.target.id === 'settings-scrim') closeSettings(); });
document.getElementById('page-search').addEventListener('keydown', e => {
  if (e.key === 'Enter') doContentSearch(e.target.value.trim());
});
document.getElementById('version-preview-scrim').addEventListener('click', e => {
  if (e.target.id === 'version-preview-scrim') document.getElementById('version-preview-scrim').classList.remove('open');
});
renderIndex();
initApp();
</script>
