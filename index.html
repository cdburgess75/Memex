<!DOCTYPE html>
<html lang="en" class="auth-locked">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex — team knowledge base</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Memex signature — light */
  --paper: #FBFBFA;
  --surface: #FFFFFF;
  --surface-2: #F4F4F2;
  --ink: #1B1B19;
  --ink-soft: #5B5A56;
  --ink-faint: #8E8C87;
  --accent: #C2603D;
  --accent-soft: #A94E2F;
  --accent-wash: #F8ECE6;
  --rule: rgba(27,27,25,0.09);
  --rule-soft: rgba(27,27,25,0.05);
  --shadow: 0 1px 2px rgba(20,19,17,0.05), 0 0 0 1px rgba(20,19,17,0.04);
  --ui: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  --display: var(--ui);
  --body: var(--ui);
  --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;
}
html.dark {
  /* Memex signature — dark */
  --paper: #16151A;
  --surface: #1D1C22;
  --surface-2: #26242C;
  --ink: #ECEAF0;
  --ink-soft: #A9A6B2;
  --ink-faint: #74717E;
  --accent: #E08A66;
  --accent-soft: #C2603D;
  --accent-wash: #2A1E18;
  --rule: rgba(236,234,240,0.11);
  --rule-soft: rgba(236,234,240,0.06);
  --shadow: 0 6px 24px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--body);
  background-color: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
::selection { background: var(--accent-wash); }

.masthead {
  border-bottom: 1px solid var(--rule);
  padding: 13px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  max-width: 1240px;
  margin: 0 auto;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.brand h1 {
  font-family: var(--ui);
  font-weight: 600;
  font-size: 19px;
  letter-spacing: -0.01em;
  line-height: 1;
}
.masthead-actions { display: flex; gap: 8px; align-items: center; }
.masthead-search {
  position: relative;
  flex: 1 1 auto;
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  height: 42px;
  padding: 0 6px 0 14px;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-radius: 21px;
  color: var(--ink-faint);
  transition: background .15s, border-color .15s, box-shadow .15s;
}
.masthead-search:focus-within { border-color: var(--rule); background: var(--surface); box-shadow: 0 1px 8px rgba(0,0,0,0.07); }
.masthead-search input { flex: 1; min-width: 0; border: 0; background: transparent; outline: 0; font: 14.5px var(--ui); color: var(--ink); }
.search-spark { display: inline-flex; align-items: center; color: var(--accent); flex: 0 0 auto; }
.search-go { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border: 0; border-radius: 50%; background: transparent; color: var(--ink-faint); cursor: pointer; flex: 0 0 auto; }
.search-go:hover { background: var(--surface-2); color: var(--accent); }
.masthead-search:focus-within .search-go:hover { background: var(--surface-2); }
.masthead-upload-wrap { position: relative; }
.masthead-upload {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 34px;
  padding: 0 14px;
  border: 0;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font: 600 13px var(--ui);
  cursor: pointer;
}
.masthead-upload:hover { filter: brightness(1.06); }
.masthead-upload .plus { font-size: 16px; line-height: 1; }
.masthead-upload .chev { font-size: 11px; opacity: 0.85; }
/* Upload is the secondary action next to the primary Create button. */
.masthead-upload.masthead-upload-secondary { background: var(--surface); color: var(--accent); border: 1px solid var(--accent); }
.masthead-upload.masthead-upload-secondary:hover { background: var(--accent-wash); filter: none; }
html.dark .masthead-upload.masthead-upload-secondary { background: transparent; }
.app-menu-version {
  font-size: 11.5px;
  color: var(--ink-faint);
  padding: 10px 12px 4px;
  border-top: 1px solid var(--rule-soft);
  margin-top: 4px;
}
.brand-version { align-self: center; font: 600 10.5px var(--mono); color: var(--ink-faint); border: 1px solid var(--rule); border-radius: 999px; padding: 1px 7px; }
.login-version { margin-top: 16px; font: 500 11px var(--mono); color: var(--ink-faint); text-align: center; }
.auth-locked .masthead,
.auth-locked .shell {
  display: none;
}
.app-menu-wrap { position: relative; }
.app-menu-btn {
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--surface);
  color: var(--ink);
  padding: 8px 12px;
  font: 600 13px var(--body);
  cursor: pointer;
  box-shadow: var(--shadow);
}
.app-menu-btn:hover { border-color: var(--accent); color: var(--accent); }
.app-menu-popover {
  display: none;
  position: absolute;
  z-index: 30;
  top: calc(100% + 8px);
  right: 0;
  width: min(280px, calc(100vw - 32px));
  padding: 8px;
  border: 1px solid var(--rule);
  border-radius: 8px;
  background: var(--surface);
  box-shadow: 0 14px 34px rgba(0,0,0,0.14);
}
.app-menu-popover.open { display: grid; gap: 4px; }
.app-menu-section {
  margin: 8px 8px 4px;
  color: var(--ink-faint);
  font: 700 11px var(--mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.app-menu-item {
  width: 100%;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--ink);
  padding: 9px 10px;
  text-align: left;
  font: 600 14px var(--body);
  cursor: pointer;
}
.app-menu-item:hover { background: var(--accent-wash); color: var(--accent); }
.app-menu-divider { height: 1px; background: var(--rule-soft); margin: 6px 8px; }
.security-indicator {
  position: relative;
  border: 1px solid var(--rule);
  border-radius: 999px;
  background: var(--surface);
  color: var(--ink-soft);
  padding: 8px 12px 8px 28px;
  font: 700 13px var(--body);
  cursor: pointer;
  box-shadow: var(--shadow);
  white-space: nowrap;
}
.security-indicator::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 50%;
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: var(--ink-faint);
  transform: translateY(-50%);
}
.security-indicator.ok::before { background: #2E7D32; }
.security-indicator.info::before { background: #0F6CBD; }
.security-indicator.warning::before { background: #B7791F; }
.security-indicator.critical::before { background: #C0392B; box-shadow: 0 0 0 4px rgba(192,57,43,0.12); }
.security-indicator:hover { border-color: var(--accent); color: var(--ink); }
.masthead-left { display: flex; align-items: center; gap: 12px; }
.brand-block { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
.brand-block .security-indicator { padding: 2px 9px 2px 21px; font-size: 10.5px; box-shadow: none; }
.brand-block .security-indicator::before { width: 7px; height: 7px; left: 8px; }
.status-wrap { position: relative; display: inline-flex; }
.status-popover { position: absolute; top: calc(100% + 8px); right: 0; min-width: 214px; background: var(--surface); border: 1px solid var(--rule); border-radius: 12px; padding: 8px; box-shadow: var(--shadow); display: none; flex-direction: column; gap: 4px; z-index: 60; }
.status-popover.open { display: flex; }
.status-popover-title { font: 700 11px var(--body); letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-faint); padding: 4px 8px 6px; }
.status-popover .security-indicator { display: flex; width: 100%; align-items: center; justify-content: flex-start; padding: 7px 12px 7px 28px; font-size: 12px; box-shadow: none; }
#update-indicator { font-family: var(--mono); letter-spacing: -0.02em; }
.security-modal-grid { display: grid; gap: 12px; margin-top: 16px; }
.security-status-card { border: 1px solid var(--rule); border-radius: 8px; background: var(--surface); padding: 14px 16px; }
.security-status-card strong { display: block; color: var(--ink); margin-bottom: 4px; }
.security-status-card span { color: var(--ink-soft); font-size: 14px; }
.theme-switcher {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--surface-2);
  box-shadow: var(--shadow);
}
.theme-switcher.top-theme-switcher {
  max-width: min(52vw, 420px);
  overflow-x: auto;
  scrollbar-width: none;
}
.theme-switcher.top-theme-switcher::-webkit-scrollbar { display: none; }
.theme-option {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  border: 0;
  border-radius: 3px;
  background: transparent;
  color: var(--ink-faint);
  padding: 6px 9px;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.15s, background 0.15s, box-shadow 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.theme-option:hover { color: var(--ink); background: var(--surface); }
.theme-option.active {
  color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 1px var(--rule-soft), 0 1px 2px rgba(0,0,0,0.04);
}
.theme-swatch {
  width: 12px;
  height: 12px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--ink) 14%, transparent);
  background: var(--swatch, var(--accent));
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.65);
}
.theme-swatch.office { --swatch: linear-gradient(135deg, #0078D4 0 50%, #FFFFFF 50% 100%); }
.theme-swatch.drive { --swatch: linear-gradient(135deg, #1A73E8 0 44%, #34A853 44% 72%, #FFFFFF 72% 100%); }
.theme-swatch.dropbox { --swatch: linear-gradient(135deg, #0061FF 0 58%, #EEF4FF 58% 100%); }
.theme-swatch.graphite { --swatch: linear-gradient(135deg, #111315 0 52%, #7CC7B7 52% 100%); }
.theme-swatch.dark { --swatch: linear-gradient(135deg, #1A1916 0 55%, #D97757 55% 100%); }
html.office body { background-image: none; }
html.office .masthead { border-bottom-color: var(--rule); }
html.office .brand h1 { font-family: var(--display); font-weight: 600; }
html.office .colophon::before {
  content: '';
  display: inline-block;
  width: 18px;
  height: 18px;
  margin-right: 8px;
  vertical-align: -4px;
  border-radius: 5px;
  background: linear-gradient(135deg, #0F6CBD 0 35%, #2AA0FF 35% 52%, #3BCEAC 52% 68%, #F7634D 68% 84%, #F2C94C 84% 100%);
  box-shadow: 0 2px 5px rgba(0,120,212,0.22);
}
html.office .tab.active,
html.office .run-btn,
html.office .provider-btn:hover,
html.office .page-link.active {
  background: var(--accent-wash);
  border-color: rgba(0,120,212,0.28);
}
html.office .run-btn {
  background: #0078D4;
  color: #FFFFFF;
  border-color: #0078D4;
}
html.office .run-btn:hover { background: #005A9E; border-color: #005A9E; }
html.office .theme-option,
html.office .icon-btn,
html.office .user-chip,
html.office .run-btn,
html.office .ghost-btn,
html.office .edit-btn,
html.office .delete-btn,
html.office .provider-btn,
html.office .field-label,
html.office .mode-tab,
html.office .file-action-btn,
html.office .upload-progress {
  font-family: var(--body);
  letter-spacing: 0;
  text-transform: none;
}
html.office .field-label,
html.office .mode-tab,
html.office .upload-progress {
  font-weight: 600;
}
html.office .file-icon.docx, html.office .file-icon.doc { background: #E8F3FF; color: #185ABD; }
html.office .file-icon.xlsx, html.office .file-icon.xls, html.office .file-icon.csv { background: #EAF7EA; color: #107C41; }
html.office .file-icon.pptx, html.office .file-icon.ppt { background: #FFF0EA; color: #C43E1C; }
html.office .file-icon.pdf { background: #FDECEC; color: #D13438; }
html.office-dark body,
html.drive body,
html.dropbox body,
html.graphite body { background-image: none; }
html.office-dark .masthead,
html.drive .masthead,
html.dropbox .masthead,
html.graphite .masthead { border-bottom-color: var(--rule); }
html.office-dark .theme-option,
html.office-dark .icon-btn,
html.office-dark .user-chip,
html.office-dark .run-btn,
html.office-dark .ghost-btn,
html.office-dark .edit-btn,
html.office-dark .delete-btn,
html.office-dark .provider-btn,
html.office-dark .field-label,
html.office-dark .mode-tab,
html.office-dark .file-action-btn,
html.office-dark .upload-progress,
html.drive .theme-option,
html.drive .icon-btn,
html.drive .user-chip,
html.drive .run-btn,
html.drive .ghost-btn,
html.drive .edit-btn,
html.drive .delete-btn,
html.drive .provider-btn,
html.drive .field-label,
html.drive .mode-tab,
html.drive .file-action-btn,
html.drive .upload-progress,
html.dropbox .theme-option,
html.dropbox .icon-btn,
html.dropbox .user-chip,
html.dropbox .run-btn,
html.dropbox .ghost-btn,
html.dropbox .edit-btn,
html.dropbox .delete-btn,
html.dropbox .provider-btn,
html.dropbox .field-label,
html.dropbox .mode-tab,
html.dropbox .file-action-btn,
html.dropbox .upload-progress,
html.graphite .theme-option,
html.graphite .icon-btn,
html.graphite .user-chip,
html.graphite .run-btn,
html.graphite .ghost-btn,
html.graphite .edit-btn,
html.graphite .delete-btn,
html.graphite .provider-btn,
html.graphite .field-label,
html.graphite .mode-tab,
html.graphite .file-action-btn,
html.graphite .upload-progress {
  font-family: var(--body);
  letter-spacing: 0;
  text-transform: none;
}
html.office-dark .run-btn,
html.drive .run-btn,
html.dropbox .run-btn,
html.graphite .run-btn {
  background: var(--accent);
  color: #FFFFFF;
  border-color: var(--accent);
}
html.drive .run-btn,
html.dropbox .run-btn { color: #FFFFFF; }
html.graphite .run-btn { color: #0B1614; }
html.office-dark .run-btn:hover,
html.drive .run-btn:hover,
html.dropbox .run-btn:hover,
html.graphite .run-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); color: #FFFFFF; }
html.office-dark .file-icon.docx, html.office-dark .file-icon.doc { background: #102A44; color: #8EC8FF; }
html.office-dark .file-icon.xlsx, html.office-dark .file-icon.xls, html.office-dark .file-icon.csv { background: #0E3023; color: #7BE0A8; }
html.office-dark .file-icon.pptx, html.office-dark .file-icon.ppt { background: #3A2217; color: #FFAD7A; }
html.office-dark .file-icon.pdf { background: #3A171D; color: #FF9AA7; }
html.drive .file-icon.docx, html.drive .file-icon.doc,
html.dropbox .file-icon.docx, html.dropbox .file-icon.doc { background: #E8F0FE; color: #1A73E8; }
html.drive .file-icon.xlsx, html.drive .file-icon.xls, html.drive .file-icon.csv,
html.dropbox .file-icon.xlsx, html.dropbox .file-icon.xls, html.dropbox .file-icon.csv { background: #E6F4EA; color: #188038; }
html.drive .file-icon.pptx, html.drive .file-icon.ppt,
html.dropbox .file-icon.pptx, html.dropbox .file-icon.ppt { background: #FEF7E0; color: #B06000; }
html.drive .file-icon.pdf,
html.dropbox .file-icon.pdf { background: #FCE8E6; color: #C5221F; }

html.graphite .file-icon.xlsx, html.graphite .file-icon.xls, html.graphite .file-icon.csv { background: #18312E; color: #7CC7B7; }
html.graphite .file-icon.pptx, html.graphite .file-icon.ppt { background: #352716; color: #F0B35A; }
html.graphite .file-icon.pdf { background: #351A20; color: #FF9AA7; }
.icon-btn {
  font-family: var(--ui);
  font-size: 13px;
  font-weight: 500;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-soft);
  padding: 7px 13px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--ink-faint); color: var(--ink); background: var(--surface-2); }
.user-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--ui);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
  padding: 5px 9px 5px 6px;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 999px;
  max-width: 230px;
  cursor: pointer;
}
.user-chip:hover { background: var(--surface-2); }
.user-chip-avatar {
  flex: 0 0 auto;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font: 600 10.5px var(--ui);
}
.user-chip-email { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-chip .chev { flex: 0 0 auto; font-size: 11px; color: var(--ink-faint); }

.shell {
  display: grid;
  grid-template-columns: 270px 1fr;
  max-width: 1240px;
  margin: 0 auto;
  min-height: calc(100vh - 76px);
}

.index-col {
  border-right: 1px solid var(--ink);
  padding: 26px 22px 40px;
  position: sticky;
  top: 0;
  align-self: start;
  max-height: 100vh;
  overflow-y: auto;
}
.index-head {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 8px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.index-head .count { color: var(--ink-faint); }

/* sidebar search */
.search-wrap { margin-bottom: 10px; }
#page-search {
  font-family: var(--mono);
  font-size: 12px;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 7px 10px;
  color: var(--ink);
  transition: border-color 0.15s;
}
#page-search:focus { outline: none; border-color: var(--accent); }
#page-search::placeholder { color: var(--ink-faint); }
.cat-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 14px;
}
.cat-pill {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  border-radius: 99px;
  padding: 3px 9px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.cat-pill:hover { color: var(--ink); border-color: var(--ink-soft); }
.cat-pill.active { background: var(--accent-wash); color: var(--accent); border-color: var(--accent); }

.cat-group { margin-bottom: 20px; }
.cat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.page-link {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 8px 4px 10px;
  cursor: pointer;
  border-left: 2px solid transparent;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.35;
  transition: all 0.12s;
  margin-left: -10px;
}
.page-link:hover { color: var(--ink); border-left-color: var(--accent-soft); }
.page-link.active { color: var(--ink); border-left-color: var(--accent); font-weight: 500; }
.page-link .dot { color: var(--accent); font-size: 11px; opacity: 0; transition: opacity 0.12s; }
.page-link.fresh .dot { opacity: 1; }
.empty-index { font-size: 14px; color: var(--ink-faint); font-style: italic; }

.work-col { display: flex; flex-direction: column; min-width: 0; }
.tabs {
  display: flex;
  border-bottom: 1px solid var(--ink);
  padding: 0 32px;
  gap: 0;
}
.tab {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 14px 18px 12px;
  cursor: pointer;
  color: var(--ink-faint);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab .ix { color: var(--accent); margin-right: 6px; }

.panel { padding: 34px 44px 60px; max-width: 760px; animation: rise 0.4s ease both; }
@keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* article view */
.article .kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.article .kicker .sep { color: var(--ink-faint); }
.article h1 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 40px;
  line-height: 1.05;
  letter-spacing: 0;
  margin-bottom: 22px;
}
.prose { font-size: 18px; line-height: 1.68; color: var(--ink); }
.prose h2 {
  font-family: var(--display);
  font-weight: 500;
  font-size: 23px;
  margin: 30px 0 10px;
  letter-spacing: 0;
}
.prose h3 {
  font-family: var(--display);
  font-weight: 500;
  font-size: 19px;
  margin: 22px 0 8px;
  letter-spacing: 0;
}
.prose p { margin-bottom: 16px; }
.prose ul { margin: 0 0 16px 22px; }
.prose ol { margin: 0 0 16px 22px; }
.prose li { margin-bottom: 6px; }
.prose em { font-style: italic; color: var(--ink-soft); }
.prose strong { font-weight: 500; }
.cross-link {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-wash);
  cursor: pointer;
  transition: border-color 0.12s;
}
.cross-link:hover { border-bottom-color: var(--accent); }
.prose a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-wash); transition: border-color 0.12s; }
.prose a:hover { border-bottom-color: var(--accent); }
.prose pre {
  background: var(--surface-2);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 0 0 16px;
}
.prose pre code {
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.55;
  background: none;
  border: none;
  padding: 0;
  color: var(--ink);
}
.prose code {
  font-family: var(--mono);
  font-size: 14px;
  background: var(--surface-2);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 1px 5px;
  color: var(--ink);
}
.prose table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 20px;
  font-size: 16px;
}
.prose th {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: left;
  background: var(--surface-2);
  border: 1px solid var(--rule);
  padding: 8px 12px;
  color: var(--ink-soft);
}
.prose td {
  border: 1px solid var(--rule);
  padding: 8px 12px;
  vertical-align: top;
}
.prose tr:nth-child(even) td { background: var(--surface); }
.prose hr {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 28px 0;
}

/* edit form */
.edit-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  padding: 5px 10px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
.edit-btn:hover { border-color: var(--ink); color: var(--ink); }
.delete-btn {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent-wash);
  padding: 12px 18px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
.delete-btn:hover { border-color: var(--accent); background: var(--accent-wash); }

/* forms */
.field { margin-bottom: 20px; }
.field-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
  display: block;
}
textarea,
input[type=text],
input[type=password],
input[type=email],
input[type=url],
input[type=number],
input[type=search],
select {
  width: 100%;
  font-family: var(--body);
  font-size: 17px;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 2px;
  padding: 12px 14px;
  resize: vertical;
  transition: border-color 0.15s;
}
textarea:focus, input:focus, select:focus { outline: none; border-color: var(--accent); }
textarea { min-height: 120px; line-height: 1.55; }
select { cursor: pointer; }

.run-btn {
  font-family: var(--body);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  background: var(--accent);
  color: #FFFFFF;
  border: 1px solid var(--accent);
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 40px;
}
.run-btn:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
.run-btn:disabled { opacity: 0.4; cursor: wait; }
.ghost-btn {
  font-family: var(--body);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: none;
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--rule);
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 40px;
}
.ghost-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-wash); }
.btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.result {
  margin-top: 26px;
  border-top: 1px solid var(--rule);
  padding-top: 22px;
}
.result-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.response {
  font-size: 17px;
  line-height: 1.62;
  color: var(--ink);
  white-space: pre-wrap;
  min-height: 24px;
}
.response.dim { color: var(--ink-faint); font-style: italic; }
.cursor::after { content: '▍'; color: var(--accent); animation: blink 0.8s steps(1) infinite; }
@keyframes blink { 50% { opacity: 0; } }

.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.chip {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.03em;
  background: var(--accent-wash);
  color: var(--accent);
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: opacity 0.12s;
}
html.dark .chip { color: var(--accent-soft); }
.chip:hover { opacity: 0.7; }

.note { font-size: 15px; color: var(--ink-soft); line-height: 1.6; }
.note.placeholder { font-style: italic; color: var(--ink-faint); }

/* log */
.log-list { margin-top: 8px; }
.log-row {
  display: flex;
  gap: 14px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  padding: 7px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.log-row .t { color: var(--accent-soft); flex-shrink: 0; }
.log-row .who { color: var(--ink-faint); opacity: 0.7; flex-shrink: 0; }

/* modal */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
  padding: 20px;
}
.scrim.open { display: flex; }
.modal {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 6px;
  width: min(680px, 94vw);
  max-height: 88vh;
  overflow-y: auto;
  padding: 30px 32px;
  box-shadow: var(--shadow), 0 16px 48px rgba(0,0,0,0.18);
}
.modal-x {
  position: absolute; top: 14px; right: 14px;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  border: 0; border-radius: 7px; background: transparent; color: var(--ink-soft);
  font-size: 20px; line-height: 1; cursor: pointer;
}
.modal-x:hover { background: var(--accent-wash); color: var(--ink); }
.modal-x:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.reload-banner {
  position: fixed; z-index: 200; left: 50%; bottom: 22px; transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px 10px 18px; border: 1px solid var(--rule); border-radius: 12px;
  background: var(--surface); color: var(--ink); font: 500 13.5px var(--ui);
  box-shadow: var(--shadow), 0 12px 32px rgba(0,0,0,0.18);
}
.reload-banner .run-btn { padding: 6px 14px; font-size: 12.5px; }
.reload-x { border: 0; background: transparent; color: var(--ink-soft); font-size: 15px; cursor: pointer; padding: 4px; border-radius: 6px; }
.reload-x:hover { background: var(--accent-wash); color: var(--ink); }
.activity-filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 12px; }
.activity-filters input, .activity-filters select { padding: 6px 9px; border: 1px solid var(--rule); border-radius: 8px; background: var(--surface); color: var(--ink); font: 500 12.5px var(--ui); }
.activity-filters input[type=text] { flex: 1 1 180px; min-width: 140px; }
.activity-filters .ghost-btn { margin-left: auto; }
.activity-list { border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }
.activity-row { display: grid; grid-template-columns: 150px 1fr 1fr auto; gap: 10px; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--rule-soft); font-size: 12.5px; }
.activity-row:last-child { border-bottom: 0; }
.activity-ev { justify-self: start; padding: 2px 8px; border-radius: 999px; background: var(--accent-wash); color: var(--accent-soft); font-weight: 600; font-size: 11px; white-space: nowrap; }
.activity-ev-purged, .activity-ev-trashed, .activity-ev-share_revoked, .activity-ev-access_revoked { background: color-mix(in srgb, #c0392b 14%, transparent); color: #c0392b; }
.activity-ev-share_downloaded, .activity-ev-share_created { background: color-mix(in srgb, #2d7d46 16%, transparent); color: #2d7d46; }
.activity-doc { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.activity-actor { color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.activity-when { color: var(--ink-faint); white-space: nowrap; font-variant-numeric: tabular-nums; }
.activity-more { display: block; width: 100%; border-radius: 0; border: 0; border-top: 1px solid var(--rule-soft); }
.activity-count { margin: 0; padding: 9px; }
.modal h2 {
  font-family: var(--display);
  font-weight: 600;
  font-size: 26px;
  margin-bottom: 6px;
}
.modal .sub { font-size: 15px; color: var(--ink-soft); margin-bottom: 22px; line-height: 1.5; }

/* login screen */
.login-modal { text-align: center; max-width: 440px; padding: 24px 34px 34px; }
.login-theme-switcher {
  justify-content: center;
  max-width: 100%;
  overflow-x: auto;
  margin: 0 auto 24px;
  scrollbar-width: none;
}
.login-theme-switcher::-webkit-scrollbar { display: none; }
.login-mark {
  width: 48px;
  height: 48px;
  margin: 0 auto 14px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-soft));
  color: #FFFFFF;
  display: grid;
  place-items: center;
  font: 700 22px var(--ui);
  box-shadow: 0 12px 28px color-mix(in srgb, var(--accent) 24%, transparent);
}
/* When an admin uploads a workspace logo, drop the letter tile's fill/gradient
   so the image (often a transparent PNG) shows on its own. */
.brand-logo.has-logo, .login-mark.has-logo { background: none; box-shadow: none; }
.brand-logo.has-logo img, .login-mark.has-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: inherit; display: block; }
.login-modal h2 { font-size: 32px; line-height: 1.08; margin-bottom: 8px; }
.login-modal .sub { margin: 0 auto 22px; max-width: 320px; font-size: 15px; }
.login-note {
  margin-top: 16px;
  color: var(--ink-faint);
  font-size: 12px;
  line-height: 1.45;
}
.login-providers { display: flex; flex-direction: column; gap: 10px; }
.login-form { display: flex; flex-direction: column; gap: 10px; }
.login-form input {
  min-height: 48px;
  border-radius: 6px;
  padding: 11px 13px;
  font-size: 15px;
}
.login-divider {
  color: var(--ink-faint);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  margin: 13px 0;
}
.provider-btn {
  font-family: var(--body);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0;
  text-transform: none;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  min-height: 48px;
  padding: 12px 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: var(--shadow);
}
.provider-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-wash); }
html.office .modal {
  border-color: rgba(17,24,39,0.12);
  border-radius: 8px;
  box-shadow: 0 24px 72px rgba(17,24,39,0.22), 0 0 0 1px rgba(0,120,212,0.06);
}
html.office .login-modal h2 {
  font-size: 32px;
  font-weight: 650;
  color: #111827;
}
html.office .login-modal .sub {
  color: #475467;
  line-height: 1.45;
}
html.office .provider-btn {
  color: #242424;
  border-color: #D0D5DD;
  background: #FFFFFF;
  box-shadow: 0 1px 2px rgba(16,24,40,0.05);
}
html.office .provider-btn:hover {
  color: #0F5FB5;
  border-color: #8FC7F4;
  background: #F8FBFF;
}

.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 11px 20px;
  border-radius: 2px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 60;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ingest mode tabs */
.mode-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-tab {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: transparent;
  color: var(--ink-faint);
  border: 1px solid var(--rule);
  padding: 5px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-tab:hover { color: var(--ink); border-color: var(--ink-soft); }
.mode-tab.active { color: var(--accent); border-color: var(--accent); background: var(--accent-wash); }

/* file drop zone */
.file-drop {
  border: 2px dashed var(--rule);
  border-radius: 3px;
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.file-drop:hover, .file-drop.drag-over { border-color: var(--accent); color: var(--accent); background: var(--accent-wash); }
.file-status {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 8px;
  min-height: 18px;
}

/* admin */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 30px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 20px 22px;
}
.stat-card .stat-num {
  font-family: var(--display);
  font-size: 36px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 6px;
  color: var(--ink);
}
.stat-card .stat-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin-bottom: 28px;
}
.admin-table th {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: left;
  border-bottom: 1px solid var(--rule);
  padding: 6px 10px 6px 0;
}
.admin-table td {
  padding: 7px 10px 7px 0;
  border-bottom: 1px solid var(--rule-soft);
  color: var(--ink-soft);
  font-family: var(--mono);
  font-size: 12px;
}
.admin-table td:first-child { color: var(--ink); }

@media (max-width: 820px) {
  .shell { grid-template-columns: 1fr; }
  .index-col { border-right: none; border-bottom: 1px solid var(--ink); }
  .panel { padding: 28px 24px 50px; }
  .masthead, .tabs { padding-left: 20px; padding-right: 20px; }
  .masthead { align-items: flex-start; flex-direction: column; gap: 12px; overflow: hidden; }
  .brand { align-items: flex-start; flex-wrap: wrap; max-width: 100%; gap: 8px 12px; }
  .brand h1 { flex: 0 0 auto; }
  .brand .colophon { flex: 1 1 180px; min-width: 0; line-height: 1.35; white-space: normal; }
  .masthead-actions { width: 100%; max-width: 100%; overflow-x: auto; padding-bottom: 2px; }
  .tabs { max-width: 100%; overflow-x: auto; justify-content: flex-start; }
  .tab { white-space: nowrap; }
  .login-modal { max-width: 100%; padding: 30px 24px 32px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}

/* search results */
.search-result {
  padding: 14px 0;
  border-bottom: 1px solid var(--rule-soft);
  cursor: pointer;
  transition: opacity 0.12s;
}
.search-result:hover { opacity: 0.75; }
.search-result-title {
  font-family: var(--body);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}
.search-result-snippet {
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.5;
}
.search-result-snippet mark {
  background: var(--accent-wash);
  color: var(--accent);
  font-style: normal;
}

/* version history */
.version-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--rule-soft);
}
.version-meta { display: flex; flex-direction: column; gap: 2px; min-width: 140px; }
.version-date { font-family: var(--mono); font-size: 12px; color: var(--accent-soft); }
.version-who { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
.version-title { flex: 1; font-size: 16px; color: var(--ink); }
.version-actions { display: flex; gap: 6px; }

/* system settings panel */
.settings-grid {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 10px 16px;
  align-items: center;
  margin-bottom: 14px;
}
.settings-grid label { font-size: 13px; color: var(--ink-soft); }
.settings-grid input,
.settings-grid select,
.settings-grid textarea {
  font-family: var(--mono);
  font-size: 13px;
  padding: 5px 8px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--paper);
  color: var(--ink);
  width: 100%;
  box-sizing: border-box;
}
.settings-grid textarea { resize: vertical; min-height: 60px; }
/* Human-readable identity fields (names, workspace title) read as plain text —
   mono is reserved for paths, keys, URLs, and other machine values. */
.settings-grid input.sans { font-family: var(--ui); font-size: 13.5px; }
.email-events { display: flex; flex-direction: column; gap: 4px; margin: 6px 0 12px; }
.email-event-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border: 1px solid var(--rule-soft); border-radius: 9px; cursor: pointer; }
.email-event-row:hover { background: var(--accent-wash); }
.email-event-row input { margin-top: 2px; flex: 0 0 auto; }
.email-event-row span { display: flex; flex-direction: column; gap: 1px; }
.email-event-row strong { font-size: 13px; font-weight: 600; }
.email-event-row em { font-style: normal; font-size: 11.5px; color: var(--ink-soft); }
.danger-zone { margin-top: 24px; border: 1px solid color-mix(in srgb, #c0392b 45%, var(--rule)); border-radius: 10px; overflow: hidden; }
.danger-zone-head { padding: 8px 14px; background: color-mix(in srgb, #c0392b 10%, transparent); color: #c0392b; font: 700 11px var(--mono); letter-spacing: 0.04em; text-transform: uppercase; }
.danger-zone-row { display: flex; align-items: center; gap: 16px; padding: 14px; flex-wrap: wrap; }
.danger-zone-row > div:first-child { flex: 1 1 240px; }
.danger-zone-row strong { font-size: 13.5px; }

/* Files tab */
.file-drop-zone {
  border: 2px dashed var(--rule);
  border-radius: 3px;
  padding: 36px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 28px;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
}
.file-drop-zone:hover, .file-drop-zone.drag-over {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-wash);
}
.file-list { display: flex; flex-direction: column; gap: 12px; }
.file-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 16px 18px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.file-icon {
  font-family: var(--ui);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  background: var(--accent-wash);
  color: var(--accent);
  width: 34px;
  height: 34px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.file-icon.pdf  { background: #FCEAE8; color: #C0392B; }
.file-icon.xlsx, .file-icon.xls, .file-icon.csv { background: #E8F5E9; color: #2E7D32; }
.file-icon.pptx, .file-icon.ppt { background: #FEF0E6; color: #D84315; }
html.dark .file-icon.pdf  { background: #2E1410; color: #E57373; }
html.dark .file-icon.xlsx, html.dark .file-icon.xls, html.dark .file-icon.csv { background: #0F2A14; color: #81C784; }
html.dark .file-icon.pptx, html.dark .file-icon.ppt { background: #2D1A08; color: #FFB74D; }
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
}
.file-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.file-action-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: transparent;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.12s;
}
.file-action-btn:hover { border-color: var(--ink); color: var(--ink); }
.file-action-btn.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.file-action-btn.primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
.file-action-btn.danger { color: #C0392B; border-color: transparent; }
html.dark .file-action-btn.danger { color: #E57373; }
.file-action-btn.danger:hover { border-color: currentColor; background: transparent; }
.file-action-btn:disabled { opacity: 0.4; cursor: wait; }
.file-history-scrim {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(0,0,0,0.32);
}
.file-history-modal {
  width: min(860px, 100%);
  max-height: min(720px, 92dvh);
  overflow: auto;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 8px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.22);
}
.file-history-head {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  padding: 20px 22px;
  border-bottom: 1px solid var(--rule);
}
.file-history-title { margin: 0; font-size: 22px; }
.file-history-sub { margin-top: 4px; color: var(--ink-faint); font-size: 14px; }
.file-history-body { display: grid; gap: 18px; padding: 20px 22px 24px; }
.file-history-section h3 { margin: 0 0 10px; font-size: 15px; color: var(--ink); }
.file-history-list { display: grid; gap: 8px; }
.file-history-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: var(--surface);
}
.file-history-meta { color: var(--ink-faint); font-size: 13px; margin-top: 3px; }
.upload-progress {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 8px;
  letter-spacing: 0.04em;
}
</style>

<!-- Login screen — shown until auth is confirmed -->
<div class="scrim open" id="login-scrim">
  <div class="modal login-modal">
    <div class="login-mark" aria-hidden="true">M</div>
    <h2>Memex</h2>
    <p class="sub">Your team's files, notes, and AI answers in one private workspace.</p>
    <div class="login-providers">
      <button class="provider-btn" onclick="signIn('google')">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.7 0 6.7 5.4 2.8 13.3l7.8 6.1C12.5 13.2 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 6.9-17z"/><path fill="#FBBC05" d="M10.6 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.8-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l7.8-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.5-5.8c-2.1 1.4-4.8 2.3-8 2.3-6.2 0-11.5-3.7-13.4-9l-7.8 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <button class="provider-btn" onclick="signIn('microsoft')">
        <svg width="18" height="18" viewBox="0 0 23 23"><path fill="#f3f3f3" d="M0 0h23v23H0z"/><path fill="#f35325" d="M1 1h10v10H1z"/><path fill="#81bc06" d="M12 1h10v10H12z"/><path fill="#05a6f0" d="M1 12h10v10H1z"/><path fill="#ffba08" d="M12 12h10v10H12z"/></svg>
        Sign in with Microsoft 365
      </button>
      <div class="login-divider">or</div>
      <form class="login-form" onsubmit="return signInPassword(event)">
        <input id="login-email" type="email" autocomplete="username" placeholder="Email"
               aria-label="Email">
        <input id="login-password" type="password" autocomplete="current-password" placeholder="Password"
               aria-label="Password">
        <button class="provider-btn" type="submit">
          Sign in with email &amp; password
        </button>
      </form>
      <div class="login-note">Theme choices are saved on this device. Your files stay permission-scoped after sign-in.</div>
    </div>
    <div class="login-version" id="login-version"></div>
  </div>
</div>

<header class="masthead">
  <div class="masthead-left">

<script>
const WELCOME = {
  id: 'overview',
  title: 'Reading room',
  category: 'meta',
  sources: 0,
  updated_at: 'start here',
  content: `# Reading room\n\nThis is your team's *Memex* — a shared knowledge base that Claude reads, writes, and keeps in order. Sign in with your work account and start building.\n\n## The three motions\n\n- **Ingest** — paste an article, paper, or note. Claude reads it, summarizes it, and weaves new pages into the collection, cross-linking what relates.\n- **Query** — ask anything. Claude answers from what you've gathered, and can file the answer back as its own page so insight accumulates.\n- **Lint** — periodically ask Claude to audit the collection for contradictions, orphans, and gaps worth chasing.\n\n## To begin\n\nMove to the **Ingest** tab and feed it your first source. Watch the index on the left fill in.`
};

const CATS = {
  meta:     { label: 'Reading room', glyph: '◆' },
  concept:  { label: 'Concepts',     glyph: '◇' },
  entity:   { label: 'Entities',     glyph: '○' },
  source:   { label: 'Sources',      glyph: '▤' },
  analysis: { label: 'Analyses',     glyph: '✦' }
};
const CAT_ORDER = ['meta', 'concept', 'entity', 'source', 'analysis'];

let state = { pages: [WELCOME], activePage: 'overview', tab: 'files', log: [] };
let _kc = null; // Keycloak config { url, realm, clientId }
let currentUser = null; // { id, email, role, name }
let appConfig = null;   // /api/config response (version, editingEnabled, …) — set in initApp
let brandDefaults = { name: '', logo: '', accent: '' }; // admin-set workspace branding from /api/config

// ingest mode state
let ingestMode = 'paste';
let extractedFileText = '';

// files tab state
let filesList = []; // cached list of uploaded files
let librariesList = []; // available libraries
let currentLibraryId = localStorage.getItem('memex_library_id') || null; // active library
let aiModels = []; // enabled AI models [{provider,id,label}]
let aiActive = ''; // active model as "provider:model"
let trashList = []; // cached list of trashed files
let fileView = 'active'; // 'active' | 'shared' | 'favorites' | 'trash' | 'links'
const RESUMABLE_UPLOAD_THRESHOLD = 16 * 1024 * 1024;
const RESUMABLE_CHUNK_SIZE = 8 * 1024 * 1024;
let selectedFileIds = new Set();
let selectedFolderPaths = new Set();
let lastRenderedFileIds = []; // file ids currently shown in the library table (for select-all)
let lastRenderedFolderPaths = []; // folder paths currently shown (for select-all)
let detailsPaneOpen = false;
let fileLayoutMode = localStorage.getItem('memex_file_layout_v2') || 'commander';
let fileDensity = localStorage.getItem('memex_file_density') === 'compact' ? 'compact' : 'comfortable';
// Reflect density on <html> so the CSS applies immediately, even before the
// first file list renders.
document.documentElement.setAttribute('data-density', fileDensity);
let currentFolderPath = '';

// ---- file table columns (sortable + show/hide, persisted) ----
const FILE_COLUMN_DEFS = [
  { id: 'name', label: 'Name', always: true, sort: (a, b) => fileDisplayName(a).localeCompare(fileDisplayName(b)) },
  { id: 'type', label: 'Type', width: '120px', sort: (a, b) => fileKind(fileExt(a.name)).localeCompare(fileKind(fileExt(b.name))) },
  { id: 'size', label: 'Size', width: '110px', align: 'right', sort: (a, b) => (a.size || 0) - (b.size || 0) },
  { id: 'modified', label: 'Modified', width: '160px', sort: (a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0) },
  { id: 'owner', label: 'Owner', width: '210px', sort: (a, b) => fileOwner(a).localeCompare(fileOwner(b)) },
  { id: 'library', label: 'Library', width: '150px', sort: (a, b) => fileLibraryName(a).localeCompare(fileLibraryName(b)) },
];
const FILE_COLS_DEFAULT = ['name', 'modified', 'owner'];
let fileVisibleCols = (() => {
  try { const v = JSON.parse(localStorage.getItem('memex_file_cols')); if (Array.isArray(v) && v.length) return new Set(['name', ...v.filter(id => id !== 'name')]); } catch { /* ignore */ }
  return new Set(FILE_COLS_DEFAULT);
})();
let fileSort = (() => {
  try { const v = JSON.parse(localStorage.getItem('memex_file_sort')); if (v && v.col) return v; } catch { /* ignore */ }
  return { col: 'name', dir: 1 };
})();
function fileLibraryName(f) {
  const lib = (typeof librariesList !== 'undefined' ? librariesList : []).find(l => String(l.id) === String(f.library_id));
  return lib ? lib.name : '';
}
function visibleFileColumns() { return FILE_COLUMN_DEFS.filter(c => c.always || fileVisibleCols.has(c.id)); }
function persistFileCols() { localStorage.setItem('memex_file_cols', JSON.stringify([...fileVisibleCols])); }
function toggleFileColumn(id) {
  if (id === 'name') return;
  if (fileVisibleCols.has(id)) fileVisibleCols.delete(id); else fileVisibleCols.add(id);
  persistFileCols();
  renderDocumentLibraryList();
}
function setFileSort(col) {
  if (fileSort.col === col) fileSort.dir = -fileSort.dir; else fileSort = { col, dir: 1 };
  localStorage.setItem('memex_file_sort', JSON.stringify(fileSort));
  renderDocumentLibraryList();
}
function sortFiles(list) {
  const def = FILE_COLUMN_DEFS.find(c => c.id === fileSort.col) || FILE_COLUMN_DEFS[0];
  return [...list].sort((a, b) => def.sort(a, b) * fileSort.dir);
}
function fileCellHtml(f, colId) {
  const ext = fileExt(f.name);
  if (colId === 'type') return esc(fileKind(ext));
  if (colId === 'size') return fileSizeLabel(f.size || 0);
  if (colId === 'modified') return fileDate(f.created_at);
  if (colId === 'owner') return ownerCellHtml(fileOwner(f));
  if (colId === 'library') return esc(fileLibraryName(f) || '—');
  return '';
}
function fileTableHeadHtml(selectAllClass) {
  const cols = visibleFileColumns().map(c => {
    const active = fileSort.col === c.id;
    const arrow = active ? (fileSort.dir > 0 ? ' ▲' : ' ▼') : '';
    const style = `${c.width ? `width:${c.width};` : ''}${c.align === 'right' ? 'text-align:right;' : ''}`;
    return `<th style="${style}"><button class="file-col-sort${active ? ' active' : ''}" onclick="setFileSort('${c.id}')">${esc(c.label)}${arrow}</button></th>`;
  }).join('');
  const sel = selectAllClass === null ? '<th style="width:44px"></th>'
    : `<th style="width:44px"><button class="file-library-select file-select-all${selectAllClass}" title="Select all" aria-label="Select all" onclick="toggleSelectAllFiles()"></button></th>`;
  return `<thead><tr>${sel}${cols}<th style="width:150px;text-align:right;position:relative"><button class="file-col-chooser" title="Choose columns" onclick="toggleFileColumnsMenu(event)">⋮</button><div class="file-cols-menu" id="file-cols-menu"></div></th></tr></thead>`;
}
function toggleFileColumnsMenu(event) {
  event?.stopPropagation();
  const menu = document.getElementById('file-cols-menu');
  if (!menu) return;
  if (!menu.classList.contains('open')) {
    menu.innerHTML = '<div class="file-cols-title">Columns</div>' + FILE_COLUMN_DEFS.map(c =>
      `<label class="file-cols-item${c.always ? ' disabled' : ''}"><input type="checkbox" ${c.always || fileVisibleCols.has(c.id) ? 'checked' : ''} ${c.always ? 'disabled' : ''} onchange="toggleFileColumn('${c.id}')"> ${esc(c.label)}</label>`
    ).join('');
  }
  menu.classList.toggle('open');
}
document.addEventListener('click', e => { const m = document.getElementById('file-cols-menu'); if (m && m.classList.contains('open') && !e.target.closest('#file-cols-menu') && !e.target.closest('.file-col-chooser')) m.classList.remove('open'); });
let securityStatus = null;
let fileLibraryNavCollapsed = localStorage.getItem('memex_library_nav_collapsed') === 'true';
let railWidth = parseInt(localStorage.getItem('memex_rail_w') || '', 10) || 0; // resizable rail width (px)

// sidebar category filter
let activeCatFilter = null;

/* ---------- OIDC / PKCE helpers ---------- */

function _kcAuthUrl() { return `${_kc.url}/realms/${_kc.realm}/protocol/openid-connect`; }

function _generateVerifier() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function _generateChallenge(verifier) {
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function _hasValidToken() {
  const tok = localStorage.getItem('memex_access_token');
  const exp = parseInt(localStorage.getItem('memex_token_exp') || '0', 10);
  return !!tok && Date.now() < exp - 30_000;
}

async function _refreshToken() {
  const refresh = localStorage.getItem('memex_refresh_token');
  if (!refresh || !_kc) return false;
  try {
    const res = await fetch(`${_kcAuthUrl()}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: _kc.clientId, grant_type: 'refresh_token', refresh_token: refresh }),
    });
    if (!res.ok) { _clearTokens(); return false; }
    _storeTokens(await res.json());
    return true;
  } catch { _clearTokens(); return false; }
}

function _storeTokens(t) {
  localStorage.setItem('memex_access_token', t.access_token);
  if (t.refresh_token) localStorage.setItem('memex_refresh_token', t.refresh_token);
  localStorage.setItem('memex_token_exp', String(Date.now() + (t.expires_in || 300) * 1000));
}

function _clearTokens() {
  localStorage.removeItem('memex_access_token');
  localStorage.removeItem('memex_refresh_token');
  localStorage.removeItem('memex_token_exp');
}

async function handleOAuthCallback(code, returnedState) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const savedState = sessionStorage.getItem('oauth_state');
  sessionStorage.removeItem('pkce_verifier');
  sessionStorage.removeItem('oauth_state');
  if (!verifier || returnedState !== savedState) { toast('Sign-in failed: invalid state'); return; }
  try {
    const res = await fetch(`${_kcAuthUrl()}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: _kc.clientId, grant_type: 'authorization_code',
        code, redirect_uri: window.location.origin, code_verifier: verifier,
      }),
    });
    if (!res.ok) { toast('Sign-in failed'); return; }
    _storeTokens(await res.json());
  } catch (e) { toast('Sign-in error: ' + e.message); }
}

/* ---------- bootstrap ---------- */
async function initApp() {
  const savedTheme = localStorage.getItem('memex_theme');
  setTheme(savedTheme || 'light');

  let config;
  try {
    config = await fetch('/api/config', { signal: AbortSignal.timeout(5000) }).then(r => r.json());
    appConfig = config; // expose globally for functions outside initApp (previewFile, checkForUpdate)
    applyBranding(config.brand); // brand the login card + header before anything renders
  } catch (e) {
    document.getElementById('login-scrim').innerHTML = `<div class="modal login-modal"><div class="login-mark" aria-hidden="true">M</div><h2>Memex is offline</h2><p class="sub" style="color:var(--accent)">Could not reach the server. Check that the app container is running, then refresh this page.</p></div>`;
    setTheme(localStorage.getItem('memex_theme') || 'light');
    return;
  }

  _kc = { url: config.keycloakUrl, realm: config.keycloakRealm, clientId: config.keycloakClientId };

  if (config.version) {
    const menuEl = document.getElementById('app-menu-version');
    if (menuEl) menuEl.textContent = `Memex · ${config.version}`;
    const loginEl = document.getElementById('login-version');
    if (loginEl) loginEl.textContent = `Memex · ${config.version}`;
    const upEl = document.getElementById('update-indicator');
    if (upEl && upEl.textContent === 'Version') upEl.textContent = config.version;
  }

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('code')) {
    await handleOAuthCallback(urlParams.get('code'), urlParams.get('state'));
    window.history.replaceState({}, '', window.location.pathname);
  }

  if (_hasValidToken()) {
    await _afterLogin();
  } else if (localStorage.getItem('memex_refresh_token')) {
    if (await _refreshToken()) await _afterLogin();
    else document.getElementById('login-scrim').classList.add('open');
  } else {
    document.getElementById('login-scrim').classList.add('open');
  }

}

async function _afterLogin() {
  document.documentElement.classList.remove('auth-locked');
  document.getElementById('login-scrim').classList.remove('open');
  await loadFromServer();
  currentUser = await apiGet('/auth/me');
  await loadLibraries();
  await loadAiModels();
  renderSearchScope();
  renderUserChip();
  applyRoleUI();
  loadSecurityStatus();
  loadComplianceSummary();
  checkForUpdate(false);
  startUpdatePolling();
  startNotifications();
  connectSignaling();
}

async function loadFromServer() {
  try {
    const pages = await apiGet('/pages');
    state.pages = [WELCOME, ...pages];
    if (!state.activePage) state.activePage = 'overview';
    renderIndex();
    // Honor a bookmarked/shared #/… deep link on load. The OAuth callback strips
    // the hash, so fall back to the one stashed before the Keycloak redirect.
    let deepHash = location.hash;
    const ret = sessionStorage.getItem('memex_return_hash');
    sessionStorage.removeItem('memex_return_hash');
    if (!hashToNav(deepHash) && ret) {
      deepHash = ret;
      try { history.replaceState(null, '', location.pathname + location.search + deepHash); } catch (e) {}
    }
    const deep = hashToNav(deepHash);
    if (deep) await navApply(deep); else await setTab('files');
  } catch (e) {
    toast('Could not load pages: ' + e.message);
  }
}

function applyRoleUI() {
  const role = currentUser?.role || 'viewer';
  // Admin tab: only admin
  document.querySelectorAll('.tab[data-tab="admin"]').forEach(el => {
    el.style.display = role === 'admin' ? '' : 'none';
  });
  document.querySelectorAll('.admin-menu-item').forEach(el => {
    el.style.display = role === 'admin' ? '' : 'none';
  });
  // Update user chip
  renderUserChip();
}

/* ---------- auth ---------- */
async function signIn(provider) {
  const verifier = _generateVerifier();
  const challenge = await _generateChallenge(verifier);
  const state = _generateVerifier();
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('oauth_state', state);
  // Preserve the deep link across the Keycloak round-trip (the OAuth callback
  // strips the hash), so a shared #/… link lands where it points after login.
  try { if (hashToNav(location.hash)) sessionStorage.setItem('memex_return_hash', location.hash); } catch (e) {}
  const idpHint = { google: 'google', microsoft: 'microsoft' }[provider];
  const params = new URLSearchParams({
    client_id: _kc.clientId, redirect_uri: window.location.origin,
    response_type: 'code', scope: 'openid email profile',
    code_challenge: challenge, code_challenge_method: 'S256', state,
    ...(idpHint ? { kc_idp_hint: idpHint } : {}),
  });
  window.location.href = `${_kcAuthUrl()}/auth?${params}`;
}

async function signInPassword(ev) {
  if (ev) ev.preventDefault();
  const email = (document.getElementById("login-email").value || "").trim();
  const password = document.getElementById("login-password").value || "";
  if (!email || !password) { toast("Enter email and password"); return false; }
  try {
    const res = await fetch(`${_kcAuthUrl()}/token`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: _kc.clientId, grant_type: "password",
        scope: "openid email profile", username: email, password,
      }),
    });
    if (!res.ok) { toast("Sign-in failed — check your email and password"); return false; }
    _storeTokens(await res.json());
    await _afterLogin();
  } catch (e) { toast("Sign-in error: " + e.message); }
  return false;
}

async function signOut() {
  const refresh = localStorage.getItem('memex_refresh_token');
  _clearTokens();
  // Stop background polling — otherwise the logged-out page keeps hitting
  // /api/notifications and /version/check with dead tokens.
  if (notifTimer) { clearInterval(notifTimer); notifTimer = null; }
  stopUpdatePolling();
  closeSettings();
  state = { pages: [WELCOME], activePage: 'overview', tab: 'files', log: [] };
  renderIndex();
  document.getElementById('user-chip').textContent = '';
  document.documentElement.classList.add('auth-locked');
  document.getElementById('login-scrim').classList.add('open');
  if (refresh && _kc) {
    fetch(`${_kcAuthUrl()}/logout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: _kc.clientId, refresh_token: refresh }),
    }).catch(() => {});
  }
}

/* ---------- API helpers ---------- */
async function getToken() {
  if (!_hasValidToken()) {
    const ok = await _refreshToken();
    if (!ok) {
      document.getElementById('login-scrim').classList.add('open');
      throw new Error('Session expired — please sign in again');
    }
  }
  return localStorage.getItem('memex_access_token');
}

async function apiGet(path) {
  const res = await fetch('/api' + path, { headers: { Authorization: `Bearer ${await getToken()}` } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiPost(path, body, signal) {
  const opts = {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${await getToken()}` },
    body: JSON.stringify(body),
  };
  if (signal) opts.signal = signal;
  const res = await fetch('/api' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiPut(path, body) {
  const res = await fetch('/api' + path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${await getToken()}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function streamFromApi(path, body, el) {
  _streamController = new AbortController();
  let res;
  try {
    res = await fetch('/api' + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${await getToken()}` },
      body: JSON.stringify(body),
      signal: _streamController.signal,
    });
  } catch (e) {
    if (e.name === 'AbortError') { el.classList.remove('cursor', 'dim'); return null; }
    throw e;
  }
  if (!res.ok) { el.textContent = 'Error ' + res.status + ': ' + (await res.text()).slice(0, 200); return null; }

  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let text = '', buf = '', saved = null;
  el.classList.remove('dim'); el.classList.add('cursor');

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n');
      buf = parts.pop();
      for (const line of parts) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const d = JSON.parse(data);
          if (d.text)  { text += d.text; el.textContent = text; }
          if (d.saved) { saved = d.saved; }
          if (d.error) { el.textContent = 'Error: ' + d.error; el.classList.remove('cursor'); return null; }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') throw e;
  } finally {
    _streamController = null;
    el.classList.remove('cursor');
  }
  return { text, saved };
}

const ACCENT_PRESETS = [

function _hexToRgb(h) { h = String(h).replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join(''); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }

// brand accent is applied with persist=false so it acts as a default the user
// can still override locally without being written as their own choice.
function applyAccent(hex, persist = true) {
  const root = document.documentElement.style;
  if (!hex) {
    root.removeProperty('--accent'); root.removeProperty('--accent-soft'); root.removeProperty('--accent-wash');
    if (persist) localStorage.removeItem('memex_accent');
    // Fall back to the workspace brand accent when the device override is cleared.
    if (brandDefaults.accent) applyAccent(brandDefaults.accent, false);
    return;
  }
  const base = _hexToRgb(hex);
  const dark = document.documentElement.classList.contains('dark');
  const accent = dark ? _mix(base, [255, 255, 255], 0.2) : base;
  const soft = dark ? base : _mix(base, [0, 0, 0], 0.18);
  const wash = dark ? _mix([22, 21, 26], base, 0.16) : _mix([255, 255, 255], base, 0.1);
  root.setProperty('--accent', _rgbToHex(...accent));
  root.setProperty('--accent-soft', _rgbToHex(...soft));
  root.setProperty('--accent-wash', _rgbToHex(...wash));

}
function setTheme(theme) {

  // Memex has one signature look + dark mode; migrate any legacy theme name to light.
  theme = theme === 'dark' ? 'dark' : 'light';
  document.documentElement.classList.remove('dark', 'office', 'office-dark', 'drive', 'dropbox', 'aurora', 'graphite');
  if (theme === 'dark') document.documentElement.classList.add('dark');
  const toggleItem = document.getElementById('theme-toggle-item');
  if (toggleItem) toggleItem.textContent = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';

  // workspace brand accent (never re-persist on a theme switch).

// Update check: colors the version pill — green up to date, yellow ≤10 releases
// behind, red >10. Click to re-check and see details.
async function checkForUpdate(manual) {
  const el = document.getElementById('update-indicator');
  if (!el) return;
  if (manual) { el.className = 'security-indicator'; el.textContent = 'Checking…'; el.title = 'Checking for updates…'; }
  let r;
  try { r = await apiGet('/version/check'); }
  catch (e) { el.className = 'security-indicator'; el.textContent = appConfig?.version || 'version'; el.title = 'Update check failed'; refreshStatusPill(); if (manual) toast('Update check failed'); return; }
  const v = r.current || appConfig?.version || 'version';
  el.textContent = v;
  // If the server is now running a different version than the one this page
  // booted with, the app was upgraded underneath us — offer a one-click reload
  // so the user isn't left on stale client code.
  maybePromptReload(r.current);
  if (r.behind === 0) {
    el.className = 'security-indicator ok'; el.title = `Up to date — ${v}`;
    if (manual) toast(`Up to date (${v})`);
  } else if (r.behind != null && r.behind <= 10) {
    el.className = 'security-indicator warning'; el.title = `${r.behind} release${r.behind === 1 ? '' : 's'} behind — latest ${r.latest}. Run ./upgrade.sh to update.`;
    if (manual) toast(`${r.behind} release${r.behind === 1 ? '' : 's'} behind — latest ${r.latest}`);
  } else if (r.behind != null) {
    el.className = 'security-indicator critical'; el.title = `${r.behind} releases behind — latest ${r.latest}. Update recommended: ./upgrade.sh`;
    if (manual) toast(`${r.behind} releases behind — latest ${r.latest}. Update recommended.`);
  } else {
    el.className = 'security-indicator'; el.title = 'Update check unavailable';
    if (manual) toast('Update check unavailable');
  }
  refreshStatusPill();
}

// Periodic update check so a long-open tab notices a deploy on its own (rather
// than only at page load / on a manual version-pill click). /version/check
// returns the live running version cheaply (GitHub lookup is cached server-side
// 10 min), so maybePromptReload fires the "Refresh" banner within one interval
// of an upgrade. Only runs while signed in.
let updatePollTimer = null;
const UPDATE_POLL_MS = 5 * 60 * 1000;
function startUpdatePolling() {
  clearInterval(updatePollTimer);
  updatePollTimer = setInterval(() => {
    // Skip while the tab is hidden — recheck immediately when it's foregrounded.
    if (document.hidden) return;
    checkForUpdate(false);
  }, UPDATE_POLL_MS);
}
function stopUpdatePolling() { clearInterval(updatePollTimer); updatePollTimer = null; }
// A backgrounded tab is exactly where a stale build lingers — re-check the moment
// the user returns to it.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && updatePollTimer) checkForUpdate(false);
});

// One-time banner prompting a reload when the running server version no longer
// matches the version this page booted with (i.e. an upgrade happened while the
// tab was open). Shown once per page life.
function maybePromptReload(serverVersion) {
  if (!serverVersion || !appConfig?.version) return;
  if (serverVersion === appConfig.version) return;
  if (document.getElementById('reload-banner')) return;
  document.body.insertAdjacentHTML('beforeend',
    `<div id="reload-banner" class="reload-banner" role="status">Memex was updated to ${esc(serverVersion)}.` +
    `<button class="run-btn" onclick="location.reload()">Refresh</button>` +
    `<button class="reload-x" type="button" aria-label="Dismiss" onclick="document.getElementById('reload-banner').remove()">✕</button></div>`);
}

function setCatFilter(cat) {
  activeCatFilter = activeCatFilter === cat ? null : cat;
  renderIndex(document.getElementById('page-search')?.value || '');

function renderIndex(filter = '') {
  const filterLower = filter.toLowerCase();
  const visiblePages = state.pages.filter(p => p.id !== 'overview');
  document.getElementById('page-count').textContent = visiblePages.length;

  // Render category filter pills (only categories that have pages)
  const usedCats = [...new Set(visiblePages.map(p => p.category))];
  const filterEl = document.getElementById('cat-filter');
  if (filterEl && usedCats.length > 1) {
    filterEl.innerHTML = CAT_ORDER
      .filter(c => usedCats.includes(c))
      .map(c => `<button class="cat-pill ${activeCatFilter === c ? 'active' : ''}" onclick="setCatFilter('${c}')">${CATS[c]?.glyph || ''} ${CATS[c]?.label || c}</button>`)
      .join('');
  } else if (filterEl) {
    filterEl.innerHTML = '';
  }

  // Filter pages by title text + active category
  const filtered = state.pages.filter(p => {
    if (p.id === 'overview') return activeCatFilter === null;
    if (activeCatFilter && p.category !== activeCatFilter) return false;
    if (!filter) return true;
    return p.title.toLowerCase().includes(filterLower);
  });

  const groups = {};
  filtered.forEach(p => { (groups[p.category] = groups[p.category] || []).push(p); });
  let html = '';
  CAT_ORDER.forEach(cat => {
    if (!groups[cat]) return;
    const showLabel = !activeCatFilter;
    if (showLabel) html += `<div class="cat-group"><div class="cat-label">${CATS[cat]?.label || cat}</div>`;
    else html += `<div class="cat-group">`;
    groups[cat].forEach(p => {
      const active = p.id === state.activePage && state.tab === 'read';
      html += `<div class="page-link ${active ? 'active' : ''} ${p.fresh ? 'fresh' : ''}" onclick="openPage('${p.id}')">
        <span class="dot">●</span><span>${esc(p.title)}</span></div>`;
    });
    html += `</div>`;
  });
  document.getElementById('index-body').innerHTML = html || `<div class="empty-index">${filter ? 'No pages match.' : activeCatFilter ? 'No pages in this category.' : 'Nothing filed yet.'}</div>`;
}
